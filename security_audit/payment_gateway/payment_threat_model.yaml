    - requirement: "3.4.1 — PAN rendered unreadable"
      threats: [T-PG-I-01]
    - requirement: "3.5.1 — Encryption for stored PAN"
      threats: [T-PG-I-01]
    - requirement: "4.2.1 — Strong cryptography in transit"
      threats: [T-PG-I-03]
    - requirement: "6.3.3 — Injection protection"
      threats: [T-PG-E-02]
    - requirement: "6.4.1 — Security headers"
      threats: [T-PG-T-03]
    - requirement: "7.2.1 — Access control"
      threats: [T-PG-E-01]
    - requirement: "8.2.1 — Strong authentication"
