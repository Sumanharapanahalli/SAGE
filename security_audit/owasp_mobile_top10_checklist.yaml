# ==============================================================
# OWASP Mobile Application Security Top 10 (2024 Edition)
# Checklist for: Meditation App (solutions/meditation_app)
# ==============================================================
# Reference:    https://owasp.org/www-project-mobile-top-10/
# Standard:     MASVS v2.0 (Mobile Application Security Verification Standard)
# Date:         2026-03-28
# Reviewer:     Security Review — Meditation App Team
# Platform:     iOS (watchOS 10 companion) + React Web Progressive App
# ==============================================================

metadata:
  app_name: "MindfulAI Meditation App"
  platform: ["iOS", "watchOS", "Web (PWA)"]
  version_reviewed: "0.1.0-dev"
  date: "2026-03-28"
  reviewer: "SAGE Security Review Automated + Manual"
  masvs_version: "2.0"
  owasp_mobile_top10_year: 2024
  overall_status: PARTIAL_PASS
  critical_failures: 3
  high_failures: 2

# ==============================================================
# M1 — Improper Credential Usage
# MASVS-AUTH
# ==============================================================
checks:
  - id: M1
    title: "Improper Credential Usage"
    masvs_category: MASVS-AUTH
    description: >
      Hardcoded credentials, insecure credential storage, and improper
      credential transmission.

    items:
      - check: "M1.1 — No hardcoded credentials in source code"
        status: PASS
        evidence: >
          src/core/auth.py uses env-var references only. API keys stored
          as SHA-256 hashes. config/config.yaml references environment
          variables for all secrets.
        file: "src/core/auth.py, config/config.yaml"

      - check: "M1.2 — Credentials not stored in plaintext on device"
        status: FAIL
        severity: CRITICAL
        evidence: >
          UserProfile (name, onboardingComplete, subscriptionTier) stored in
          plaintext localStorage ('mindful_streak', 'mindful_sessions').
          Mood entries and streak data are unencrypted.
        file: "solutions/meditation_app/web/src/hooks/useAppState.ts:STORAGE"
        remediation: "Encrypt localStorage with AES-256-GCM (Web Crypto API)"
        cwe: "CWE-312 — Cleartext Storage of Sensitive Information"

      - check: "M1.3 — Auth tokens not stored in insecure locations"
        status: PARTIAL
        evidence: >
          JWT tokens should use httpOnly cookies, not localStorage.
          Current implementation status not confirmed for native iOS.
        remediation: "Use iOS Keychain for JWT storage; Secure flag on web cookies"
        cwe: "CWE-922 — Insecure Storage of Sensitive Information"

      - check: "M1.4 — API key format non-guessable"
        status: PASS
        evidence: "sk-sage-{32 random hex} = 128 bits entropy. Stored as SHA-256."
        file: "src/core/auth.py → create_api_key()"

  # ==============================================================
  # M2 — Inadequate Supply Chain Security
  # MASVS-CODE
  # ==============================================================
  - id: M2
    title: "Inadequate Supply Chain Security"
    masvs_category: MASVS-CODE
    description: >
      Third-party components with known vulnerabilities, no dependency
      pinning, or compromised build pipelines.

    items:
      - check: "M2.1 — Dependency versions pinned in requirements"
        status: PASS
        evidence: "requirements.txt lists exact versions for all Python packages"
        file: "requirements.txt"

      - check: "M2.2 — No known CVEs in dependencies (Trivy / Safety check)"
        status: REQUIRES_VERIFICATION
        evidence: "No automated CVE scan found in CI pipeline"
        remediation: "Add 'pip install safety && safety check' to .github/workflows/pr_checks.yml"
        command: "trivy fs . --severity HIGH,CRITICAL --format json --output security_audit/trivy_report.json"

      - check: "M2.3 — SBOM generated for release artifacts"
        status: PARTIAL
        evidence: "security_audit/sbom.json exists but may be stale"
        remediation: "Regenerate SBOM on each release: 'syft . -o spdx-json > security_audit/sbom.json'"

      - check: "M2.4 — Node.js packages audited (npm audit)"
        status: REQUIRES_VERIFICATION
        evidence: "vscode-extension/package-lock.json present; npm audit status unknown"
        command: "cd solutions/meditation_app/web && npm audit --audit-level=high"

  # ==============================================================
  # M3 — Insecure Authentication / Authorization
  # MASVS-AUTH
  # ==============================================================
  - id: M3
    title: "Insecure Authentication / Authorization"
    masvs_category: MASVS-AUTH
    description: >
      Weak authentication mechanisms, missing authorization checks,
      or authentication that can be bypassed.

    items:
      - check: "M3.1 — Authentication enabled in production config"
        status: FAIL
        severity: CRITICAL
        evidence: >
          config/config.yaml: auth.enabled defaults to false.
          Anonymous admin identity granted when disabled — all endpoints
          accessible without credentials in default deployment.
        file: "src/core/auth.py → get_current_user() → returns anonymous ADMIN"
        remediation: "Set auth.enabled: true before any production deployment; add CI check"
        cwe: "CWE-306 — Missing Authentication for Critical Function"

      - check: "M3.2 — RBAC enforced on all sensitive endpoints"
        status: PASS
        evidence: >
          src/core/rbac.py defines 4-tier hierarchy (VIEWER < OPERATOR < APPROVER < ADMIN).
          Role checks present on /auth/*, /approve/*, /build/start.
        file: "src/core/rbac.py, src/interface/api.py"

      - check: "M3.3 — No IDOR vulnerabilities on user data endpoints"
        status: REQUIRES_VERIFICATION
        evidence: >
          DELETE /chat/history accepts user_id as query param — no verification
          that caller owns user_id. OPERATOR could delete another user's data.
        file: "src/interface/api.py → DELETE /chat/history"
        remediation: "Assert user_id == current_user.sub or require ADMIN role"
        cwe: "CWE-639 — Authorization Bypass Through User-Controlled Key"

      - check: "M3.4 — JWT algorithm confusion prevented (none/HS256 swap)"
        status: PASS
        evidence: >
          Allowed algorithms list: RS256, RS384, RS512, ES256, ES384, ES512 only.
          'none' and HMAC variants are not in the allowed list.
        file: "src/core/auth.py → _validate_oidc_token() → algorithms=ALLOWED_ALGORITHMS"

      - check: "M3.5 — Session tokens have appropriate expiry"
        status: PARTIAL
        evidence: >
          JWKS caches for 1 hour. Token expiry depends on OIDC provider config.
          No explicit exp enforcement in SAGE code — relies on provider.
        remediation: "Add exp claim validation and enforce max_age ≤ 15 minutes in code"

  # ==============================================================
  # M4 — Insufficient Input/Output Validation
  # MASVS-CODE
  # ==============================================================
  - id: M4
    title: "Insufficient Input/Output Validation"
    masvs_category: MASVS-CODE
    description: >
      Missing server-side validation, injection vulnerabilities (SQL, command,
      prompt), or XSS via unescaped output.

    items:
      - check: "M4.1 — SQL injection prevention (parameterized queries)"
        status: PASS
        evidence: >
          All SQLite queries in audit_logger.py use parameterized statements
          (?, :name placeholders). No string concatenation in SQL.
        file: "src/memory/audit_logger.py"

      - check: "M4.2 — Prompt injection defense in LLM calls"
        status: PARTIAL
        evidence: >
          OCR text is truncated to 500,000 chars and null-bytes stripped.
          No systematic prompt injection guard for user-supplied mood notes.
        file: "src/core/security/file_validator.py → sanitize_text()"
        remediation: "Sanitize all user text before injection into LLM system prompts"

      - check: "M4.3 — Heart rate data validated server-side (physiological bounds)"
        status: FAIL
        severity: HIGH
        evidence: >
          No server-side validation of heart rate range (42–200 bpm).
          Forged samples (0 bpm, 999 bpm) could corrupt health analytics.
        file: "solutions/meditation_app/backend/streak_engine.py"
        remediation: "Add Pydantic validator: 42 ≤ heart_rate ≤ 220 bpm; reject outliers"
        cwe: "CWE-20 — Improper Input Validation"

      - check: "M4.4 — File upload validation (magic bytes + extension)"
        status: PASS
        evidence: >
          src/core/security/file_validator.py: magic-byte detection for 15 types,
          ZIP bomb check (100:1 ratio, 1,000 entry limit), 50 MB cap.
        file: "src/core/security/file_validator.py"

      - check: "M4.5 — Content-Security-Policy header present"
        status: FAIL
        severity: HIGH
        evidence: "No CSP middleware in src/interface/api.py. XSS can read localStorage health data."
        remediation: >
          Add SecurityHeadersMiddleware with:
          Content-Security-Policy: default-src 'self'; script-src 'self';
          X-Content-Type-Options: nosniff; X-Frame-Options: DENY
        file: "src/interface/api.py"
        cwe: "CWE-79 — XSS"

  # ==============================================================
  # M5 — Insecure Communication
  # MASVS-NETWORK
  # ==============================================================
  - id: M5
    title: "Insecure Communication"
    masvs_category: MASVS-NETWORK
    description: >
      Cleartext transmission, weak TLS, missing certificate validation,
      or insecure WebSocket connections.

    items:
      - check: "M5.1 — All API endpoints served over HTTPS"
        status: PASS
        evidence: "Trust boundary TB-01 requires TLS. ATS enabled on iOS by default."

      - check: "M5.2 — Certificate pinning implemented for health data endpoints"
        status: FAIL
        severity: CRITICAL
        evidence: >
          No certificate pinning found. On iOS, MITM attacks with custom CA
          (e.g., Burp Suite) can intercept heart rate data in transit.
        remediation: >
          Implement SSL pinning for /mood and /health/* endpoints using
          TrustKit (iOS) or OkHttp CertificatePinner (Android).
        cwe: "CWE-295 — Improper Certificate Validation"

      - check: "M5.3 — WatchConnectivity data encrypted in transit"
        status: PASS
        evidence: >
          WatchConnectivity uses Bluetooth LE with pairing encryption.
          Apple enforces encryption between paired Watch and iPhone.

      - check: "M5.4 — CORS policy restricts origins"
        status: PARTIAL
        evidence: >
          Prior threat model (v1.1.0) flagged T-S-03: wildcard CORS.
          Current CORS config in api.py — needs verification it restricts to app domain.
        file: "src/interface/api.py → CORSMiddleware"
        remediation: "Set allow_origins=['https://app.mindfulai.com'] — no wildcard"

      - check: "M5.5 — S3 presigned URLs served over HTTPS only"
        status: PASS
        evidence: "AWS SDK enforces HTTPS for presigned URLs by default (use_ssl=True)"

  # ==============================================================
  # M6 — Inadequate Privacy Controls
  # MASVS-PRIVACY
  # ==============================================================
  - id: M6
    title: "Inadequate Privacy Controls"
    masvs_category: MASVS-PRIVACY
    description: >
      Excessive data collection, missing consent mechanisms, GDPR Article 9
      health data mishandling, or insufficient anonymization.

    items:
      - check: "M6.1 — Health data (mood, heart rate) requires explicit consent"
        status: PARTIAL
        evidence: >
          HealthKit authorization dialog present (iOS enforces this).
          No explicit in-app consent screen for mood tracking or LLM analysis.
        remediation: "Add GDPR Article 9 explicit consent screen before first mood entry"
        reference: "GDPR Article 9(2)(a)"

      - check: "M6.2 — Data minimization: only necessary health data collected"
        status: PASS
        evidence: >
          watchOS app only requests HKQuantityTypeIdentifierHeartRate.
          Mood score is 1-5 scale (not free text by default — note field is optional).

      - check: "M6.3 — User can export their data (GDPR portability)"
        status: FAIL
        severity: HIGH
        evidence: >
          No GET /users/{id}/export endpoint exists. GDPR Article 20 requires
          data portability in a machine-readable format.
        remediation: "Implement GET /users/{id}/export returning JSON of all user data"
        reference: "GDPR Article 20"
        cwe: "CWE-359 — Exposure of Private Personal Information to Unauthorized Actor"

      - check: "M6.4 — Data deletion removes all PII within 30 days"
        status: PARTIAL
        evidence: >
          DELETE /chat/history removes chat messages.
          No automated 30-day purge job for mood entries, health sessions,
          or audit_log references exists.
        remediation: "See gdpr_ccpa_deletion_workflow.py for automated pipeline"

      - check: "M6.5 — Health data not shared with third-party analytics"
        status: PASS
        evidence: >
          No Firebase Analytics, Mixpanel, or third-party SDK found in
          solutions/meditation_app/web/src/. No analytics script tags.

  # ==============================================================
  # M7 — Insufficient Binary Protections
  # MASVS-RESILIENCE
  # ==============================================================
  - id: M7
    title: "Insufficient Binary Protections"
    masvs_category: MASVS-RESILIENCE
    description: >
      Missing code obfuscation, jailbreak detection, or anti-tampering
      protections for compiled app binaries.

    items:
      - check: "M7.1 — Jailbreak / root detection implemented"
        status: FAIL
        severity: MEDIUM
        evidence: "No jailbreak detection found in iOS/watchOS code"
        remediation: "Integrate DTTJailbreakDetection or custom detection before HealthKit read"

      - check: "M7.2 — Debugging disabled in release builds"
        status: REQUIRES_VERIFICATION
        evidence: "Xcode Release scheme disables debugging by default; verify in build settings"

      - check: "M7.3 — Source maps not exposed in production web build"
        status: REQUIRES_VERIFICATION
        evidence: "Vite build should set build.sourcemap: false for production"
        file: "solutions/meditation_app/web/vite.config.ts"
        remediation: "Set sourcemap: false in vite.config.ts production build"

  # ==============================================================
  # M8 — Security Misconfiguration
  # MASVS-RESILIENCE + MASVS-AUTH
  # ==============================================================
  - id: M8
    title: "Security Misconfiguration"
    masvs_category: MASVS-RESILIENCE
    description: >
      Insecure default configurations, unnecessary features enabled,
      or missing security hardening.

    items:
      - check: "M8.1 — Debug mode disabled in production"
        status: REQUIRES_VERIFICATION
        evidence: "FastAPI debug mode flag depends on environment variable; verify ENVIRONMENT=production"
        remediation: "Assert app = FastAPI(debug=False) when ENVIRONMENT != development"

      - check: "M8.2 — Error messages do not expose stack traces to clients"
        status: PASS
        evidence: >
          FastAPI default exception handlers return generic 500 messages.
          No unhandled exceptions propagate raw tracebacks.

      - check: "M8.3 — Rate limiting active on all sensitive endpoints"
        status: PASS
        evidence: "Write: 120 req/min, Read: 300 req/min. Rate limiter middleware active."
        file: "src/interface/api.py → rate_limit_middleware"

      - check: "M8.4 — Security headers present (HSTS, X-Frame-Options, XCTO)"
        status: FAIL
        severity: HIGH
        evidence: >
          No HSTS, X-Frame-Options, or X-Content-Type-Options headers in
          API responses. Web app vulnerable to clickjacking and MIME sniffing.
        remediation: >
          Add to api.py:
          Strict-Transport-Security: max-age=31536000; includeSubDomains
          X-Frame-Options: DENY
          X-Content-Type-Options: nosniff
          Referrer-Policy: no-referrer

      - check: "M8.5 — HealthKit background delivery scoped to needed types only"
        status: PASS
        evidence: "Only HKQuantityTypeIdentifierHeartRate requested in watchOS app"

  # ==============================================================
  # M9 — Insecure Data Storage
  # MASVS-STORAGE
  # ==============================================================
  - id: M9
    title: "Insecure Data Storage"
    masvs_category: MASVS-STORAGE
    description: >
      Sensitive data stored insecurely on device (unencrypted files,
      insecure caches, world-readable storage).

    items:
      - check: "M9.1 — Health data encrypted at rest on device"
        status: FAIL
        severity: CRITICAL
        evidence: >
          Mood entries and session data stored in plaintext localStorage.
          On a compromised or backed-up device, this data is readable without
          the user's password.
        file: "solutions/meditation_app/web/src/hooks/useAppState.ts"
        remediation: >
          Encrypt with Web Crypto API (AES-256-GCM). Key derived from
          user authentication credential via PBKDF2.
        cwe: "CWE-312"

      - check: "M9.2 — iOS Keychain used for sensitive tokens"
        status: REQUIRES_VERIFICATION
        evidence: "Native iOS implementation not present in current codebase (React simulation only)"
        remediation: "Use kSecClassGenericPassword Keychain item for JWT + API key storage"

      - check: "M9.3 — audit_log.db encrypted at rest"
        status: FAIL
        severity: HIGH
        evidence: "SQLite database at .sage/audit_log.db is unencrypted plaintext"
        remediation: "Enable SQLCipher encryption or use filesystem encryption (LUKS/FileVault)"
        file: "src/memory/audit_logger.py"
        cwe: "CWE-312"

      - check: "M9.4 — Offline cached audio sessions encrypted"
        status: REQUIRES_VERIFICATION
        evidence: "isDownloaded flag present in Session type; storage mechanism not shown"
        remediation: "Use iOS Data Protection kSecAttrAccessibleWhenUnlockedThisDeviceOnly"

  # ==============================================================
  # M10 — Insufficient Cryptography
  # MASVS-CRYPTO
  # ==============================================================
  - id: M10
    title: "Insufficient Cryptography"
    masvs_category: MASVS-CRYPTO
    description: >
      Use of weak algorithms, insecure key management, or custom
      cryptographic implementations.

    items:
      - check: "M10.1 — JWT signing uses strong asymmetric algorithms"
        status: PASS
        evidence: "Allowed: RS256, RS384, RS512, ES256, ES384, ES512 — all modern and strong"
        file: "src/core/auth.py → ALLOWED_ALGORITHMS"

      - check: "M10.2 — API key hashing uses SHA-256 (not MD5/SHA-1)"
        status: PASS
        evidence: "hashlib.sha256() used for API key storage"
        file: "src/core/auth.py → _hash_key()"

      - check: "M10.3 — No use of deprecated crypto (DES, RC4, MD5)"
        status: PASS
        evidence: "No DES/RC4/MD5 patterns found in src/ Python files"

      - check: "M10.4 — S3 presigned URLs use SigV4 (HMAC-SHA256)"
        status: PASS
        evidence: "AWS SDK boto3 default is SigV4 with HMAC-SHA256"

      - check: "M10.5 — PRNG used for sensitive values (secrets module, not random)"
        status: REQUIRES_VERIFICATION
        evidence: "Need to verify API key generation uses secrets.token_hex(), not random.getrandbits()"
        file: "src/core/auth.py → create_api_key()"
        remediation: "Assert: import secrets; key = secrets.token_hex(32)"

# ==============================================================
# Summary Scorecard
# ==============================================================
summary:
  total_checks: 40
  pass: 18
  fail: 10
  partial: 6
  requires_verification: 6

  fail_by_severity:
    CRITICAL: 3
    HIGH: 5
    MEDIUM: 1
    LOW: 1

  critical_failures:
    - id: M1.2
      title: "Plaintext health data in localStorage"
      cwe: "CWE-312"
    - id: M3.1
      title: "Authentication disabled by default"
      cwe: "CWE-306"
    - id: M5.2
      title: "No certificate pinning for health data endpoints"
      cwe: "CWE-295"

  high_failures:
    - id: M4.3
      title: "No heart rate validation (server-side bounds)"
    - id: M4.5
      title: "Missing Content-Security-Policy header"
    - id: M6.3
      title: "No GDPR data portability export endpoint"
    - id: M8.4
      title: "Missing security headers (HSTS, X-Frame-Options)"
    - id: M9.3
      title: "audit_log.db unencrypted at rest"

  recommended_priority_order:
    1: "M3.1 — Enable authentication (blocks all other security controls)"
    2: "M1.2 + M9.1 — Encrypt localStorage health data"
    3: "M4.5 + M8.4 — Add security headers (1-hour fix)"
    4: "M5.2 — Certificate pinning for health endpoints"
    5: "M6.3 — GDPR export endpoint"
    6: "M4.3 — Server-side heart rate validation"
    7: "M9.3 — Encrypt audit_log.db"
    8: "M7.1 — Jailbreak detection"
