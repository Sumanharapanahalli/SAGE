# ==============================================================
# Acceptance Criteria Verification
# ==============================================================
acceptance_criteria:
  - id: AC-01
    description: "OWASP Mobile Top 10 checklist completed with PASS/FAIL per item"
    status: PASS
    evidence: "See owasp_mobile_top10_checklist.yaml"

  - id: AC-02
    description: "GDPR data deletion removes all PII within 30 days (automated)"
    status: PARTIAL
    evidence: "DELETE /chat/history exists; full 30-day automated pipeline in gdpr_ccpa_deletion_workflow.py"
    gap: "No scheduled job for time-based deletion of health data"

  - id: AC-03
    description: "Threat model identifies all data flows with trust boundaries"
    status: PASS
    evidence: "6 data flows (DF-01..DF-06) with 6 trust boundaries (TB-01..TB-06) defined above"

  - id: AC-04
    description: "HealthKit data never leaves device without explicit user consent"
    status: PARTIAL
    evidence: "Policy defined in healthkit_consent_policy.yaml; enforcement requires native iOS implementation"
    gap: "watchOS companion is currently a simulation — real HealthKit authorization required for production"

  - id: AC-05
    description: "No secrets in source code (confirmed by gitleaks scan)"
    status: REQUIRES_VERIFICATION
    evidence: "gitleaks config in .github/workflows/pr_checks.yml; must run scan to confirm"
    command: "gitleaks detect --source . --report-format json --report-path security_audit/gitleaks_report.json"
