# ============================================================
# Open Findings Summary (for CI gate)
# ============================================================
open_findings_ci_gate:
  fail_conditions:
    - "Any finding with severity: CRITICAL"
    - "Any finding with pci_blocking: true"
    - "PHI protection controls (pii.enabled, encryption.at_rest) not configured"
  current_status: FAIL
  critical_count: 3    # CORS-001, PAN-001, TOKEN-001
  high_count: 6        # AUTH-001, PII-001, HDR-001, ENC-001, PHI-001 + T-D-03 shutdown
  pci_blocking_count: 5
  ci_gate_result: BLOCK
  ci_gate_message: >
    Security gate BLOCKED. 3 CRITICAL and 6 HIGH findings must be resolved before
    any production or internet-facing deployment. PCI DSS compliance is NON-COMPLIANT
    (5 blocking issues). See security_audit/final_analysis_report.json for full remediation roadmap.
