{{/*
==============================================================================
SAGE ServiceAccount
==============================================================================
A dedicated ServiceAccount is required when using:
  - HashiCorp Vault agent injector (vault.hashicorp.com/role must match a
    Vault Kubernetes auth role bound to this SA)
  - AWS IRSA (IAM Roles for Service Accounts — annotate with
    eks.amazonaws.com/role-arn)
  - Azure Workload Identity (annotate with azure.workload.identity/client-id)
  - GKE Workload Identity (annotate with iam.gke.io/gcp-service-account)

For env-based secrets, a dedicated SA is still best practice for RBAC auditing.
==============================================================================
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sage.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sage.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
