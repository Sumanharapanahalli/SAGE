{{/*
==============================================================================
SAGE Secret — Placeholder for env-provider secrets
==============================================================================
This Secret is only created when secrets.provider=env. For vault/aws/azure
providers, secrets are injected by the external provider and this object
is not created (to avoid having an empty Kubernetes Secret in the cluster).

In production, do NOT set actual secret values in values.yaml. Instead:
  helm install sage ./helm/sage \
    --set secrets.env.anthropicApiKey="$(cat /path/to/key)"

Or use external-secrets-operator to sync from your secrets manager into
this Kubernetes Secret automatically.
==============================================================================
*/}}
{{- if eq .Values.secrets.provider "env" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sage.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sage.labels" . | nindent 4 }}
  annotations:
    # Warn operators that real values should not be committed to version control
    sage.framework/secrets-provider: "env"
    sage.framework/rotation-hint: "Rotate by running: helm upgrade --set secrets.env.*=<new-value>"
type: Opaque
stringData:
  # Anthropic API key — only required when config.llmProvider=claude
  ANTHROPIC_API_KEY: {{ .Values.secrets.env.anthropicApiKey | quote }}

  # Slack integration — required for two-way approval via Slack
  SLACK_BOT_TOKEN: {{ .Values.secrets.env.slackBotToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secrets.env.slackSigningSecret | quote }}

  # Langfuse observability — optional, enables LLM call tracing
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.env.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.env.langfuseSecretKey | quote }}
{{- end }}
