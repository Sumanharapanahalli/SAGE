{{/*
==============================================================================
SAGE Backend Service
==============================================================================
ClusterIP by default — traffic arrives via Ingress or internal pod-to-pod calls.
The frontend nginx config proxies /api/ to this service name.
==============================================================================
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sage.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sage.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.backend.service.type "NodePort") .Values.backend.service.nodePort }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
  selector:
    {{- include "sage.backend.selectorLabels" . | nindent 4 }}
