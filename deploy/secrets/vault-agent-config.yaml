# ==============================================================================
# HashiCorp Vault Agent Injector — Annotations Reference
# ==============================================================================
# This file documents the Vault agent sidecar injection pattern for SAGE pods.
# The actual annotations are written into the Deployment manifest by the Helm
# template (deployment-backend.yaml) when secrets.provider=vault.
#
# Prerequisites:
#   1. Vault agent injector installed in the cluster (part of vault helm chart)
#   2. Kubernetes auth method enabled in Vault:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://$K8S_HOST:443" \
#          kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
#          token_reviewer_jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
#   3. A policy granting read access to SAGE secrets:
#        vault policy write sage-policy - <<EOF
#        path "secret/data/sage/*" { capabilities = ["read"] }
#        EOF
#   4. A role binding the policy to the SAGE service account:
#        vault write auth/kubernetes/role/sage-role \
#          bound_service_account_names=sage \
#          bound_service_account_namespaces=sage-framework \
#          policies=sage-policy \
#          ttl=24h
#
# Secret layout in Vault (KV v2):
#   vault kv put secret/sage/production \
#     anthropic_api_key="sk-ant-..." \
#     slack_bot_token="xoxb-..." \
#     slack_signing_secret="..." \
#     langfuse_public_key="pk-lf-..." \
#     langfuse_secret_key="sk-lf-..."
# ==============================================================================

# These annotations are injected into the pod spec by deployment-backend.yaml.
# Reproduced here for documentation and manual patching:
#
# vault.hashicorp.com/agent-inject: "true"
# vault.hashicorp.com/role: "sage-role"
# vault.hashicorp.com/agent-inject-secret-sage: "secret/data/sage/production"
# vault.hashicorp.com/agent-inject-template-sage: |
#   {{ with secret "secret/data/sage/production" -}}
#   export ANTHROPIC_API_KEY="{{ .Data.data.anthropic_api_key }}"
#   export SLACK_BOT_TOKEN="{{ .Data.data.slack_bot_token }}"
#   export SLACK_SIGNING_SECRET="{{ .Data.data.slack_signing_secret }}"
#   export LANGFUSE_PUBLIC_KEY="{{ .Data.data.langfuse_public_key }}"
#   export LANGFUSE_SECRET_KEY="{{ .Data.data.langfuse_secret_key }}"
#   {{- end }}
#
# The rendered file is mounted at: /vault/secrets/sage
# The container's CMD must source it: . /vault/secrets/sage && exec <original_cmd>
# Or use vault.hashicorp.com/agent-inject-command to trigger a reload.

# ------------------------------------------------------------------------------
# Vault Agent ConfigMap (used when running Vault agent as an init container
# rather than relying on the injector webhook — an alternative approach for
# environments where the mutating webhook is not available)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: sage-framework
  labels:
    app.kubernetes.io/name: sage
    app.kubernetes.io/component: vault-agent
data:
  vault-agent-config.hcl: |
    # Vault Agent configuration for init container mode.
    # Reference: https://developer.hashicorp.com/vault/docs/agent-and-proxy/agent

    # Exit after rendering secrets (init container pattern)
    exit_after_auth = true

    pid_file = "/tmp/vault-agent.pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "sage-role"
        }
      }

      sink "file" {
        config = {
          # Write the Vault token to a shared volume so the main container
          # can use it for dynamic secret renewal if needed.
          path = "/vault/token"
        }
      }
    }

    vault {
      # Address is injected via VAULT_ADDR environment variable at runtime.
      # Set it in the deployment or via the Vault injector annotations.
    }

    template {
      source      = "/vault/templates/sage-secrets.tpl"
      destination = "/vault/secrets/sage.env"
      # Revoke the token after rendering to minimize the attack surface
      error_on_missing_key = true
    }

  # Template file rendered by Vault Agent into /vault/secrets/sage.env
  sage-secrets.tpl: |
    {{ with secret "secret/data/sage/production" -}}
    ANTHROPIC_API_KEY={{ .Data.data.anthropic_api_key }}
    SLACK_BOT_TOKEN={{ .Data.data.slack_bot_token }}
    SLACK_SIGNING_SECRET={{ .Data.data.slack_signing_secret }}
    LANGFUSE_PUBLIC_KEY={{ .Data.data.langfuse_public_key }}
    LANGFUSE_SECRET_KEY={{ .Data.data.langfuse_secret_key }}
    {{- end }}
