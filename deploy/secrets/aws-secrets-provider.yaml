# ==============================================================================
# AWS Secrets Manager — SecretProviderClass (secrets-store-csi-driver)
# ==============================================================================
# Mounts SAGE secrets from AWS Secrets Manager into the pod filesystem AND
# syncs them to a Kubernetes Secret for env var injection.
#
# Prerequisites:
#   1. secrets-store-csi-driver installed:
#        helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
#          -n kube-system --set syncSecret.enabled=true
#   2. AWS provider installed:
#        helm install aws-provider aws-secrets-manager/secrets-store-csi-driver-provider-aws \
#          -n kube-system
#   3. IAM role with GetSecretValue permission, bound to the SAGE service account
#      via IRSA (IAM Roles for Service Accounts):
#        {
#          "Version": "2012-10-17",
#          "Statement": [{
#            "Effect": "Allow",
#            "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
#            "Resource": "arn:aws:secretsmanager:<region>:<account>:secret:sage/production-*"
#          }]
#        }
#   4. Annotate the SAGE service account in values.yaml:
#        serviceAccount:
#          annotations:
#            eks.amazonaws.com/role-arn: "arn:aws:iam::<account>:role/sage-secrets-role"
#
# Secret layout in AWS Secrets Manager (JSON secret value):
#   aws secretsmanager create-secret \
#     --name "sage/production" \
#     --secret-string '{
#       "ANTHROPIC_API_KEY": "sk-ant-...",
#       "SLACK_BOT_TOKEN": "xoxb-...",
#       "SLACK_SIGNING_SECRET": "...",
#       "LANGFUSE_PUBLIC_KEY": "pk-lf-...",
#       "LANGFUSE_SECRET_KEY": "sk-lf-..."
#     }'
# ==============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sage-aws-secrets
  namespace: sage-framework
  labels:
    app.kubernetes.io/name: sage
    app.kubernetes.io/component: secrets
spec:
  provider: aws
  parameters:
    # AWS region where the secret lives
    region: us-east-1

    objects: |
      - objectName: "sage/production"
        objectType: "secretsmanager"
        # Extract individual keys from the JSON secret value.
        # Each jmesPath entry becomes a separate file under the mount path.
        jmesPath:
          - path: "ANTHROPIC_API_KEY"
            objectAlias: "anthropic-api-key"
          - path: "SLACK_BOT_TOKEN"
            objectAlias: "slack-bot-token"
          - path: "SLACK_SIGNING_SECRET"
            objectAlias: "slack-signing-secret"
          - path: "LANGFUSE_PUBLIC_KEY"
            objectAlias: "langfuse-public-key"
          - path: "LANGFUSE_SECRET_KEY"
            objectAlias: "langfuse-secret-key"

  # Sync to a Kubernetes Secret so the deployment can use secretKeyRef env vars.
  # The Kubernetes Secret is kept in sync with the AWS secret value.
  # Rotation: re-sync happens on pod restart; for live rotation enable
  # secrets-store-csi-driver's rotation reconciler (--enable-secret-rotation).
  secretObjects:
    - secretName: sage-secrets
      type: Opaque
      data:
        - objectName: "anthropic-api-key"
          key: ANTHROPIC_API_KEY
        - objectName: "slack-bot-token"
          key: SLACK_BOT_TOKEN
        - objectName: "slack-signing-secret"
          key: SLACK_SIGNING_SECRET
        - objectName: "langfuse-public-key"
          key: LANGFUSE_PUBLIC_KEY
        - objectName: "langfuse-secret-key"
          key: LANGFUSE_SECRET_KEY
