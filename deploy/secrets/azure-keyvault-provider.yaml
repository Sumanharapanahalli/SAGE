# ==============================================================================
# Azure Key Vault — SecretProviderClass (secrets-store-csi-driver)
# ==============================================================================
# Mounts SAGE secrets from Azure Key Vault into the pod filesystem AND
# syncs them to a Kubernetes Secret for env var injection.
#
# Prerequisites:
#   1. secrets-store-csi-driver installed (same as AWS setup)
#   2. Azure Key Vault provider installed:
#        helm install azure-provider csi-secrets-store-provider-azure/csi-secrets-store-provider-azure \
#          -n kube-system
#   3. Azure Workload Identity configured (recommended over pod-managed identity):
#        az identity create --name sage-identity --resource-group <rg>
#        az aks update --name <cluster> --resource-group <rg> \
#          --enable-oidc-issuer --enable-workload-identity
#        az role assignment create \
#          --role "Key Vault Secrets User" \
#          --assignee <identity-client-id> \
#          --scope /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.KeyVault/vaults/<vault>
#   4. Annotate the SAGE service account in values.yaml:
#        serviceAccount:
#          annotations:
#            azure.workload.identity/client-id: "<managed-identity-client-id>"
#        podAnnotations:
#          azure.workload.identity/use: "true"
#
# Secret layout in Azure Key Vault (create individual secrets, not a JSON blob):
#   az keyvault secret set --vault-name sage-keyvault --name ANTHROPIC-API-KEY --value "sk-ant-..."
#   az keyvault secret set --vault-name sage-keyvault --name SLACK-BOT-TOKEN --value "xoxb-..."
#   az keyvault secret set --vault-name sage-keyvault --name SLACK-SIGNING-SECRET --value "..."
#   az keyvault secret set --vault-name sage-keyvault --name LANGFUSE-PUBLIC-KEY --value "pk-lf-..."
#   az keyvault secret set --vault-name sage-keyvault --name LANGFUSE-SECRET-KEY --value "sk-lf-..."
#
# Note: Azure Key Vault secret names use hyphens (not underscores) by convention.
# ==============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sage-azure-secrets
  namespace: sage-framework
  labels:
    app.kubernetes.io/name: sage
    app.kubernetes.io/component: secrets
spec:
  provider: azure
  parameters:
    # Azure Key Vault name (not the full URI)
    keyvaultName: "sage-keyvault"

    # Azure AD tenant ID of the Key Vault
    tenantId: ""  # Set this to your Azure tenant ID

    # Use workload identity (recommended) or managed identity
    # clientID is picked up from the service account annotation at runtime
    useVMManagedIdentity: "false"
    usePodIdentity: "false"

    objects: |
      array:
        - |
          objectName: ANTHROPIC-API-KEY
          objectType: secret
          objectAlias: anthropic-api-key
        - |
          objectName: SLACK-BOT-TOKEN
          objectType: secret
          objectAlias: slack-bot-token
        - |
          objectName: SLACK-SIGNING-SECRET
          objectType: secret
          objectAlias: slack-signing-secret
        - |
          objectName: LANGFUSE-PUBLIC-KEY
          objectType: secret
          objectAlias: langfuse-public-key
        - |
          objectName: LANGFUSE-SECRET-KEY
          objectType: secret
          objectAlias: langfuse-secret-key

  # Sync to Kubernetes Secret for env var injection.
  # Secret rotation: Azure provider supports live rotation when
  # secrets-store-csi-driver rotation reconciler is enabled.
  secretObjects:
    - secretName: sage-secrets
      type: Opaque
      data:
        - objectName: "anthropic-api-key"
          key: ANTHROPIC_API_KEY
        - objectName: "slack-bot-token"
          key: SLACK_BOT_TOKEN
        - objectName: "slack-signing-secret"
          key: SLACK_SIGNING_SECRET
        - objectName: "langfuse-public-key"
          key: LANGFUSE_PUBLIC_KEY
        - objectName: "langfuse-secret-key"
          key: LANGFUSE_SECRET_KEY
