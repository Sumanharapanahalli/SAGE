# ==============================================================================
# SAGE Frontend — nginx Configuration
# ==============================================================================
# Serves the React SPA and proxies API calls to the FastAPI backend.
# This file is copied into the frontend container at build time.
#
# Backend resolution:
#   In Docker Compose:  backend service name resolves via Docker DNS
#   In Kubernetes:      backend resolves via ClusterDNS to the backend Service
#   The variable BACKEND_SERVICE can be overridden via envsubst if needed.
# ==============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------------
    # SPA routing: let React Router handle all non-file paths.
    # Without this, refreshing on /agents or /improvements returns 404.
    # ----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------------
    # API proxy: forward /api/ to the FastAPI backend.
    # The trailing slash in proxy_pass strips the /api prefix before
    # forwarding, so /api/health → http://backend:8000/health.
    # ----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://sage-backend:8000/;

        # Pass real client IP through to the backend for audit logging
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running LLM calls (can take 60s+)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # SSE (Server-Sent Events) support: disable buffering for streaming
        # endpoints like /analyze/stream and /agent/stream
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # ----------------------------------------------------------------------
    # Static asset caching: hash-named JS/CSS files can be cached forever
    # since Vite appends a content hash to filenames on every build.
    # ----------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------------------
    # Compression: reduces transfer size for text-based assets
    # ----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ----------------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------------
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
