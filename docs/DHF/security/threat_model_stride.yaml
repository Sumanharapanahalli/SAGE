# ─────────────────────────────────────────────────────────────────────────────
# IEC 62443 SECURITY LEVEL JUSTIFICATION
# ─────────────────────────────────────────────────────────────────────────────

iec62443_security_level:
  target: SL2
  justification: >
    Security Level 2 (SL2) is defined as protection against intentional violation using
    simple means with low resources, generic skills, and low motivation. For the WFDS:

    1. THREAT ACTOR PROFILE: The most credible adversary is an opportunistic attacker with
       moderate resources — capable of wireless scanning, credential stuffing, and basic
       hardware debugging. Nation-state / APT-level attacks (SL3/SL4) are not in scope
       for this consumer medical device deployment.

    2. SAFETY IMPACT: Fall detection failure has patient safety consequences (delayed
       emergency response) but does not directly control actuators or infusion devices.
       The primary harm vector is information integrity (suppressed alerts) rather than
       direct physical harm, placing this in SL2 rather than SL3.

    3. REGULATORY ALIGNMENT: FDA 2023 Cybersecurity Guidance requires "reasonable assurance"
       of security commensurate with risk. IEC 62443 SL2 maps to this for Class II medical
       devices with indirect patient safety impact.

    4. SL2 REQUIREMENTS MET:
       - CR 1.1 Human user identification and authentication: MFA on admin, JWT on API
       - CR 1.2 Software process and device identification: per-device X.509 certificates
       - CR 2.1 Authorization enforcement: RBAC + OPA policies
       - CR 2.8 Auditable events: immutable audit log, SIEM integration
       - CR 3.1 Communication integrity: TLS 1.3, AEAD ciphers, message signing
       - CR 3.4 Software and information integrity: secure boot, firmware signing
       - CR 4.1 Information confidentiality: AES-256-GCM, key in KMU
       - CR 4.2 Use of cryptography: approved algorithms only (NIST-approved)
       - CR 7.1 Denial of service protection: rate limiting, offline queue, local alarm
       - CR 7.2 Resource management: watchdog, auto-recovery

  sil_mapping:
    IEC62443_SL: 2
    NIST_CSF_tier: 3
    ISO27001_control_set: Annex_A_subset
    FDA_cybersecurity_tier: Tier_1_standard_security

