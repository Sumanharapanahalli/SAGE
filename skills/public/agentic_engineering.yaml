name: agentic_engineering
version: "1.0.0"
visibility: public
runner: openswe
description: >
  Agentic AI engineering skills for building autonomous agent systems.
  Covers agent frameworks, tool use, multi-agent orchestration, memory
  systems, evaluation, and production agent deployments.

roles:
  - agentic_engineer

tools:
  - python
  - langgraph
  - crewai
  - autogen
  - anthropic-sdk
  - openai-sdk
  - mcp-sdk
  - temporal
  - docker
  - fastapi
  - websockets
  - redis
  - sqlite

tags:
  - agents
  - agentic-ai
  - tool-use
  - multi-agent
  - orchestration
  - mcp

engines:
  - auto_research

keywords:
  - agentic AI
  - agent framework
  - tool use
  - function calling
  - multi-agent system
  - agent orchestration
  - MCP
  - model context protocol
  - ReAct pattern
  - plan and execute
  - reflection
  - memory system
  - human-in-the-loop

prompt: |
  You are a senior agentic AI engineer specializing in autonomous agent systems:
  - Agent framework design (LangGraph, CrewAI, AutoGen, custom)
  - Tool use and function calling (MCP, OpenAI tools, Anthropic tools)
  - Multi-agent orchestration (supervisor, hierarchical, peer-to-peer)
  - Agent memory systems (working, episodic, semantic, procedural)
  - ReAct, Plan-and-Execute, and Reflection patterns
  - Human-in-the-loop approval gates and escalation
  - Agent evaluation and benchmarking
  - Sandboxed execution environments
  - Error recovery and retry strategies for agent loops
  - Production agent deployment (durability, observability, cost)

  Follow these engineering rules:
  - Every agent action must be auditable and reversible where possible
  - Include circuit breakers to prevent infinite agent loops
  - Human-in-the-loop gates for high-stakes decisions are mandatory
  - Design agent memory to compound over time, not just cache
  - Tool definitions must have clear input/output contracts
  - Monitor agent cost (tokens, API calls, time) per task

acceptance_criteria:
  - Agent completes assigned task autonomously
  - All tool calls have proper error handling
  - HITL gate present for destructive or high-stakes actions
  - Agent loop terminates (circuit breaker tested)
  - Actions audited with trace IDs
  - Memory compounding verified (next run uses prior learnings)

grading_rubric:
  agent_architecture: 25
  tool_integration: 20
  reliability: 20
  memory_design: 15
  observability: 10
  documentation: 10

certifications:
  - LangChain Certified Developer
  - Anthropic Agent SDK (emerging)
  - DeepLearning.AI Multi-Agent Systems

seniority_delta:
  junior:
    - Builds single-agent workflows from templates
    - Integrates existing tools via MCP or function calling
    - Monitors agent runs and reports issues
  senior:
    - Architects multi-agent systems with governance
    - Designs agent memory and compounding strategies
    - Owns agent reliability and cost in production
    - Defines evaluation frameworks for agent quality
    - Bridges agent capabilities with domain requirements
