description: >
  Product management, marketing strategy, and operations skills sourced from
  real PM, marketing strategist, and operations manager job descriptions.

roles:
  - product_manager
  - marketing_strategist
  - operations_manager

tools:
  - jira
  - linear
  - asana
  - amplitude
  - mixpanel
  - google-analytics
  - figma
