experiment:
  name: invoice_classification
  version: "1.0.0"
  seed: 42
  mlflow_tracking_uri: "sqlite:///logs/mlflow.db"
  artifact_dir: artifacts/

data:
  raw_path: data/invoices.csv
  test_size: 0.20
  val_size: 0.10          # fraction of training set
  stratify: true
  target_column: invoice_type
  text_columns:
    - vendor_name
    - line_items_text
    - payment_terms
  numeric_columns:
    - total_amount
    - tax_amount
    - num_line_items
    - days_to_due
  categorical_columns:
    - currency
    - payment_method
    - department

model:
  type: gradient_boosting   # gradient_boosting | logistic_regression | random_forest
  hyperparams:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    min_child_weight: 3

text:
  vectorizer: tfidf
  max_features: 5000
  ngram_range: [1, 2]

sla:
  inference_latency_ms: 100   # p99 single-sample budget

bias:
  sensitive_columns:
    - department
    - currency
  metrics: [demographic_parity, equalized_odds]
