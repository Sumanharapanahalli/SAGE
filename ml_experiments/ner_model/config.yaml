"""
NER Model Training Configuration
=================================
Consumed by train_ner.py, evaluate_ner.py, and infer_ner.py.
All relative paths are resolved from the ner_model/ directory.
"""
# ── Model ─────────────────────────────────────────────────────────────────────
model:
  base_model: "distilbert-base-cased"     # faster than bert-base; strong NER baseline
  max_length: 128                          # max subword tokens per sentence
  label_all_tokens: false                  # only first subword of each word gets real label

# ── Training ──────────────────────────────────────────────────────────────────
training:
  seed: 42
  num_epochs: 3
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  lr_scheduler: "linear"
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: false          # set true if CUDA available; train_ner.py auto-detects
  early_stopping_patience: 2
  metric_for_best_model: "eval_f1"
  greater_is_better: true
  save_total_limit: 2

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # Generated by ner_pipeline.py; fall back to HF conll2003 if files absent
  train_path: "../ner_dataset/data/processed/train.conll"
  val_path:   "../ner_dataset/data/processed/val.conll"
  test_path:  "../ner_dataset/data/processed/test.conll"
  hf_fallback_dataset: "conll2003"         # HuggingFace dataset ID for fallback

# ── Output ────────────────────────────────────────────────────────────────────
output:
  model_dir: "./output/model"
  log_dir:   "./experiments"
  reports_dir: "./output/reports"

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  sla_latency_ms: 50           # p99 inference latency SLA (milliseconds per sentence)
  # Entity groups used for bias slicing — must match labels in training data
  bias_entity_types: ["PER", "ORG", "LOC", "MISC"]
  # Sentence-length buckets for bias analysis
  length_buckets:
    short:  [1, 10]
    medium: [11, 30]
    long:   [31, 999]

# ── Inference ─────────────────────────────────────────────────────────────────
inference:
  batch_size: 32
  latency_warmup_runs: 10       # discard first N runs (JIT warm-up)
  latency_benchmark_runs: 200   # runs used to compute p50/p95/p99
