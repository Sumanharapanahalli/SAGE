$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://sage-framework.ai/schemas/invoice/v1.0.0"
title: Invoice
description: >
  JSON Schema Draft-7 for structured invoice entities extracted by the
  SAGE document-entity extraction pipeline.  Every leaf field that holds
  an extracted value is accompanied by a `confidence` sub-object.
type: object
required:
  - document_id
  - document_type
  - extraction_run_id
  - invoice_number
  - invoice_date
  - due_date
  - vendor
  - bill_to
  - line_items
  - totals
  - currency

additionalProperties: false

definitions:
  # ── Shared primitive wrappers ─────────────────────────────────────────────
  confidence:
    type: object
    required: [score, method]
    additionalProperties: false
    properties:
      score:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Extraction confidence (0 = not confident, 1 = certain)
      method:
        type: string
        minLength: 1
        maxLength: 128
        description: >
          Technique used to extract this field, e.g. "regex", "layoutlm_v3",
          "donut", "rule_based", "llm_extraction", "ocr_heuristic"

  extracted_string:
    type: object
    required: [value, confidence]
    additionalProperties: false
    properties:
      value:
        type: string
        minLength: 1
        maxLength: 512
      confidence:
        $ref: "#/definitions/confidence"

  extracted_number:
    type: object
    required: [value, confidence]
    additionalProperties: false
    properties:
      value:
        type: number
      confidence:
        $ref: "#/definitions/confidence"

  extracted_date:
    type: object
    required: [value, confidence]
    additionalProperties: false
    properties:
      value:
        type: string
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        description: ISO 8601 date (YYYY-MM-DD)
      confidence:
        $ref: "#/definitions/confidence"

  address:
    type: object
    required: [raw]
    additionalProperties: false
    properties:
      raw:
        $ref: "#/definitions/extracted_string"
      street:
        $ref: "#/definitions/extracted_string"
      city:
        $ref: "#/definitions/extracted_string"
      state:
        $ref: "#/definitions/extracted_string"
      postal_code:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: string
            pattern: "^[A-Z0-9 \\-]{3,10}$"
          confidence:
            $ref: "#/definitions/confidence"
      country:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: string
            pattern: "^[A-Z]{2}$"
            description: ISO 3166-1 alpha-2 country code
          confidence:
            $ref: "#/definitions/confidence"

  party:
    type: object
    required: [name]
    additionalProperties: false
    properties:
      name:
        $ref: "#/definitions/extracted_string"
      tax_id:
        $ref: "#/definitions/extracted_string"
      registration_number:
        $ref: "#/definitions/extracted_string"
      address:
        $ref: "#/definitions/address"
      email:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: string
            format: email
          confidence:
            $ref: "#/definitions/confidence"
      phone:
        $ref: "#/definitions/extracted_string"
      bank_account:
        $ref: "#/definitions/extracted_string"
      iban:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: string
            pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$"
          confidence:
            $ref: "#/definitions/confidence"

  line_item:
    type: object
    required: [description, quantity, unit_price, line_total]
    additionalProperties: false
    properties:
      line_number:
        type: integer
        minimum: 1
      description:
        $ref: "#/definitions/extracted_string"
      sku:
        $ref: "#/definitions/extracted_string"
      quantity:
        $ref: "#/definitions/extracted_number"
      unit:
        $ref: "#/definitions/extracted_string"
      unit_price:
        $ref: "#/definitions/extracted_number"
      discount_rate:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: number
            minimum: 0.0
            maximum: 1.0
            description: Fractional discount (0.10 = 10 %)
          confidence:
            $ref: "#/definitions/confidence"
      tax_rate:
        type: object
        required: [value, confidence]
        additionalProperties: false
        properties:
          value:
            type: number
            minimum: 0.0
            maximum: 1.0
          confidence:
            $ref: "#/definitions/confidence"
      line_total:
        $ref: "#/definitions/extracted_number"

# ── Top-level document fields ─────────────────────────────────────────────────
properties:
  document_id:
    type: string
    minLength: 1
    maxLength: 128
    description: Unique document identifier (UUID or external reference)

  document_type:
    type: string
    enum: [invoice]

  extraction_run_id:
    type: string
    minLength: 1
    maxLength: 128

  source_file:
    type: string
    description: Original filename or S3/GCS URI

  page_count:
    type: integer
    minimum: 1

  invoice_number:
    $ref: "#/definitions/extracted_string"

  invoice_date:
    $ref: "#/definitions/extracted_date"

  due_date:
    $ref: "#/definitions/extracted_date"

  purchase_order_number:
    $ref: "#/definitions/extracted_string"

  currency:
    type: object
    required: [value, confidence]
    additionalProperties: false
    properties:
      value:
        type: string
        pattern: "^[A-Z]{3}$"
        description: ISO 4217 currency code
      confidence:
        $ref: "#/definitions/confidence"

  vendor:
    $ref: "#/definitions/party"

  bill_to:
    $ref: "#/definitions/party"

  ship_to:
    $ref: "#/definitions/party"

  line_items:
    type: array
    minItems: 1
    items:
      $ref: "#/definitions/line_item"

  totals:
    type: object
    required: [subtotal, total_due]
    additionalProperties: false
    properties:
      subtotal:
        $ref: "#/definitions/extracted_number"
      discount_amount:
        $ref: "#/definitions/extracted_number"
      tax_amount:
        $ref: "#/definitions/extracted_number"
      shipping_amount:
        $ref: "#/definitions/extracted_number"
      total_due:
        $ref: "#/definitions/extracted_number"
      amount_paid:
        $ref: "#/definitions/extracted_number"
      balance_due:
        $ref: "#/definitions/extracted_number"

  payment_terms:
    $ref: "#/definitions/extracted_string"

  payment_method:
    type: object
    required: [value, confidence]
    additionalProperties: false
    properties:
      value:
        type: string
        enum: [bank_transfer, credit_card, check, cash, paypal, stripe, other]
      confidence:
        $ref: "#/definitions/confidence"

  notes:
    $ref: "#/definitions/extracted_string"

  metadata:
    type: object
    description: Pass-through bag for pipeline-specific metadata
    additionalProperties: true
