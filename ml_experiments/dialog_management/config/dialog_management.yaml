# Dialog Management — Training Configuration
# All reproducibility-affecting settings are explicitly pinned.

model:
  name: dialog_management_v1
  encoder: distilbert-base-uncased   # HuggingFace model id
  hidden_size: 256                    # LSTM + policy head width
  lstm_layers: 2                      # stacked LSTM layers
  dropout: 0.3                        # applied after projection & in policy head
  max_seq_len: 128                    # subword token limit (padding/truncation)
  max_history_turns: 5                # history turns included in context

training:
  seed: 42                            # all RNG sources pinned to this
  epochs: 20
  batch_size: 32
  learning_rate: 2.0e-5               # AdamW LR (OneCycleLR max)
  weight_decay: 0.01                  # L2 regularisation
  warmup_ratio: 0.1                   # fraction of total steps for LR warmup
  gradient_clip: 1.0                  # max grad norm
  early_stopping_patience: 5         # epochs without val_f1 improvement
  # Split ratios (stratified on dialog_act label)
  test_size: 0.15                     # 15% held-out test set
  val_size: 0.15                      # 15% validation set

data:
  dataset: multiwoz                   # dataset identifier (logged to MLflow)
  n_samples: 2000                     # synthetic dataset size (replace with real loader)
  num_workers: 0                      # DataLoader workers (0 = main process)

inference:
  max_latency_ms: 100                 # P95 latency SLA (milliseconds)
  top_k: 3                            # top-k dialog act alternatives to return
  batch_size: 32                      # batch inference size

mlflow:
  experiment_name: dialog_management
  tracking_uri: ./mlruns              # local filesystem tracking

artifacts:
  model_dir: ./artifacts/models
  report_dir: ./artifacts/reports
