task_types:
  MARKET_RESEARCH:
    description: 'Analyze cryptocurrency exchange market: competitors (Coinbase, Kraken,
      Binance), target segments (retail vs institutional), fee models, and regulatory
      landscape across key jurisdictions.'
    agent_role: marketing_strategist
    acceptance_criteria:
    - Competitor matrix covers at least 5 exchanges with fee structures, supported
      assets, custody model, and regulatory status
    - Target persona definitions for retail and institutional segments
    - Regulatory landscape summary per jurisdiction with compliance cost estimates
    - Go-to-market recommendation with differentiation strategy
    depends_on: []
  BUSINESS_ANALYSIS:
    description: 'Define business requirements: user stories for retail and institutional
      flows, order lifecycle, portfolio tracking, tax reporting, and custody service
      model. Produce process flow diagrams.'
    agent_role: business_analyst
    acceptance_criteria:
    - User stories documented with acceptance criteria for all core trading and custody
      flows
    - Order lifecycle state machine diagram (pending → open → partially_filled → filled
      → cancelled)
    - KYC/AML onboarding flow with tier levels (retail vs institutional)
    - Tax reporting data model covers cost-basis methods (FIFO, LIFO, HIFO)
    - Stakeholder sign-off obtained
    depends_on:
    - 1
  REGULATORY:
    description: Prepare FinCEN MSB registration artifacts, map requirements to PCI
      DSS, SOC 2 Type II, and SOX controls. Produce compliance traceability matrix
      and gap analysis.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - FinCEN MSB registration checklist completed with all required documentation
    - PCI DSS v4.0 control mapping covers all 12 requirements with owner and evidence
      type
    - SOC 2 Trust Services Criteria mapped to system controls (Security, Availability,
      Confidentiality)
    - SOX control inventory for financial reporting assertions
    - Gap analysis identifies all open items with remediation owners and target dates
    - AML program document includes SAR filing procedures and Travel Rule compliance
      plan
    depends_on:
    - 2
  LEGAL:
    description: Draft Terms of Service, Privacy Policy, institutional custody agreement,
      and IP licensing review. Ensure alignment with FinCEN MSB, GDPR, and state money
      transmitter laws.
    agent_role: legal_advisor
    acceptance_criteria:
    - Terms of Service reviewed by legal counsel and covers liability limitations,
      account termination, and dispute resolution
    - Privacy Policy is GDPR-compliant with data subject rights procedures
    - Institutional Custody Agreement defines segregation of assets, insurance, and
      SLA
    - Open source license audit produces SBOM with no GPL license conflicts in commercial
      product
    - State money transmitter license applicability matrix for all 50 states
    depends_on:
    - 3
  SECURITY:
    description: Produce threat model (STRIDE), penetration test plan, SBOM, and security
      architecture for the trading platform covering custody key management, API authentication,
      and DDoS protection.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - STRIDE threat model covers all 5 system components with risk ratings
    - Penetration test plan defines scope, methodology, success criteria, and remediation
      SLA
    - SBOM generated for all dependencies with CVE scan showing no critical unmitigated
      vulnerabilities
    - 'Key management architecture documented: HSM vendor, key ceremony procedure,
      backup and recovery'
    - 'API authentication design: OAuth 2.0 + PKCE for users, HMAC-signed requests
      for institutional API'
    - DDoS mitigation plan at network and application layers
    - PCI DSS SAQ completed
    - Encryption at rest and in transit
    depends_on:
    - 3
  UX_DESIGN:
    description: Design wireframes and interaction flows for trading dashboard (orderbook,
      chart, order entry), portfolio tracker, tax report generator, and institutional
      custody portal.
    agent_role: ux_designer
    acceptance_criteria:
    - Wireframes delivered for all 6 screen categories at desktop and mobile breakpoints
    - Order entry panel supports limit, market, and stop orders with real-time validation
      feedback
    - Trading view wireframe integrates depth chart, order history, and live orderbook
      tick-by-tick
    - Tax report wizard covers date range selection, cost-basis method, and export
      formats (CSV, TurboTax)
    - WCAG 2.1 AA accessibility audit checklist completed
    - Design system component library documented with usage guidelines
    depends_on:
    - 2
  FINANCIAL:
    description: 'Build financial model: fee revenue projections, custody fee structure,
      tax reporting subscription pricing, exchange liquidity cost model, and operating
      cost breakdown.'
    agent_role: financial_analyst
    acceptance_criteria:
    - 5-year P&L model with monthly granularity for first 2 years
    - Break-even analysis showing volume required at each fee tier
    - Custody fee schedule benchmarked against Coinbase Prime and Anchorage
    - Unit economics per active trader documented (CAC, LTV, payback period)
    - Three scenario models with sensitivity analysis on trading volume assumptions
    depends_on:
    - 2
  PRODUCT_MGMT:
    description: Define product roadmap, MVP feature set vs. post-MVP, success metrics
      (KPIs), and prioritized backlog aligned with regulatory go-live milestones.
    agent_role: product_manager
    acceptance_criteria:
    - MVP feature list approved by stakeholders with clear inclusion/exclusion rationale
    - Prioritized backlog in tracking system with story points and sprint assignments
    - KPI dashboard spec with data sources and alert thresholds defined
    - Go-live milestone timeline aligned with FinCEN MSB registration completion
    - Launch readiness checklist covering compliance, security, and ops criteria
    depends_on:
    - 3
    - 7
  DATABASE:
    description: Design and implement database schema for users, accounts, orders,
      trades, positions, ledger entries, audit log, and tax lots. Produce migrations
      and seed data.
    agent_role: developer
    acceptance_criteria:
    - ERD covers all 10 tables with foreign key relationships and index strategy
    - Ledger table uses double-entry accounting model (debit/credit, asset_id, account_id)
    - Tax lot table supports FIFO/LIFO/HIFO cost-basis tracking with acquisition_date
      and basis_amount
    - Audit log is append-only (no UPDATE/DELETE permissions on audit role)
    - PII fields (SSN, address) encrypted using AES-256 with key stored in secrets
      manager
    - TimescaleDB hypertable configured for trade and orderbook data with retention
      policy
    - All migrations are idempotent and reversible
    - Seed data covers 3 test users, 5 trading pairs, and sample order history
    - Transaction isolation level documented
    - Audit trail on all writes
    depends_on:
    - 2
    - 5
  INFRA:
    description: 'Set up cloud infrastructure: VPC, Kubernetes cluster, HSM integration
      (AWS CloudHSM or Thales), secrets management, WAF, CDN, and multi-region failover
      for exchange availability.'
    agent_role: devops_engineer
    acceptance_criteria:
    - Terraform modules provision all components with no manual console steps
    - VPC uses private subnets for trading engine and database; public subnets only
      for load balancers
    - CloudHSM cluster initialized with key ceremony documented and access controls
      verified
    - WAF rules block OWASP Top 10 attack patterns and rate-limit order submission
      endpoints
    - 'Multi-region failover tested: RTO < 15 minutes, RPO < 1 minute for order data'
    - Secrets rotation automated via AWS Secrets Manager with zero-downtime rotation
      tested
    - DR runbook documented and tested with chaos engineering scenario
    depends_on:
    - 5
    - 9
  CONFIG:
    description: 'Configure the agentic AI pattern for the platform: Multi-Agent Coordinator
      (coordinator pattern) to route trading risk checks, compliance screening, and
      tax lot calculations to specialist agents with HITL gates for high-risk withdrawals.'
    agent_role: developer
    acceptance_criteria:
    - Coordinator agent routes incoming events to correct specialist agent based on
      event type
    - HITL gate pauses withdrawals matching threshold criteria and creates approval
      proposal
    - Approval queue UI shows risk score, transaction details, and AML flag reason
    - All agent decisions logged to audit_log with trace_id, agent_role, and outcome
    - Agent config declared in prompts.yaml and tasks.yaml — no hardcoded routing
      logic in Python
    depends_on:
    - 9
    - 10
  BACKEND:
    description: 'Implement the matching engine: price-time priority orderbook for
      limit orders, market order sweeping, stop order trigger engine, and trade settlement
      with atomic ledger updates.'
    agent_role: developer
    acceptance_criteria:
    - Limit order matching follows price-time priority (FIFO at same price level)
    - Market order sweeps book until filled or rejects with insufficient liquidity
      error
    - Stop orders trigger atomically when last trade price crosses stop price
    - 'Trade settlement uses DB transaction: debit buyer quote, credit buyer base,
      debit seller base, credit seller quote — all or nothing'
    - Duplicate order submission (same client_order_id) returns idempotent response,
      no double execution
    - p99 order-to-acknowledgment latency < 10ms under 1000 concurrent orders load
      test
    - Orderbook state persisted to Redis on every update for fast recovery
    depends_on:
    - 9
    - 10
  FRONTEND:
    description: 'Build trading dashboard: real-time orderbook depth display, candlestick/TradingView
      chart, order entry panel (limit/market/stop), open orders table, and trade history
      feed.'
    agent_role: developer
    acceptance_criteria:
    - Orderbook renders bid/ask levels with depth bars and updates < 100ms from WebSocket
      message
    - Order entry form validates quantity, price, and available balance client-side
      before submission
    - Stop order form shows stop price and limit price fields with tooltip explaining
      trigger logic
    - Open orders table supports cancel single order and cancel all with confirmation
      dialog
    - TradingView chart renders 1m/5m/1h/1d/1w intervals with OHLCV data
    - Page is responsive at 1280px, 1440px, and 1920px widths
    - Lighthouse performance score >= 85 on trading dashboard page
    depends_on:
    - 13
    - 6
  DEVOPS:
    description: Set up CI/CD pipeline, monitoring stack (Prometheus + Grafana), alerting
      (PagerDuty), distributed tracing (OpenTelemetry + Jaeger), and SRE runbooks
      for trading platform operations.
    agent_role: devops_engineer
    acceptance_criteria:
    - CI pipeline runs lint, unit tests, integration tests, and SAST scan on every
      PR — merge blocked on failure
    - Deployment pipeline supports blue-green deploy with automatic rollback on health
      check failure
    - 'Grafana dashboard covers: order submission rate, fill rate, matching engine
      queue depth, p50/p95/p99 latency'
    - PagerDuty alert fires within 60 seconds of matching engine health check failure
    - OpenTelemetry trace propagated from API gateway through matching engine to ledger
      write
    - 'SRE runbooks cover: matching engine restart, database failover, HSM connectivity
      loss, reconciliation failure'
    depends_on:
    - 10
    - 13
  COMPLIANCE:
    description: 'Produce SOC 2 Type II evidence artifacts: control narratives, risk
      assessment, vendor due diligence, change management policy, and incident response
      plan aligned with PCI DSS and SOX requirements.'
    agent_role: regulatory_specialist
    acceptance_criteria:
    - Control narratives written for all 5 Trust Services Criteria with mapped evidence
      sources
    - Risk assessment matrix scores all risks with inherent risk, control effectiveness,
      and residual risk
    - Vendor due diligence completed for all critical vendors (AWS, Jumio, Plaid,
      CloudHSM)
    - Incident response plan covers detection, containment, eradication, recovery,
      and post-mortem phases
    - Change management policy defines approval workflow, rollback procedures, and
      emergency change process
    - 'PCI DSS Requirement 10 evidence: log retention policy (12 months), log review
      procedure, SIEM alert rules'
    depends_on:
    - 3
    - 21
  TESTS:
    description: Write unit tests for matching engine (order priority, partial fills,
      stop triggers), tax lot calculator (FIFO/LIFO/HIFO), ledger double-entry invariants,
      and KYC/AML rule engine.
    agent_role: qa_engineer
    acceptance_criteria:
    - 'Matching engine tests cover: limit order full fill, partial fill, price-time
      priority, cancel, market order sweep, stop trigger'
    - 'Tax engine tests cover: FIFO gain calculation, HIFO lot selection, wash sale
      detection, crypto-to-crypto swap event'
    - 'Ledger tests verify double-entry invariant: sum(debits) == sum(credits) for
      every trade settlement'
    - Property-based tests run with Hypothesis generating 1000 random order sequences
      without invariant violation
    - 90% line coverage achieved on src/matching_engine/ and src/tax_engine/
    - Frontend tests cover order entry form validation, orderbook rendering, and WebSocket
      reconnection
    depends_on:
    - 12
    - 15
    - 16
  SYSTEM_TEST:
    description: 'End-to-end system tests: full order lifecycle (submit → match →
      settle → ledger update), custody withdrawal flow (policy check → HSM sign →
      broadcast), tax report generation, and load testing at 10x expected peak volume.'
    agent_role: system_tester
    acceptance_criteria:
    - 'Full retail trading flow E2E test: signup → KYC → deposit → place limit order
      → fill → withdraw → passes consistently'
    - Institutional custody withdrawal with 2-of-3 approvers completes end-to-end
      on testnet
    - Tax report for 10,000-trade account generates in < 30 seconds
    - 'Load test at 50,000 orders/minute: p99 latency < 20ms, zero order loss, zero
      double-execution'
    - 'Matching engine pod restart: orders resume processing within 30 seconds with
      no lost open orders'
    - 'Database primary failover: trading resumes within 15 minutes (RTO target)'
    depends_on:
    - 23
    - 17
    - 18
    - 19
    - 20
    - 21
  DOCS:
    description: Write API documentation (OpenAPI interactive docs), institutional
      onboarding guide, developer integration guide for HMAC-signed API, and internal
      runbook for compliance team (SAR filing, CTR reporting).
    agent_role: technical_writer
    acceptance_criteria:
    - OpenAPI spec published at /api/docs with working Try-It-Out for all public endpoints
    - Institutional onboarding guide covers account creation, custody agreement execution,
      API key generation, and policy setup
    - HMAC signing guide includes code samples in Python, JavaScript, and Go
    - 'Compliance runbook covers: CTR filing for transactions > $10,000, SAR filing
      workflow, OFAC match escalation procedure'
    - All documentation reviewed by legal and compliance before publication
    depends_on:
    - 13
    - 22
    - 24
  OPERATIONS:
    description: Define SLA, on-call rotation, capacity planning model, incident response
      procedure, and trading halt protocol (circuit breakers for extreme market volatility
      or system anomaly).
    agent_role: operations_manager
    acceptance_criteria:
    - SLA document signed and published on company website
    - Circuit breaker thresholds configured in matching engine and tested with simulated
      price spike
    - 'Trading halt procedure documented: who can halt, how to communicate to users,
      resumption checklist'
    - On-call runbook covers top 10 incident scenarios with decision tree and escalation
      path
    - Capacity planning spreadsheet built with traffic growth assumptions and scale
      trigger thresholds
    - Post-incident review template created and used after first incident drill
    depends_on:
    - 21
    - 24
  TRAINING:
    description: Create user onboarding guides, compliance team training materials
      (AML, SAR filing, OFAC procedures), and institutional client onboarding documentation.
    agent_role: technical_writer
    acceptance_criteria:
    - New user getting started guide covers account creation, KYC, first deposit,
      and first trade
    - AML training material covers transaction monitoring rules, escalation procedure,
      and SAR filing — reviewed by compliance officer
    - Institutional custody guide covers sub-account setup, withdrawal policy configuration,
      and API integration
    - In-app tooltip system covers all major UI elements on trading dashboard
    - Compliance training documented with completion tracking mechanism
    depends_on:
    - 25
    - 22
