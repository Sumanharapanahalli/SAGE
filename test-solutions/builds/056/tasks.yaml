task_types:
  BUSINESS_ANALYSIS:
    description: Define business requirements, user stories, and ROI model for the
      water quality monitoring system. Identify stakeholders (municipal utilities,
      environmental agencies, industrial facilities), document regulatory obligations
      (EPA Clean Water Act thresholds), and map current manual monitoring workflows
      to eliminate.
    agent_role: business_analyst
    acceptance_criteria:
    - Stakeholder map covers all primary and secondary users with RACI
    - User stories written for sensor calibration, alert management, EPA report generation,
      and trend dashboards
    - ROI model shows cost-per-sample reduction vs manual lab testing
    - Process flow diagrams cover normal operation, alert escalation, and compliance
      reporting cycles
    - Integration points with existing systems mapped
    - Migration plan drafted
    depends_on: []
  PRODUCT_MGMT:
    description: Write the Product Requirements Document (PRD) for water_quality_monitor.
      Define MVP scope (4 sensor types, real-time alerting, EPA report export), V2
      features (predictive anomaly detection, multi-site management), success metrics
      (alert latency <30s, report generation <60s, 99.5% uptime), and a 12-month roadmap.
    agent_role: product_manager
    acceptance_criteria:
    - PRD reviewed and signed off by business_analyst and ux_designer
    - MVP vs V2 feature boundary clearly documented with rationale
    - All KPIs have baseline targets and measurement methods defined
    - Roadmap aligns with EPA reporting calendar (quarterly/annual cycles)
    depends_on:
    - 1
  MARKET_RESEARCH:
    description: 'Analyze the water quality monitoring market: competitor landscape
      (YSI, Hach, In-Situ), pricing models (hardware + SaaS vs perpetual license),
      regulatory tailwinds (EPA PFAS rules, SDWA amendments), and positioning strategy
      for water_quality_monitor as a cloud-native, open-protocol alternative.'
    agent_role: marketing_strategist
    acceptance_criteria:
    - Competitor feature-price matrix completed for top 5 vendors
    - Differentiation narrative (3 key points) documented
    - Market sizing estimate with TAM/SAM/SOM for municipal and industrial segments
    - Go-to-market channel recommendations documented
    depends_on:
    - 1
  UX_DESIGN:
    description: 'Conduct user research with water utility operators and environmental
      compliance officers. Design wireframes for: real-time sensor dashboard, alert
      management inbox, trend analysis charts, EPA report builder, and sensor calibration
      wizard. Define accessibility requirements (WCAG 2.1 AA) and mobile-responsive
      breakpoints.'
    agent_role: ux_designer
    acceptance_criteria:
    - User research sessions completed with at least 3 operators and 2 compliance
      officers
    - Wireframes produced for all 6 core pages with annotated interaction flows
    - Mobile-responsive layout defined for dashboard and alert views
    - Calibration wizard covers 4-point calibration for all sensor types
    depends_on:
    - 2
  SECURITY:
    description: Produce a threat model for the IoT sensor network and cloud platform.
      Cover device identity (X.509 certificates), firmware OTA security, TLS 1.3 for
      sensor-to-cloud transport, API authentication (OAuth2 + JWT), data-at-rest encryption
      (AES-256), and IEC 62443 zone/conduit model. Generate initial SBOM for firmware
      and backend dependencies.
    agent_role: safety_engineer
    acceptance_criteria:
    - 'STRIDE threat model covers all 5 attack surfaces: device, transport, cloud
      API, web UI, admin console'
    - IEC 62443 security levels assigned to each zone (field devices SL-2, cloud platform
      SL-3)
    - SBOM generated listing all firmware and backend dependencies with CVE scan results
    - Mitigations documented for all HIGH and CRITICAL threats
    - Penetration test plan scoped and scheduled
    - Device identity provisioned
    - Firmware signing enabled
    depends_on:
    - 2
  COMPLIANCE:
    description: Map product requirements to IEC 62443, ISO 27001, and SOC 2 Type
      II controls. Produce compliance matrix tracing each control to implementation
      evidence artifacts. Define EPA reporting data retention policy (7 years), audit
      log requirements, and chain-of-custody for sensor calibration records.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - Compliance matrix maps each IEC 62443, ISO 27001 Annex A, and SOC 2 TSC control
      to a product feature or process
    - EPA 40 CFR Part 136 method references documented for each parameter
    - Data retention and deletion schedule documented and implemented in architecture
    - Calibration chain-of-custody workflow documented with electronic signature requirements
    depends_on:
    - 5
  LEGAL:
    description: Draft Terms of Service, Privacy Policy (GDPR + CCPA for location
      and monitoring data), and open-source license review for all third-party firmware
      and backend libraries. Review EPA data submission agreements and any state-level
      environmental reporting requirements.
    agent_role: legal_advisor
    acceptance_criteria:
    - Terms of Service covers SLA commitments, data ownership, and liability limitations
    - Privacy Policy addresses all sensor data and location data collection practices
    - OSS license scan completed with no GPL-incompatible licenses in commercial distribution
    - EPA data sharing agreements reviewed and data format compliance confirmed
    depends_on:
    - 6
  CONFIG:
    description: Bootstrap the water_quality_monitor SAGE solution from the starter
      template. Configure project.yaml (solution metadata, active_modules, theme),
      prompts.yaml (analyst, developer, compliance specialist roles with water-quality
      domain context), and tasks.yaml (sensor_calibration, alert_triage, epa_report_generation,
      trend_analysis task types). Set up the multi-agent coordinator pattern for orchestrating
      firmware, backend, and compliance agents.
    agent_role: developer
    acceptance_criteria:
    - project.yaml validates against SAGE schema with all required fields populated
    - prompts.yaml defines analyst, developer, and regulatory_specialist roles with
      water-quality system prompts
    - tasks.yaml registers all 5 custom task types with descriptions and required
      fields
    - Solution loads cleanly via `make run PROJECT=water_quality_monitor` with no
      import errors
    - Coordinator agent pattern configured to route firmware tasks to developer, compliance
      tasks to regulatory_specialist
    depends_on:
    - 2
  DATABASE:
    description: 'Design and implement the time-series database schema for sensor
      readings. Use TimescaleDB (PostgreSQL extension) with hypertables partitioned
      by time. Tables: sensor_nodes, readings (pH, turbidity, dissolved_oxygen, conductivity,
      timestamp, node_id), alert_events, calibration_records, epa_report_snapshots.
      Implement data retention policies and continuous aggregates for hourly/daily
      rollups.'
    agent_role: developer
    acceptance_criteria:
    - All hypertables created with correct partitioning and compression policies
    - Continuous aggregates refresh automatically on new data insertion
    - 'Retention policy enforced: raw data compressed after 30 days, deleted after
      7 years'
    - Write throughput benchmarked at >10,000 readings/second for 1,000-node deployments
    - Schema migrations versioned with Alembic
    depends_on:
    - 8
  FIRMWARE:
    description: 'Implement embedded firmware for the sensor node (ESP32-S3 or STM32U5
      microcontroller). HAL drivers for: Atlas Scientific pH EZO circuit (UART), Dfrobot
      Turbidity sensor (analog ADC), Atlas Scientific DO EZO (UART), Atlas Scientific
      EC EZO (UART/I2C). FreeRTOS tasks: sensor_sample_task (1Hz), connectivity_task
      (MQTT over TLS), calibration_task (on-demand), OTA_update_task. Implement circular
      buffer for offline data buffering (24h at 1Hz).'
    agent_role: developer
    acceptance_criteria:
    - All 4 sensor HAL drivers implemented with error detection and retry logic
    - 'FreeRTOS task priorities set: connectivity > sensor_sample > calibration >
      OTA'
    - Offline circular buffer stores 86,400 readings and replays on reconnect with
      no data loss
    - 'OTA update validated: firmware signature verified before applying, rollback
      on boot failure'
    - 'Power consumption measured: <150mA active, <5mA deep sleep'
    - Firmware compiles cleanly for ESP32-S3 target with zero warnings at -Wall
    - OTA update mechanism implemented
    - Watchdog timer configured
    depends_on:
    - 8
    - 5
  BACKEND:
    description: 'Build the cloud backend service (FastAPI + Python). Endpoints: MQTT
      broker bridge (EMQX) → ingestion pipeline → TimescaleDB. REST API: sensor nodes
      CRUD, readings query (with time range, aggregation), alert management, calibration
      record submission, EPA report generation (PDF + JSON), trend analysis (rolling
      averages, threshold breach counts). Implement the multi-agent coordinator for
      automated anomaly detection and alert triage using SAGE agent framework.'
    agent_role: developer
    acceptance_criteria:
    - MQTT ingestion pipeline handles 10,000 msg/s with <100ms end-to-end latency
    - Alert engine evaluates all threshold rules within 5 seconds of reading arrival
    - EPA report endpoint generates a compliant PDF report in <60 seconds for 90-day
      dataset
    - Trend analysis endpoint returns 7/30/90-day rolling averages with anomaly flags
    - All endpoints authenticated via OAuth2 JWT; unauthorized requests return 401
    - OpenAPI spec auto-generated and matches all implemented endpoints
    depends_on:
    - 9
    - 8
  AGENTIC:
    description: 'Implement the AI anomaly detection and alert triage agent using
      the multi-agent coordinator pattern. Coordinator routes incoming sensor anomalies
      to: (1) Analyst Agent — performs root cause analysis using historical patterns
      and vector memory, (2) Alert Triage Agent — classifies severity and recommends
      response, (3) Compliance Agent — checks if reading breaches EPA thresholds and
      triggers report generation. All proposals go through HITL approval gate before
      escalation actions.'
    agent_role: developer
    acceptance_criteria:
    - Coordinator correctly routes anomaly events to all 3 specialist agents in parallel
    - Analyst agent retrieves prior similar anomalies from vector memory within 2
      seconds
    - EPA threshold check produces a structured proposal with violation details and
      recommended action
    - All escalation and report-generation proposals enter HITL approval queue — none
      auto-execute
    - 'Feedback loop: operator approval/rejection stored in vector memory for future
      context retrieval'
    depends_on:
    - 11
  FRONTEND:
    description: 'Build the React 18 + TypeScript dashboard for water_quality_monitor
      following SAGE UI patterns. Pages: real-time sensor dashboard (4 gauge cards
      + sparklines), alert inbox (sortable by severity/time), trend analysis (recharts
      line charts with EPA threshold overlays), EPA report builder (date picker +
      parameter selector + PDF export), sensor node management, calibration wizard
      (step-by-step 4-point calibration UI). Use SAGE ThemeProvider with water_quality_monitor
      theme colors.'
    agent_role: developer
    acceptance_criteria:
    - Dashboard displays live readings for all 4 parameters with color-coded threshold
      status (green/yellow/red)
    - Alert inbox supports filter by severity, sensor node, and date range; bulk acknowledge
      works
    - Trend charts render 90-day history in <2s with EPA threshold reference lines
      overlaid
    - EPA report builder validates date range and selected parameters before generating
      PDF
    - Calibration wizard completes full 4-point pH calibration in <10 clicks
    - All pages pass WCAG 2.1 AA automated audit with zero critical violations
    - Mobile layout renders correctly at 375px viewport for dashboard and alerts
    depends_on:
    - 11
    - 4
    - 8
  INFRA:
    description: 'Provision cloud infrastructure using Terraform. Components: Kubernetes
      cluster (EKS/GKE) for backend + EMQX broker, TimescaleDB on RDS, S3/GCS for
      report storage, CloudFront/CDN for frontend, VPC with IEC 62443 zone segmentation
      (OT network zone for MQTT, IT zone for API, DMZ for web), WAF rules, DDoS protection.
      Define IaC for all environments (dev, staging, prod).'
    agent_role: devops_engineer
    acceptance_criteria:
    - All infrastructure defined as Terraform modules with no manual console steps
    - 'VPC zone segmentation enforced: MQTT broker in OT zone, API in IT zone, no
      direct OT→internet path'
    - WAF rules block OWASP Top 10 attack patterns on all public endpoints
    - RDS TimescaleDB automated backups every 6 hours with 30-day retention
    - 'DR runbook tested: RTO achieved in <60 minutes, RPO data loss <15 minutes'
    - Cost estimate for 1,000-node deployment documented in infra/COST_ESTIMATE.md
    depends_on:
    - 11
    - 5
  DEVOPS:
    description: 'Build CI/CD pipelines for firmware (PlatformIO + GitHub Actions),
      backend (pytest + Docker build + Kubernetes deploy), and frontend (Vite build
      + Playwright E2E + CDN deploy). Add monitoring stack: Prometheus + Grafana dashboards
      for MQTT throughput, ingestion latency, alert engine lag, and sensor uptime.
      PagerDuty integration for P0/P1 alerts. SRE runbooks for common failure modes.'
    agent_role: devops_engineer
    acceptance_criteria:
    - Firmware CI pipeline builds and flashes to hardware emulator on every PR
    - Backend CI runs full pytest suite and blocks merge on any test failure
    - Blue/green deployment achieves zero-downtime deploys for backend
    - Grafana dashboard shows MQTT throughput, p99 ingestion latency, and alert engine
      lag with SLO burn rate
    - PagerDuty fires within 2 minutes of sensor ingestion pipeline failure
    - All 4 SRE runbooks reviewed and include rollback steps
    depends_on:
    - 14
    - 10
    - 11
  EMBEDDED_TEST:
    description: 'Write firmware unit tests (Unity framework) and HIL test specs for
      all 4 sensor drivers. Unit tests: HAL driver data parsing, calibration math
      (Nernst equation for pH, DO percent saturation), MQTT message serialization,
      offline buffer replay logic. HIL test harness: simulate sensor signal injection
      via DAC, verify RTOS task scheduling under high-load, validate OTA rollback
      on simulated power-cut mid-flash.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Unit test coverage ≥90% for all HAL driver and calibration math modules
    - pH Nernst equation unit test validates against reference values at 4 calibration
      points
    - HIL test confirms RTOS tasks maintain correct priorities under 100% CPU load
      simulation
    - 'OTA rollback test: firmware correctly reverts to prior version after simulated
      power loss at 50% flash progress'
    - 'Offline buffer replay test: 86,400 buffered readings uploaded in correct chronological
      order with zero gaps'
    depends_on:
    - 10
  TESTS:
    description: 'Write backend unit and integration tests (pytest). Cover: MQTT ingestion
      pipeline, alert threshold evaluation engine, TimescaleDB continuous aggregate
      refresh, EPA report generation (field completeness, unit compliance), OAuth2
      JWT validation, multi-tenant data isolation, and the SAGE coordinator agent
      routing logic.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Backend test coverage ≥85% across all modules
    - 'Alert threshold engine test: 100 edge-case readings evaluated with correct
      severity classifications'
    - 'EPA report test: generated PDF passes field-completeness check against EPA
      method requirements'
    - 'Multi-tenant isolation test: tenant A cannot read tenant B readings via any
      API path'
    - 'Coordinator agent routing test: anomaly events delivered to all 3 specialist
      agents within timeout'
    - All tests run against real TimescaleDB via TestContainers — no mock database
    depends_on:
    - 11
    - 12
  QA:
    description: 'Design the QA test plan covering: sensor reading accuracy validation
      (against NIST-traceable calibration standards), alert latency SLA (≤30s end-to-end
      from reading to notification), report generation correctness (EPA field mapping),
      UI functional testing (all 6 pages), and regression test suite for firmware
      + backend releases.'
    agent_role: qa_engineer
    acceptance_criteria:
    - QA test plan documents all test cases with pass/fail criteria and traceability
      to PRD requirements
    - Sensor accuracy test cases specify acceptable tolerance ranges per EPA QA/QC
      procedures
    - Alert latency test measures end-to-end time from MQTT publish to PagerDuty/email
      notification
    - UI functional test suite covers all 6 pages with 100% coverage of primary user
      flows
    - Regression suite runs in <15 minutes in CI to enable fast feedback on each release
    depends_on:
    - 16
    - 17
  SYSTEM_TEST:
    description: 'Execute end-to-end system tests across the full stack: physical
      (or simulated) sensor nodes → MQTT → ingestion → TimescaleDB → alert engine
      → SAGE agents → frontend. Test scenarios: normal operation at 1Hz for 1,000
      nodes, EPA threshold breach triggering alert + compliance proposal, sensor offline
      detection, firmware OTA update without data loss, concurrent EPA report generation
      for 10 users.'
    agent_role: system_tester
    acceptance_criteria:
    - 1,000-node simulation at 1Hz sustained for 24 hours with zero data loss
    - 'EPA threshold breach: alert generated and HITL proposal in approval queue within
      30 seconds'
    - 'Sensor offline: node marked offline in dashboard within 90 seconds of last
      heartbeat'
    - 'OTA update: 100 nodes updated simultaneously with no reading gaps longer than
      10 seconds'
    - 10 concurrent EPA report generations complete without errors or data cross-contamination
    - 'System performance: p99 API latency <200ms, MQTT ingestion p99 <100ms under
      full load'
    - Load test simulates expected concurrent users
    - Failover scenario tested
    depends_on:
    - 15
    - 17
    - 13
  OPERATIONS:
    description: 'Write operational runbooks for water_quality_monitor. Cover: sensor
      node onboarding (provisioning, certificate issuance, first calibration), alert
      escalation procedures (P1/P2/P3 severity matrix), EPA report submission workflow,
      planned maintenance windows, incident response for data integrity breaches,
      and capacity planning model for scaling to 10,000 nodes.'
    agent_role: operations_manager
    acceptance_criteria:
    - Sensor onboarding runbook enables a new node to be live in <15 minutes by a
      non-developer operator
    - Alert escalation matrix defines P1/P2/P3 criteria with notification paths and
      SLA response times
    - EPA report submission runbook includes pre-submission checklist and submission
      confirmation steps
    - Data integrity incident response runbook covers detection, containment, and
      regulatory notification steps
    - Capacity planning model shows infrastructure cost and performance projections
      at 1K/5K/10K nodes
    depends_on:
    - 19
    - 15
  TRAINING:
    description: 'Produce user training materials for three audiences: (1) Field Operators
      — sensor installation, calibration, and maintenance guide; (2) Water Quality
      Managers — dashboard navigation, alert management, and trend interpretation
      guide; (3) Compliance Officers — EPA report generation, data export, and audit
      trail guide. Include quick-reference cards and a video script for each audience.'
    agent_role: technical_writer
    acceptance_criteria:
    - Field operator guide covers unboxing, mounting, wiring, network provisioning,
      and 4-point calibration for all sensors
    - Manager guide covers all 6 dashboard pages with annotated screenshots
    - Compliance officer guide walks through full EPA report generation and data export
      workflow
    - Each guide reviewed by one representative user from each audience group
    - Video scripts timed and include screen capture call-outs
    - Admin guide separate from end-user guide
    - Role-based training paths defined
    depends_on:
    - 13
    - 20
  DOCS:
    description: 'Write technical documentation: API reference (auto-generated OpenAPI
      + narrative), firmware developer guide (build system, sensor driver integration,
      RTOS task architecture), solution architecture diagram, data model reference,
      and SAGE solution README for water_quality_monitor covering setup, configuration,
      and extension points.'
    agent_role: technical_writer
    acceptance_criteria:
    - API reference covers all endpoints with request/response examples and error
      codes
    - Firmware developer guide enables a new engineer to build and flash the firmware
      in <30 minutes
    - Architecture diagram shows all components from sensor node to dashboard with
      data flow arrows
    - 'Solution README verified: `make run PROJECT=water_quality_monitor` works end-to-end
      following README steps alone'
    - All docs reviewed by developer team for accuracy before release
    depends_on:
    - 19
    - 21
