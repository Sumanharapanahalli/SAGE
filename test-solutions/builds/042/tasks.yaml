task_types:
  MARKET_RESEARCH:
    description: 'Analyze headless ecommerce market: competitor storefronts (Shopify
      Hydrogen, Commerce.js, BigCommerce), positioning for headless vs monolithic,
      target buyer personas, and GTM strategy.'
    agent_role: marketing_strategist
    acceptance_criteria:
    - Competitor feature matrix covering search, cart, checkout, SSR capabilities
    - Documented buyer personas (2-3) with jobs-to-be-done
    - GTM strategy with channel recommendations and launch timeline
    - Positioning statement distinguishing headless_storefront value prop
    depends_on: []
  FINANCIAL:
    description: Build financial model covering infrastructure costs (Vercel/CDN,
      Algolia, Medusa hosting), Shopify API tier costs, projected revenue scenarios,
      and pricing strategy for the storefront platform.
    agent_role: financial_analyst
    acceptance_criteria:
    - Monthly infrastructure cost estimate for 3 traffic tiers (1k, 10k, 100k sessions/month)
    - Break-even analysis at each tier
    - Shopify API plan comparison with cost impact documented
    - Algolia record/operation costs modeled against expected catalog size
    depends_on:
    - 1
  UX_DESIGN:
    description: 'Conduct user research and produce wireframes for: product listing
      page (PLP), product detail page (PDP), search results with Algolia InstantSearch,
      cart drawer, multi-step checkout flow, and mobile-first responsive layout.'
    agent_role: ux_designer
    acceptance_criteria:
    - Low-fidelity wireframes for all 8 pages reviewed by stakeholder
    - Mobile and desktop breakpoints documented for each page
    - Accessibility audit checklist completed — color contrast, keyboard nav, ARIA
      roles
    - Checkout flow UX validated against 3 usability test participants
    - Component inventory produced (button variants, form fields, product card)
    depends_on:
    - 1
  LEGAL:
    description: Draft terms of service, privacy policy (GDPR/CCPA), cookie consent
      policy, and IP/licensing review for third-party dependencies (Algolia SDK, Medusa,
      Next.js).
    agent_role: legal_advisor
    acceptance_criteria:
    - Privacy policy covers all data collected (session, payment tokenization, search
      queries)
    - Cookie consent banner implementation spec included
    - Dependency license audit completed — no GPL conflicts in production bundle
    - 'PCI DSS scope reduction documented: cardholder data handled by Shopify/Stripe,
      not stored locally'
    - Return/refund policy drafted
    - Consumer protection compliance checked
    depends_on: []
  SECURITY:
    description: 'Perform threat model for the headless storefront: API key exposure,
      XSS via product content, CSRF on cart mutations, Algolia API key scoping, PCI
      DSS SAQ-A scope definition, and dependency SBOM.'
    agent_role: regulatory_specialist
    acceptance_criteria:
    - STRIDE threat model completed for all API surfaces
    - Algolia search-only API key restrictions documented and verified in config
    - PCI DSS SAQ-A self-assessment questionnaire completed with all applicable items
      passing
    - SBOM generated listing all production dependencies with CVE scan results
    - CSP headers, HSTS, and X-Frame-Options defined in security policy doc
    - Payment flow PCI compliant
    - Fraud detection rules defined
    depends_on:
    - 4
  PRODUCT_MGMT:
    description: 'Define product requirements document (PRD): feature list, MVP scope,
      success metrics (Core Web Vitals, conversion rate, cart abandonment), and phased
      roadmap.'
    agent_role: product_manager
    acceptance_criteria:
    - PRD defines in-scope and out-of-scope features for v1
    - Success metrics measurable and baselined
    - Phased roadmap with v1 (MVP), v1.5 (personalization), v2 (loyalty) defined
    - Dependency on Shopify vs Medusa backend documented as decision with tradeoffs
    depends_on:
    - 1
    - 2
  API:
    description: 'Design the API contract layer: Storefront API abstraction (Shopify
      Storefront GraphQL vs Medusa REST), cart service API, search API wrapper for
      Algolia, and OpenAPI/GraphQL schema for frontend consumption.'
    agent_role: developer
    acceptance_criteria:
    - GraphQL schema covers product, variant, collection, cart, checkout types
    - Medusa REST endpoints mapped for catalog, cart, order flows
    - 'Algolia index schema defined: product attributes, facets, ranking rules'
    - Error response contracts standardized across all services
    - API versioning strategy documented
    depends_on:
    - 6
  CONFIG:
    description: 'Initialize monorepo structure: Next.js 14 App Router frontend, Medusa
      backend service, shared TypeScript types package, environment variable schema
      (.env.example), and ESLint/Prettier/TypeScript configs.'
    agent_role: developer
    acceptance_criteria:
    - 'pnpm workspace with packages: apps/web, apps/backend (if Medusa), packages/types'
    - TypeScript strict mode enabled across all packages
    - Environment variables typed via zod schema validation at startup
    - 'Husky pre-commit hooks: lint + type-check passing'
    - README with local dev setup instructions verified by running from scratch
    depends_on:
    - 7
  DATABASE:
    description: 'Set up Medusa database schema: products, variants, collections,
      customers, carts, orders tables. Configure PostgreSQL with migrations. If using
      Shopify only, document data model and skip migration setup.'
    agent_role: developer
    acceptance_criteria:
    - All Medusa v2 core entity migrations run successfully on clean PostgreSQL instance
    - Seed script populates 50+ test products across 5 collections
    - ERD diagram generated and reviewed
    - Database indexes defined on frequently queried fields (product handle, variant
      sku)
    - Connection pooling configured for production load
    depends_on:
    - 8
  BACKEND:
    description: 'Implement Medusa v2 backend: product catalog APIs, cart service
      (create, add item, update quantity, remove, apply discount), customer auth (register,
      login, JWT), and order creation endpoint.'
    agent_role: developer
    acceptance_criteria:
    - GET /products returns paginated list with variants and images
    - POST /carts creates cart and returns cart_id
    - POST /carts/:id/line-items adds product variant to cart
    - PATCH /carts/:id/line-items/:lid updates quantity, returns updated cart totals
    - POST /customers/auth returns signed JWT with 1h expiry and refresh token
    - All endpoints return consistent JSON error shape {code, message, details}
    - Rate limiter returns 429 after threshold with Retry-After header
    depends_on:
    - 9
  FRONTEND:
    description: 'Implement Next.js 14 App Router foundation: layout, navigation,
      ThemeProvider, Cart context (Zustand), font optimization, and root error boundary.
      Implement SSR data fetching pattern with React Server Components.'
    agent_role: developer
    acceptance_criteria:
    - Root layout renders with correct HTML lang, meta charset, viewport
    - Cart context initializes from localStorage on hydration without flicker
    - 'Navigation responsive: hamburger menu on mobile, horizontal links on desktop'
    - Error boundary catches and displays user-friendly error UI
    - React Server Component page renders with zero client JS for static content
    depends_on:
    - 8
    - 3
  COMPLIANCE:
    description: 'Produce PCI DSS SAQ-A compliance artifacts: scoping document confirming
      cardholder data handled solely by Stripe/Shopify, network segmentation notes,
      annual compliance attestation template, and evidence checklist.'
    agent_role: regulatory_specialist
    acceptance_criteria:
    - SAQ-A questionnaire completed with pass/N/A for all 22 requirements
    - 'Scope reduction document signed off: confirms Stripe as payment processor,
      no PAN storage'
    - Stripe webhook signature verification documented as compensating control
    - Annual review schedule defined
    - HTTPS-only enforcement documented (HSTS header, redirect from HTTP)
    depends_on:
    - 5
    - 11
  DEVOPS:
    description: 'Set up CI/CD pipeline (GitHub Actions): lint, type-check, unit tests,
      E2E tests (Playwright), Vercel preview deployments on PR, production deployment
      on main merge. Add Dependabot for dependency updates.'
    agent_role: devops_engineer
    acceptance_criteria:
    - CI pipeline completes in under 8 minutes on PR
    - Preview URL posted as PR comment with Vercel deployment link
    - Production deployment gated on all CI checks passing
    - Secrets (STRIPE_SECRET_KEY, ALGOLIA_ADMIN_KEY) stored in GitHub Secrets, not
      in code
    - Dependabot configured for weekly dependency updates on both npm and Docker
    - 'Rollback procedure documented: revert commit triggers automatic Vercel rollback'
    depends_on:
    - 8
  INFRA:
    description: 'Define infrastructure: Vercel project config (rewrites, headers
      for CSP/HSTS/cache), Medusa backend Dockerfile, PostgreSQL on managed service
      (Railway/Supabase), Redis for Medusa cache, environment variable management.'
    agent_role: devops_engineer
    acceptance_criteria:
    - Dockerfile builds Medusa backend image under 500MB
    - 'docker-compose.yml runs full local stack: web + backend + postgres + redis'
    - 'vercel.json defines security headers: CSP, HSTS, X-Content-Type-Options'
    - 'Cache-Control headers set: product pages 60s stale-while-revalidate, cart/checkout
      no-cache'
    - All secrets injected via environment variables — no hardcoded credentials
    - Infrastructure cost estimate matches financial model (step 2)
    depends_on:
    - 19
  TESTS:
    description: 'Write unit and integration tests: Medusa service unit tests (Jest),
      cart state Zustand store tests, API route tests with supertest, and Algolia
      sync subscriber tests with mocked Algolia client.'
    agent_role: qa_engineer
    acceptance_criteria:
    - 'CartService unit tests cover: create, addItem, updateQuantity, removeItem,
      applyDiscount'
    - Algolia sync subscriber tests verify indexing called on product.created event
    - Stripe webhook handler tests cover succeeded and failed payment scenarios
    - 80%+ line coverage achieved on all service files
    - Tests run in under 60 seconds in CI
    - No test relies on real external API calls (all mocked)
    depends_on:
    - 10
    - 11
    - 12
  QA:
    description: 'Create QA test plan: functional test cases for all user journeys,
      cross-browser matrix (Chrome, Firefox, Safari, mobile), accessibility validation
      (axe-core), and performance budget checklist.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Test plan covers all 5 user journeys with step-by-step test cases
    - Browser matrix executed with pass/fail for each journey per browser
    - axe-core scan returns 0 critical violations on PLP, PDP, cart, checkout
    - 'Lighthouse CI scores: Performance > 90, Accessibility > 95, SEO > 95 on PDP'
    - Mobile viewport tested at 375px (iPhone SE) and 390px (iPhone 14)
    depends_on:
    - 14
    - 15
    - 16
    - 17
  SYSTEM_TEST:
    description: 'Write Playwright E2E test suite: full purchase flow (browse → search
      → PDP → cart → checkout → confirmation), cart persistence across page reload,
      search facet filtering, and Stripe test card scenarios.'
    agent_role: system_tester
    acceptance_criteria:
    - Full purchase flow test completes without manual intervention using Stripe test
      mode
    - Cart persists across browser refresh (localStorage hydration verified)
    - Search filter test confirms results narrow correctly with each facet
    - Declined card test verifies error message displayed and cart not cleared
    - All E2E tests pass in CI against preview deployment
    - E2E suite completes in under 5 minutes
    depends_on:
    - 21
    - 22
  OPERATIONS:
    description: 'Define operational runbooks: deployment procedure, rollback steps,
      Algolia reindex runbook, database backup/restore, incident response for checkout
      outage, and SLA definitions (99.9% uptime, <2s TTFB).'
    agent_role: operations_manager
    acceptance_criteria:
    - Deployment runbook includes pre-deploy checklist and smoke test steps
    - Rollback runbook executable in under 5 minutes
    - Algolia reindex runbook covers full catalog reindex without downtime
    - SLA document defines measurement methodology and exclusions
    - Incident response runbook assigns on-call roles and escalation path
    - 'Monitoring alerts configured for: error rate > 1%, p95 latency > 3s, payment
      failure spike'
    depends_on:
    - 19
    - 20
  DOCS:
    description: 'Write developer documentation: local setup guide, environment variable
      reference, architecture decision records (ADRs) for Medusa vs Shopify and Algolia
      choice, API reference, and solution README.'
    agent_role: technical_writer
    acceptance_criteria:
    - 'Local setup guide verified: new developer can run full stack from scratch following
      only README'
    - All environment variables documented with type, required/optional, and example
      values
    - Three ADRs written with context, decision, and consequences sections
    - API reference covers all Medusa endpoints used by frontend
    - 'Architecture diagram (Mermaid) shows data flow: Browser → Next.js → Medusa/Shopify
      → Algolia → Stripe'
    depends_on:
    - 23
    - 18
