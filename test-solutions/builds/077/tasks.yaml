task_types:
  BUSINESS_ANALYSIS:
    description: Define business requirements, user personas, and process flows for
      the collaborative flashcard app. Identify learner, educator, and team-study
      personas. Map COPPA/FERPA data handling requirements for under-13 users and
      student records.
    agent_role: business_analyst
    acceptance_criteria:
    - At least 3 user personas documented with goals, pain points, and data sensitivity
      flags
    - COPPA applicability decision documented with consent flow defined for under-13
      users
    - FERPA data categories identified for educator use cases
    - 'Core user journeys mapped: create deck, study session, share deck, view statistics'
    depends_on: []
  MARKET_RESEARCH:
    description: Analyse competitor flashcard apps (Anki, Quizlet, Brainscape, Remnote).
      Identify differentiators for collaborative + spaced repetition + media support
      combination. Define positioning and go-to-market strategy.
    agent_role: marketing_strategist
    acceptance_criteria:
    - Feature comparison matrix covering top 4 competitors
    - 3+ clear differentiation points documented
    - Target market segment and TAM estimate provided
    - Pricing model recommendation with rationale
    depends_on:
    - 1
  PRODUCT_MGMT:
    description: Write the Product Requirements Document (PRD), feature roadmap (MVP
      vs v2), and define success metrics (DAU, retention D7/D30, cards studied per
      session, sync latency P95).
    agent_role: product_manager
    acceptance_criteria:
    - PRD approved with MVP scope locked — no gold-plating in v1
    - Success metrics defined with baseline targets and measurement method
    - Feature roadmap distinguishes MVP from v2 backlog
    - HITL approval checkpoints identified for content moderation and data deletion
      flows
    depends_on:
    - 1
    - 2
  UX_DESIGN:
    description: Conduct user research, create wireframes for all core flows (onboarding,
      deck creation, study session, statistics dashboard, sharing), and perform WCAG
      2.1 AA accessibility audit on designs. Design must support image and audio card
      layouts.
    agent_role: ux_designer
    acceptance_criteria:
    - Wireframes cover all 7 core flows with annotated interaction notes
    - WCAG 2.1 AA audit checklist completed — contrast ratios, keyboard nav, screen
      reader labels verified
    - Image and audio card editor supports alt-text and transcript fields
    - Study session UI includes progress indicator and SR schedule visibility
    - Designs reviewed and signed off by at least one representative user from each
      persona
    - Accessibility for learners with disabilities
    - Mobile-responsive for student devices
    depends_on:
    - 3
  COMPLIANCE:
    description: Produce compliance artifacts for COPPA, FERPA, and WCAG 2.1. Define
      parental consent flow, student data access/deletion procedures, and accessibility
      conformance statement. Create data flow diagram showing PII boundaries.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - Data flow diagram identifies all PII fields and storage locations
    - 'Parental consent flow documented for users under 13: opt-in, revocation, data
      deletion within 30 days'
    - 'FERPA: educator access controls and audit trail requirements documented'
    - WCAG 2.1 AA conformance statement template completed with known exceptions
    - Compliance artifacts stored in docs/compliance/ and version-controlled
    depends_on:
    - 3
    - 4
  LEGAL:
    description: Draft Terms of Service, Privacy Policy (COPPA-compliant for under-13),
      and data retention/deletion policy. Review open-source licensing for any SR
      algorithm libraries used.
    agent_role: legal_advisor
    acceptance_criteria:
    - Privacy Policy includes verifiable parental consent mechanism for COPPA compliance
    - Data retention periods defined for card data, study stats, and user accounts
    - GDPR right-to-erasure procedure documented
    - All third-party libraries audited for license compatibility (MIT/Apache preferred)
    - FERPA/COPPA compliance if minors involved
    depends_on:
    - 5
  DATABASE:
    description: Design the relational schema for users, decks, cards (with media
      references), study sessions, SR schedule state (SM-2 parameters per card per
      user), collaborators, and statistics aggregates. Include schema migrations and
      seed data.
    agent_role: developer
    acceptance_criteria:
    - ERD covers all tables with FK relationships and indexes on hot query paths
    - SR schedule table stores SM-2 state per (user_id, card_id) with next_review_date
      indexed
    - Card media table stores blob_url, media_type (image/audio), alt_text, transcript
      fields
    - deck_collaborators table has role field (owner/editor/viewer) with RLS policy
      sketch
    - Alembic migration scripts run cleanly from empty DB to full schema
    - Seed data script creates sample decks with image and audio cards for dev testing
    depends_on:
    - 3
  CONFIG:
    description: Set up the monorepo structure, toolchain configs (ESLint, Prettier,
      mypy), environment variable management (.env.example), Docker Compose for local
      dev (PostgreSQL, Redis, object storage), and configure the multi-agent coordinator
      pattern for AI-assisted card generation.
    agent_role: devops_engineer
    acceptance_criteria:
    - docker-compose up starts all local services without manual steps
    - .env.example documents all required environment variables with descriptions
    - ESLint + Prettier configs enforced via pre-commit hooks
    - mypy strict mode enabled for backend Python source
    - Multi-agent coordinator config scaffolded in src/agents/coordinator.py with
      task routing stubs
    depends_on:
    - 7
  BACKEND:
    description: 'Implement the core FastAPI backend: user auth (JWT + OAuth), deck
      CRUD, card CRUD with image/audio upload to object storage, SM-2 spaced repetition
      scheduler, study session recording, statistics aggregation, and real-time sync
      via WebSocket or SSE.'
    agent_role: developer
    acceptance_criteria:
    - SM-2 scheduler correctly computes next_review_date after each answer (quality
      0-5)
    - Image and audio uploads validated (type, size limit), stored in object storage,
      URL returned
    - 'Deck sharing: collaborator can read/edit based on role; non-collaborator gets
      403'
    - Study queue endpoint returns cards due today ordered by overdue days descending
    - WebSocket sync broadcasts deck/card changes to all connected collaborators within
      500ms
    - All endpoints return OpenAPI-compatible responses; schema exported to openapi.json
    - COPPA flag on user record prevents under-13 data from analytics pipelines
    depends_on:
    - 7
    - 8
  API:
    description: Define and publish the full OpenAPI 3.1 spec for all backend endpoints.
      Include request/response schemas, error codes, authentication requirements,
      and rate limit headers. Generate client SDKs for web and mobile.
    agent_role: developer
    acceptance_criteria:
    - openapi.json validates against OpenAPI 3.1 schema without errors
    - All 20+ endpoints documented with request bodies, response schemas, and error
      codes
    - Generated TypeScript client compiles without type errors
    - Rate limit headers (X-RateLimit-Limit, X-RateLimit-Remaining) present in responses
    depends_on:
    - 9
  FRONTEND:
    description: 'Build the React web app: onboarding, deck library, rich card editor
      (text + image + audio with WCAG alt-text fields), study session UI with SM-2
      self-rating (0-5), statistics dashboard with charts, deck sharing UI, and real-time
      sync status indicator.'
    agent_role: developer
    acceptance_criteria:
    - Card editor accepts image upload (JPEG/PNG/WebP ≤5MB) and audio recording/upload
      (MP3/WAV ≤10MB)
    - All images require alt-text field; all audio requires transcript field (WCAG
      1.1.1)
    - Study session shows card front, flip action, then SM-2 quality rating buttons
      (0-5 with labels)
    - 'Statistics dashboard shows: cards studied today, streak, retention rate, deck
      heatmap'
    - Deck sharing modal allows invite by email with role selector (editor/viewer)
    - Sync indicator shows connected/offline/syncing states; offline edits queue locally
    - All interactive elements keyboard-navigable; focus rings visible; colour contrast
      ≥4.5:1
    depends_on:
    - 10
    - 4
  AGENTIC:
    description: 'Implement the Multi-Agent Coordinator pattern for AI-assisted card
      generation. Coordinator receives a topic/document, routes to specialist agents:
      ContentExtractor (identifies key concepts), CardDraftAgent (generates Q&A pairs),
      MediaSuggestionAgent (suggests image search terms), CriticAgent (scores card
      quality and flags duplicates). Output: reviewed card batch for human approval
      before import.'
    agent_role: developer
    acceptance_criteria:
    - Coordinator correctly decomposes a 500-word text into 5-15 card drafts
    - Critic agent rejects cards scoring <0.6 clarity with specific feedback
    - HITL approval gate presents card batch for review — no cards imported without
      human sign-off
    - Duplicate detection flags cards with >80% semantic similarity to existing deck
      cards
    - End-to-end latency for 10-card batch generation ≤30s on standard LLM provider
    depends_on:
    - 9
    - 8
  DATA:
    description: 'Build the study statistics pipeline: real-time event ingestion (study_answer
      events), daily aggregation jobs (retention rate, due-vs-studied ratio, forgetting
      curve fit per deck), and analytics schema for the statistics dashboard.'
    agent_role: data_scientist
    acceptance_criteria:
    - study_answer events written within 100ms of answer submission
    - Daily aggregation job completes for 100k users in ≤10 minutes
    - 'Retention rate calculated as: cards recalled (quality≥3) / cards due, per 7-day
      window'
    - Forgetting curve parameters (initial stability, decay) estimated per user per
      deck
    - Statistics API returns user dashboard data in ≤200ms via pre-aggregated tables
    depends_on:
    - 9
  LOCALIZATION:
    description: Set up i18n infrastructure for web and mobile. Extract all user-facing
      strings, configure react-i18next, create translation files for English (base),
      Spanish, French, and German. Implement locale-aware date formatting for SR schedule
      display.
    agent_role: localization_engineer
    acceptance_criteria:
    - Zero hardcoded user-facing strings in web or mobile source — all in locale JSON
      files
    - Spanish, French, German translation files cover 100% of en keys (no fallback
      gaps)
    - SR next_review_date displays in locale-appropriate date format (e.g., DD/MM
      vs MM/DD)
    - RTL layout tested in Arabic locale (future-proofing) — no layout breakage
    - Translation files pass JSON lint and key coverage check in CI
    depends_on:
    - 11
    - 12
  SECURITY:
    description: 'Perform security review: threat model for user-generated media uploads,
      authentication flows, deck sharing access control, and FERPA student data access.
      Define SBOM, run SAST scan, and document pen test plan.'
    agent_role: developer
    acceptance_criteria:
    - Threat model covers all 5 threat areas with mitigations documented
    - 'Media uploads: file type validated server-side (not just extension), antivirus
      scan stub in place'
    - Card HTML content sanitised server-side to prevent stored XSS
    - 'IDOR test: user A cannot access user B''s private deck via direct ID'
    - SAST scan shows zero high/critical findings in backend Python source
    - SBOM generated and stored in docs/security/sbom.spdx
    depends_on:
    - 9
    - 11
  TESTS:
    description: Write unit tests for the SM-2 algorithm, deck sharing permission
      logic, media upload validation, statistics aggregation functions, and offline
      sync conflict resolution. Target ≥85% coverage on core business logic modules.
    agent_role: qa_engineer
    acceptance_criteria:
    - 'SM-2 algorithm tests cover: new card first review, correct answer, incorrect
      answer, graduated card, lapsed card'
    - 'Permission tests assert: owner can edit/delete, editor can edit, viewer cannot
      edit, non-collaborator gets 403'
    - 'Media upload tests validate: type rejection (e.g., .exe), size limit, missing
      alt-text warning'
    - 'Conflict resolution test: offline edit wins vs server edit based on timestamp
      comparison'
    - pytest --cov reports ≥85% line coverage on src/core/ and src/agents/
    - All tests pass in CI with no flaky tests over 3 consecutive runs
    depends_on:
    - 9
    - 13
    - 14
  QA:
    description: 'Design and execute the QA test plan: functional test cases for all
      user flows, exploratory testing of SM-2 scheduling edge cases, media playback
      across browsers/devices, accessibility audit using axe-core and screen reader
      testing.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Test plan covers all PRD user stories with pass/fail criteria
    - 'SM-2 edge cases tested: quality=0 after long streak resets interval to 1 day'
    - Audio playback tested on Chrome, Safari, Firefox — no silent failures
    - axe-core automated scan returns zero critical or serious violations on all main
      pages
    - NVDA screen reader can complete a full study session without visual cues
    - QA sign-off report produced listing all defects found, severity, and resolution
      status
    depends_on:
    - 11
    - 12
    - 17
  SYSTEM_TEST:
    description: 'Execute end-to-end system tests: multi-user collaboration scenario,
      cross-platform sync (web edits reflected on mobile within 2s), offline study
      with sync recovery, load test study session API at 1000 concurrent users.'
    agent_role: system_tester
    acceptance_criteria:
    - 'Playwright E2E: User A edits deck, User B sees update within 2s on web'
    - 'Offline scenario: 20 answers submitted offline, all synced correctly after
      reconnection'
    - 'Cross-platform sync: card edited on web appears on mobile within 2s P95'
    - 'Load test: 1000 concurrent study session submissions at P99 ≤500ms backend
      latency'
    - No data loss or corruption in any system test scenario across 10 runs
    depends_on:
    - 17
    - 18
  DEVOPS:
    description: 'Set up CI/CD pipeline (GitHub Actions): lint, type-check, unit tests,
      build, Docker image push, deploy to staging on PR merge, production deploy on
      release tag. Configure monitoring (Prometheus + Grafana), error tracking (Sentry),
      and uptime alerts.'
    agent_role: devops_engineer
    acceptance_criteria:
    - CI pipeline runs in ≤8 minutes on PR; fails fast on lint or type errors
    - Docker images tagged with git SHA and pushed to registry on main merge
    - Staging deploy runs smoke tests against /health endpoint before marking success
    - 'Grafana dashboard shows: request rate, p50/p99 latency, error rate, sync queue
      depth'
    - Sentry captures unhandled exceptions with user context (anonymised, GDPR-compliant)
    - PagerDuty alert fires within 3 minutes of p99 latency SLA breach
    depends_on:
    - 19
  TRAINING:
    description: 'Create user-facing training materials: onboarding tutorial (in-app
      + video walkthrough), educator guide for creating and sharing decks, spaced
      repetition explainer (why SR works, how to interpret the schedule), and help
      centre articles.'
    agent_role: technical_writer
    acceptance_criteria:
    - In-app onboarding covers 5 core flows with skip option and progress indicator
    - 5-minute video walkthrough published covering deck creation, study session,
      and sharing
    - SR explainer accurately describes SM-2 parameters in plain language (no formulas
      required)
    - Educator guide includes FERPA compliance notes for classroom use
    - Help centre articles cover top 10 support questions identified in user research
    depends_on:
    - 18
    - 4
  DOCS:
    description: 'Write developer documentation: API reference (auto-generated from
      OpenAPI), architecture decision records (ADRs) for SR algorithm choice and sync
      strategy, local dev setup guide, and contribution guide.'
    agent_role: technical_writer
    acceptance_criteria:
    - API reference auto-generated from openapi.json and published to docs site
    - 'ADR for SM-2: documents alternatives considered (SM-5, FSRS), rationale for
      SM-2 choice'
    - 'Local dev setup: new developer can run full stack with one command following
      the guide'
    - Compliance summary links to COPPA, FERPA, WCAG artifacts in docs/compliance/
    - All docs pass spell-check and link-check in CI
    depends_on:
    - 10
    - 20
