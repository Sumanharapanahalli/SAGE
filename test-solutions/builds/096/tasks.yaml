task_types:
  BUSINESS_ANALYSIS:
    description: Define business requirements, user personas, and process flows for
      the internal communications platform covering channels, threads, file sharing,
      video, directory, and admin controls.
    agent_role: business_analyst
    acceptance_criteria:
    - BRD approved by at least 2 stakeholders
    - 'User personas defined for: end user, IT admin, HR manager'
    - Process flows cover all 6 feature areas
    - ROI model shows payback period with assumptions documented
    - Integration points with existing systems mapped
    - Migration plan drafted
    depends_on: []
  PRODUCT_MGMT:
    description: Produce product requirements document (PRD), feature roadmap, prioritization
      matrix, and success metrics for the internal_comms platform.
    agent_role: product_manager
    acceptance_criteria:
    - PRD covers all 6 feature areas with acceptance criteria per feature
    - Roadmap defines MVP vs post-MVP scope
    - Success metrics include DAU, message latency P95, uptime SLA, and adoption rate
    - Prioritization matrix signed off by product and engineering leads
    depends_on:
    - 1
  LEGAL:
    description: Draft terms of service, privacy policy, data retention policy, and
      IP/licensing review for the internal communications platform.
    agent_role: legal_advisor
    acceptance_criteria:
    - Privacy policy covers data collected, retention periods, and employee rights
    - Terms of service reviewed by legal counsel
    - OSS license inventory completed with no copyleft conflicts
    - Data retention policy defines TTLs for messages, files, and audit logs
    depends_on:
    - 1
  COMPLIANCE:
    description: Create compliance framework mapping platform controls to ISO 27001
      Annex A and SOC 2 Trust Service Criteria. Produce initial risk matrix and control
      evidence templates.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - Every ISO 27001 Annex A control has an owner and implementation status
    - SOC 2 CC1-CC9 criteria mapped to platform features
    - Risk register contains likelihood, impact, and mitigation per risk
    - Evidence collection plan defines artifact type, owner, and cadence per control
    depends_on:
    - 1
    - 3
  UX_DESIGN:
    description: Conduct user research and produce wireframes and interaction designs
      for channels, threads, file sharing, video conferencing, employee directory,
      and IT admin console.
    agent_role: ux_designer
    acceptance_criteria:
    - Wireframes cover all 6 feature areas and mobile-responsive layouts
    - User research conducted with minimum 5 representative users
    - Accessibility audit shows WCAG 2.1 AA compliance plan
    - Interaction design reviewed and approved by product manager
    depends_on:
    - 2
  SECURITY:
    description: Produce threat model, security architecture design, and penetration
      test plan for the internal communications platform. Define encryption-at-rest
      and in-transit requirements.
    agent_role: regulatory_specialist
    acceptance_criteria:
    - STRIDE threat model covers all external-facing surfaces
    - Security architecture defines auth, authz, encryption, and secrets management
    - Pentest plan covers OWASP Top 10, API security, and privilege escalation
    - SBOM generated and no critical CVEs in direct dependencies
    depends_on:
    - 2
    - 4
  API:
    description: 'Design OpenAPI 3.1 specifications for all platform APIs: messaging,
      channels, threads, file management, video signaling, employee directory, and
      IT admin endpoints.'
    agent_role: developer
    acceptance_criteria:
    - All endpoints have request/response schemas with examples
    - Error responses follow RFC 7807 Problem Details format
    - All APIs pass OpenAPI linting with zero errors
    - Auth requirements documented per endpoint
    depends_on:
    - 2
    - 5
    - 6
  DATABASE:
    description: Design and implement database schema for users, channels, messages,
      threads, attachments, reactions, employee directory, and audit logs. Include
      migrations and seed data.
    agent_role: developer
    acceptance_criteria:
    - Schema supports soft deletes and message edit history
    - All foreign keys and indexes documented
    - Migrations are idempotent and reversible
    - Audit_events table captures actor, action, resource, and timestamp for SOC 2
    depends_on:
    - 7
  CONFIG:
    description: Set up the agentic AI pattern (multi_agent_coordinator) configuration
      for the internal_comms platform. Configure coordinator agent for smart notifications,
      content moderation suggestions, and meeting summarization.
    agent_role: developer
    acceptance_criteria:
    - project.yaml defines all active modules and agent roles
    - prompts.yaml contains system prompts for coordinator, notification, moderation,
      and summary agents
    - 'tasks.yaml registers task types: summarize_thread, flag_content, batch_notifications,
      summarize_meeting'
    - Config validated by SAGE framework loader without errors
    depends_on:
    - 2
  BACKEND:
    description: 'Build the core messaging backend: real-time WebSocket server, channel
      management, threaded messaging, message persistence, reactions, and @mentions
      with notification fanout.'
    agent_role: developer
    acceptance_criteria:
    - Message delivery latency P95 < 200ms under 1000 concurrent users
    - WebSocket reconnects automatically with message catch-up on disconnect
    - Edit and delete history retained for audit compliance
    - Mentions trigger push notification within 1 second
    depends_on:
    - 7
    - 8
  FRONTEND:
    description: 'Build the main messaging UI: channel sidebar, message feed, threaded
      replies panel, rich text composer with attachments, emoji reactions, and search
      interface.'
    agent_role: developer
    acceptance_criteria:
    - Message feed renders 1000 messages with virtual scrolling without frame drops
    - File uploads show progress bar and preview on completion
    - Search results highlight matched terms and filter by channel, date, and author
    - UI matches approved wireframes at mobile (375px), tablet (768px), and desktop
      (1280px)
    depends_on:
    - 5
    - 10
    - 11
  TESTS:
    description: 'Write unit and integration tests for all backend services: messaging,
      file sharing, directory, admin controls, and video signaling.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Overall code coverage >= 80% across all backend services
    - All API endpoints have at least one happy-path and one error-path test
    - Integration tests run against real Postgres and Redis (no mocks for persistence
      layer)
    - Tests pass in CI in under 5 minutes
    depends_on:
    - 10
    - 11
    - 12
    - 13
    - 14
  QA:
    description: Develop QA test plan, test case suite, and exploratory testing charters
      covering all 6 feature areas. Include regression, usability, and security acceptance
      tests.
    agent_role: qa_engineer
    acceptance_criteria:
    - Test plan reviewed and approved by product manager
    - Test cases cover all PRD acceptance criteria
    - Security acceptance tests include MFA bypass attempt, privilege escalation,
      and file access control
    - Exploratory charters defined for each feature area with session time-boxes
    depends_on:
    - 2
    - 5
    - 6
  INFRA:
    description: 'Set up infrastructure as code for the internal_comms platform: Kubernetes
      manifests, Helm charts, PostgreSQL HA cluster, Redis cluster, Elasticsearch,
      MinIO, and mediasoup node pool.'
    agent_role: devops_engineer
    acceptance_criteria:
    - All infra is reproducible from code with a single `terraform apply`
    - PostgreSQL HA with automatic failover < 30 seconds
    - Secrets stored in Vault or K8s Secrets with RBAC access controls
    - Staging environment mirrors production topology
    depends_on:
    - 8
    - 9
  DEVOPS:
    description: Set up CI/CD pipelines, monitoring (Prometheus + Grafana), alerting,
      log aggregation, and SRE runbooks for the internal_comms platform.
    agent_role: devops_engineer
    acceptance_criteria:
    - CI pipeline runs lint, tests, and security scan on every PR
    - CD pipeline deploys to staging automatically on main merge, production requires
      manual approval
    - SLO dashboards display error budget burn rate with 7-day and 30-day windows
    - Alerting fires within 2 minutes of SLO breach
    depends_on:
    - 21
  SYSTEM_TEST:
    description: 'Execute system-level end-to-end tests covering cross-service flows:
      user onboarding via SCIM → channel join → message send with attachment → video
      call → admin audit log verification.'
    agent_role: system_tester
    acceptance_criteria:
    - All critical user journeys pass E2E without manual intervention
    - Load test at 5000 concurrent users keeps message latency P95 < 200ms
    - Video conferencing load test with 50 active rooms (20 participants each) shows
      CPU < 80%
    - Audit log captures every action in the E2E run with correct actor attribution
    - Load test simulates expected concurrent users
    - Failover scenario tested
    depends_on:
    - 19
    - 20
    - 15
    - 16
    - 17
    - 18
  OPERATIONS:
    description: Define SLA agreements, operational runbooks for incident response,
      on-call rotation, capacity planning model, and disaster recovery procedures.
    agent_role: operations_manager
    acceptance_criteria:
    - SLA document defines uptime targets, measurement methodology, and credit schedule
    - Incident response runbook covers P1-P4 severity with escalation paths and communication
      templates
    - Disaster recovery runbook tested with a tabletop exercise
    - Capacity planning model forecasts storage and compute for 12 months at 3 growth
      scenarios
    depends_on:
    - 22
  TRAINING:
    description: Produce end-user onboarding guide, IT admin configuration guide,
      video tutorial scripts, and quick-reference cards for the internal_comms platform.
    agent_role: technical_writer
    acceptance_criteria:
    - User guide covers account setup, channel navigation, messaging, file sharing,
      and video calls
    - Admin guide covers SSO setup, user provisioning, RBAC, audit log export, and
      retention policies
    - Video scripts for top 5 user journeys reviewed and approved by UX designer
    - Quick reference card fits on one A4 page and covers daily use cases
    - Admin guide separate from end-user guide
    - Role-based training paths defined
    depends_on:
    - 15
    - 16
    - 17
    - 18
  DOCS:
    description: Write developer API documentation, architecture decision records
      (ADRs), deployment runbook, and internal engineering wiki pages.
    agent_role: technical_writer
    acceptance_criteria:
    - API docs auto-generated from OpenAPI specs and hosted at /docs
    - At least 4 ADRs covering major architectural decisions with alternatives considered
    - Deployment runbook validated by a junior engineer doing a dry-run deployment
    - Architecture diagram reviewed by tech lead
    depends_on:
    - 7
    - 21
    - 22
