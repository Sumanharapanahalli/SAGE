task_types:
  MARKET_RESEARCH:
    description: 'Analyze the food delivery market: competitor landscape (DoorDash,
      Uber Eats, Grubhub), pricing models, restaurant acquisition strategies, driver
      incentive structures, and go-to-market positioning for a new entrant.'
    agent_role: marketing_strategist
    acceptance_criteria:
    - Competitor feature matrix covering at least 4 major platforms
    - Commission fee benchmarks for restaurant partners
    - Driver pay model comparison (per-delivery vs hourly)
    - Identified top 3 differentiators for food_delivery positioning
    - Estimated TAM/SAM/SOM for initial launch market
    depends_on: []
  PRODUCT_MGMT:
    description: 'Write the Product Requirements Document for food_delivery covering
      all six feature areas: restaurant discovery, menu browsing, cart management,
      real-time order tracking, driver assignment, and rating system. Define success
      metrics and phased roadmap.'
    agent_role: product_manager
    acceptance_criteria:
    - PRD covers all six named feature areas with user stories per persona
    - Each feature has defined acceptance criteria and edge cases
    - P0/P1/P2 priority tiers assigned to all features
    - 'Success metrics defined: order conversion rate, avg delivery time, driver utilization,
      NPS'
    - '3-phase roadmap: MVP, growth, scale'
    depends_on:
    - 1
  UX_DESIGN:
    description: 'Conduct user research and produce wireframes for three app surfaces:
      customer app (discovery → cart → tracking → rating), restaurant dashboard (order
      management, menu editor), and driver app (assignment accept, navigation, delivery
      confirmation).'
    agent_role: ux_designer
    acceptance_criteria:
    - 'Customer app flow covers: home discovery, search/filter, restaurant page, menu,
      cart, checkout, tracking screen, post-delivery rating'
    - 'Restaurant dashboard covers: live order queue, menu CRUD, hours/availability
      toggle'
    - 'Driver app covers: available orders list, accept/decline, turn-by-turn pickup
      & dropoff screens, earnings summary'
    - Accessibility audit completed (WCAG 2.1 AA targets identified)
    - Wireframes validated with at least 3 user interviews per persona
    - App store screenshot mockups prepared
    - Onboarding flow under 3 steps
    depends_on:
    - 2
  LEGAL:
    description: Draft Terms of Service, Privacy Policy, Driver Independent Contractor
      Agreement, and Restaurant Partner Agreement. Map data retention requirements
      for location data (GDPR/CCPA).
    agent_role: legal_advisor
    acceptance_criteria:
    - Privacy policy explicitly covers real-time location data collection and retention
      window
    - Driver agreement classifies drivers as independent contractors with gig-economy
      clauses
    - Restaurant agreement covers commission structure, payout schedule, and dispute
      resolution
    - GDPR/CCPA data subject rights (access, deletion, portability) addressed in privacy
      policy
    - PCI DSS scope documented for payment card handling
    depends_on:
    - 2
  SECURITY:
    description: Produce a threat model and security architecture for food_delivery
      covering authentication, payment card data, real-time location streams, driver
      identity verification, and API attack surfaces.
    agent_role: analyst
    acceptance_criteria:
    - STRIDE threat model covering all six product surfaces
    - Payment flow scoped to PCI DSS SAQ A-EP (tokenized, no card storage)
    - Location data encrypted in transit (TLS 1.3) and at rest
    - Driver identity verification flow designed (government ID + selfie liveness
      check)
    - API rate limiting and auth token rotation policies defined
    - OWASP Mobile Top 10 checklist completed for both customer and driver apps
    depends_on:
    - 2
  DATABASE:
    description: 'Design the complete database schema for food_delivery: users, restaurants,
      menus, menu_items, orders, order_items, drivers, assignments, ratings, and real-time
      location tables. Include indexing strategy and migration files.'
    agent_role: developer
    acceptance_criteria:
    - ERD covers all entities with FK relationships and cardinality
    - 'orders table has status enum: PENDING, ACCEPTED, PREPARING, READY, PICKED_UP,
      DELIVERED, CANCELLED'
    - driver_locations uses PostGIS POINT type with spatial index for proximity queries
    - Soft-delete pattern applied to restaurants and menu_items
    - Alembic migration files generated and tested on clean PostgreSQL instance
    - Redis data structures defined for cart (HASH), order pub/sub (CHANNEL), and
      driver location (GEO)
    depends_on:
    - 3
    - 5
  API:
    description: Design the OpenAPI 3.1 specification for all food_delivery REST +
      WebSocket endpoints covering auth, restaurant discovery, menu, cart, orders,
      driver assignment, real-time tracking, and ratings.
    agent_role: developer
    acceptance_criteria:
    - OpenAPI spec validates with no errors via swagger-cli
    - All endpoints have request/response schemas with examples
    - 'WebSocket protocol documented: connection, message types (DRIVER_LOCATION,
      STATUS_UPDATE, ETA), disconnect'
    - Pagination strategy defined (cursor-based) for restaurant and menu listing
    - Error response schema consistent across all endpoints (code, message, details)
    - Rate limit headers documented (X-RateLimit-*)
    depends_on:
    - 3
    - 5
  CONFIG:
    description: 'Scaffold the food_delivery monorepo with packages: api (FastAPI),
      customer-app (React Native), driver-app (React Native), restaurant-dashboard
      (React), shared types. Set up Docker Compose for local development with Postgres,
      Redis, and PostGIS.'
    agent_role: developer
    acceptance_criteria:
    - docker-compose up starts all services with health checks passing
    - pnpm install succeeds from repo root; all workspaces resolve
    - Environment variable schema documented in .env.example for each package
    - 'Makefile targets: dev, test, build, lint, migrate'
    - 'Pre-commit hooks configured: ruff (Python), eslint+prettier (TS)'
    - README includes first-run setup instructions verified on clean machine
    depends_on:
    - 6
    - 7
  BACKEND:
    description: 'Implement authentication service: customer/restaurant/driver registration,
      JWT login, refresh token rotation, email verification, password reset, and OAuth2
      (Google Sign-In for customers).'
    agent_role: developer
    acceptance_criteria:
    - POST /auth/register creates user with hashed password and sends verification
      email
    - POST /auth/login returns access_token (15min TTL) and refresh_token (30d TTL,
      rotated on use)
    - POST /auth/refresh issues new token pair and invalidates old refresh token in
      Redis
    - GET /auth/google/callback handles OAuth2 code exchange and creates or links
      account
    - 'Role-based claims in JWT: customer | restaurant_operator | driver | admin'
    - 'Brute-force protection: 5 failed logins triggers 15-minute lockout'
    depends_on:
    - 8
  LOCALIZATION:
    description: Set up i18n/l10n for all three app surfaces (customer app, driver
      app, restaurant dashboard) supporting English (default), Spanish, and French.
      Configure locale-aware currency, date/time, and distance formatting.
    agent_role: localization_engineer
    acceptance_criteria:
    - All user-facing strings extracted to translation keys; zero hardcoded display
      strings
    - 'Currency formatted per locale: $12.50 (en-US), $12.50 MXN (es-MX), 12,50 €
      (fr-FR)'
    - Distance shown in miles (en-US) and km (es-MX, fr-FR)
    - Date/time formatted per locale in order history and tracking ETA
    - RTL layout groundwork in place (even if no RTL language launched initially)
    - Language selector available in customer app settings; persisted to user profile
    - Top 5 target locales identified
    - Store listing translated
    depends_on:
    - 8
  FRONTEND:
    description: 'Build the customer React Native app: home screen with restaurant
      discovery map + list, search and filter UI, restaurant detail page, menu browsing
      with item customization modal, cart drawer, and checkout flow.'
    agent_role: developer
    acceptance_criteria:
    - Home screen shows restaurants on map and in scrollable list sorted by distance
    - Search bar filters by name/cuisine with debounce (300ms); results update in
      real-time
    - Restaurant detail page shows hours, rating, estimated delivery time, and menu
      grouped by category
    - Menu item modal supports quantity, special instructions, and dietary tag display
    - Cart persists across app sessions (React Query + backend Redis sync)
    - Checkout screen shows cart summary, delivery address picker, and Stripe payment
      sheet
    depends_on:
    - 10
    - 11
    - 15
  DATA:
    description: 'Build the analytics data pipeline: event streaming from order lifecycle
      to analytics schema, daily aggregation jobs for restaurant revenue reports,
      driver earnings reports, and platform-level metrics (GMV, orders/day, avg delivery
      time).'
    agent_role: data_scientist
    acceptance_criteria:
    - fact_orders table populated with all completed orders including GMV, delivery_time_minutes,
      commission
    - dim_restaurant and dim_driver dimension tables updated nightly
    - Daily aggregation job runs at 02:00 UTC and completes within 10 minutes for
      100k orders/day
    - 'Platform metrics API endpoint /admin/metrics returns: daily GMV, orders_count,
      avg_delivery_time, active_drivers'
    - Restaurant revenue report available via /restaurants/{id}/analytics?period=30d
    - 'Data pipeline idempotent: rerunning for same date produces identical results'
    depends_on:
    - 11
    - 12
    - 14
  DEVOPS:
    description: 'Set up CI/CD pipelines for all packages: GitHub Actions workflows
      for lint, test, build, and deploy. Container builds pushed to ECR. ECS Fargate
      deployment for API. Expo EAS Build for mobile apps. Monitoring with CloudWatch
      + Sentry.'
    agent_role: devops_engineer
    acceptance_criteria:
    - 'PR to main triggers: lint, type-check, unit tests, build — all must pass before
      merge'
    - 'Merge to main triggers: Docker build, ECR push, ECS blue/green deploy with
      automated rollback on health check failure'
    - EAS Build triggered on version tag; produces .ipa and .apk submitted to TestFlight
      / Play Internal Track
    - Sentry DSN configured for all three apps; source maps uploaded on each build
    - 'CloudWatch alarms: API p99 latency > 2s, error rate > 1%, ECS CPU > 80% → PagerDuty'
    - Deployment to production requires manual approval step in GitHub Actions workflow
    depends_on:
    - 16
    - 17
    - 18
    - 19
  INFRA:
    description: 'Provision production AWS infrastructure with Terraform: VPC, ECS
      Fargate cluster, RDS PostgreSQL with PostGIS, ElastiCache Redis cluster, ALB,
      S3 buckets, CloudFront CDN, Route53, and ACM certificates.'
    agent_role: devops_engineer
    acceptance_criteria:
    - terraform plan produces zero errors on clean AWS account
    - RDS instance is Multi-AZ with automated backups retained 14 days
    - ECS tasks run in private subnets; only ALB is internet-facing
    - S3 bucket for images is private; all access via CloudFront signed URLs
    - Redis cluster has in-transit and at-rest encryption enabled
    - Terraform state stored in S3 with DynamoDB lock table
    - All resources tagged with environment, project=food_delivery, and team
    depends_on:
    - 21
  TESTS:
    description: 'Write unit and integration tests for all backend services: auth,
      restaurant/menu, cart/order, driver assignment, tracking, and rating. Target
      80% line coverage minimum.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Unit tests cover all service-layer functions with happy path and at least 2
      error cases each
    - Integration tests cover all API endpoints using TestClient against real PostgreSQL
      + Redis
    - Stripe webhook handler tested with fixture payloads for payment_intent.succeeded
      and .payment_failed
    - Order state machine tested for all valid and invalid transitions
    - 'Driver assignment algorithm tested: nearest driver selection, timeout reassignment,
      no-available-driver case'
    - Coverage report shows ≥80% line coverage across src/; enforced in CI as required
      check
    depends_on:
    - 9
    - 10
    - 11
    - 12
    - 13
    - 14
  QA:
    description: 'Develop the QA test plan covering all six product features: manual
      test cases for restaurant discovery, menu, cart, order flow, tracking accuracy,
      driver assignment, and rating. Include regression suite, device matrix, and
      performance benchmarks.'
    agent_role: qa_engineer
    acceptance_criteria:
    - Test plan document covers all six feature areas with ≥10 test cases each
    - Critical path regression suite identified (30 test cases maximum for fast regression
      run)
    - 'Performance test suite defined using k6 targeting: 1000 concurrent users, 500
      active order tracking connections'
    - Device compatibility matrix signed off covering 4 devices (2 iOS, 2 Android)
    - Usability test protocol defined with 5 tasks per persona and success criteria
    - 'Bug severity classification defined: P1 (blocker), P2 (major), P3 (minor),
      P4 (trivial)'
    depends_on:
    - 3
  SYSTEM_TEST:
    description: Execute end-to-end system test suite covering the full customer order
      journey (discovery → payment → tracking → rating), the driver assignment and
      delivery flow, and the restaurant acceptance workflow. Run performance tests
      under load.
    agent_role: system_tester
    acceptance_criteria:
    - Full order happy path E2E test passes on all 4 devices in device matrix
    - 'Driver reassignment scenario: original driver does not accept within 90s, next
      driver assigned within 10s'
    - 'k6 load test: 1000 concurrent users placing orders, p99 latency < 500ms, error
      rate < 0.1%'
    - 500 concurrent WebSocket tracking connections sustained for 10 minutes with
      no message drop
    - Order cancellation tested at PENDING, ACCEPTED, and PREPARING states; refund
      flow verified
    - All P1 and P2 bugs resolved before sign-off; P3/P4 documented in backlog
    depends_on:
    - 23
    - 24
    - 21
  TRAINING:
    description: 'Produce user-facing documentation and onboarding materials for all
      three personas: customer quick-start guide, restaurant operator onboarding guide
      (with menu setup walkthrough), and driver onboarding guide (account verification,
      first delivery walkthrough).'
    agent_role: technical_writer
    acceptance_criteria:
    - 'Customer guide covers: account creation, placing first order, tracking, and
      submitting a rating (with screenshots)'
    - 'Restaurant operator guide covers: account setup, adding menu items with images,
      managing hours, and handling an order — verified with real operator beta tester'
    - 'Driver guide covers: identity verification steps, going online, accepting a
      delivery, proof-of-delivery photo, and viewing earnings'
    - In-app tooltip triggers identified for key friction points (cart, checkout payment,
      driver online toggle)
    - Video scripts written for 3 explainer videos (one per persona), each under 90
      seconds
    - Help center searchable with at least 20 articles covering common support questions
    depends_on:
    - 17
    - 18
    - 19
  OPERATIONS:
    description: 'Write operational runbooks for food_delivery production: incident
      response playbooks (API down, payment failure, driver assignment failure, tracking
      outage), on-call rotation setup, SLA definitions, and capacity planning model.'
    agent_role: operations_manager
    acceptance_criteria:
    - 'Each runbook includes: trigger condition, immediate mitigation steps, root
      cause investigation steps, escalation path, and communication template'
    - 'Database failover runbook tested in staging: RDS failover to standby completes
      with < 30s downtime'
    - PagerDuty on-call schedule configured with primary and secondary escalation
    - SLA definitions documented and acceptance criteria for each measurable in CloudWatch
    - Capacity model projects infrastructure costs at 10k, 50k, and 100k orders/day
    - Post-incident review template included in runbook package
    depends_on:
    - 22
    - 25
  DOCS:
    description: 'Write engineering documentation: API reference (auto-generated from
      OpenAPI spec), architecture decision records (ADRs) for key choices (WebSocket
      vs SSE, Redis GEO for driver proximity, Stripe tokenization), developer onboarding
      README, and deployment guide.'
    agent_role: technical_writer
    acceptance_criteria:
    - OpenAPI spec renders correctly in Swagger UI with all endpoints explorable
    - 'Each ADR documents: context, decision, consequences, and alternatives considered'
    - Developer README verified by new team member completing setup in < 30 minutes
      on clean machine
    - 'Deployment guide covers: staging deploy, production deploy, rollback procedure,
      and secret rotation'
    - Architecture diagram (C4 context + container level) included in docs/
    - CHANGELOG.md initialized with v1.0.0 entry
    depends_on:
    - 25
