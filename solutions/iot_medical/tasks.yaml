# ==============================================================================
# SAGE Solution — iot_medical: Task Types
# Medical IoT Device — IEC 62304 Class C
# ==============================================================================
# All task types below are defined for the medical IoT device solution.
# Agents reference task_descriptions for planning; task_payloads define
# the required fields for each task submission.
# ==============================================================================

task_types:
  # --- Hardware-in-the-Loop Testing ---
  - HIL_TEST_FIRMWARE         # Flash firmware to HIL hardware + run test suite
  - ANALYZE_DEVICE_LOG        # Triage a device log entry or field complaint event
  - REVIEW_FIRMWARE_CHANGE    # Safety-focused IEC 62304 Class C code review

  # --- Risk Management (ISO 14971) ---
  - GENERATE_HAZARD_ANALYSIS  # Create or update ISO 14971 hazard analysis document
  - UPDATE_RISK_REGISTER      # Update risk register with new or changed risk entries
  - GENERATE_CAPA             # Generate a Corrective and Preventive Action document

  # --- Regulatory Affairs ---
  - REVIEW_510K_SECTION       # Review a section of an FDA 510(k) submission
  - GENERATE_SBOM             # Generate Software Bill of Materials (FDA requirement)
  - CYBERSECURITY_ASSESSMENT  # Assess a component or system for cybersecurity risks

  # --- Verification & Validation ---
  - GENERATE_TEST_PROTOCOL    # Create HIL or bench test protocol from requirements
  - REVIEW_TEST_RESULTS       # Review test results for IEC 62304 §5.5-5.7 acceptability
  - UPDATE_DHF                # Update Design History File with new regulatory evidence

  # --- General (inherited from starter) ---
  - ANALYZE_LOG               # General log analysis (non-device events)
  - REVIEW_MR                 # GitLab merge request code review
  - CREATE_MR                 # Create GitLab MR from issue description
  - MONITOR_CHECK             # Monitoring cycle across integrations
  - PLAN_TASK                 # Planner agent task decomposition
  - SWE_TASK                  # Autonomous SWE agent for general coding tasks


task_descriptions:
  HIL_TEST_FIRMWARE:        "Flash firmware binary to HIL hardware and execute the registered test suite. Produces IEC 62304 §5.6-5.7 evidence."
  ANALYZE_DEVICE_LOG:       "Triage a device log entry, field complaint, or adverse event signal. Classify severity and patient safety impact."
  REVIEW_FIRMWARE_CHANGE:   "Perform a safety-focused code review under IEC 62304 Class C — checks MISRA-C, error handling, risk control integrity."
  GENERATE_HAZARD_ANALYSIS: "Create or update an ISO 14971 §5 hazard analysis covering new device functions, features, or use cases."
  UPDATE_RISK_REGISTER:     "Update the ISO 14971 risk register with new hazards, changed probability/severity, or new risk controls."
  GENERATE_CAPA:            "Generate a Corrective and Preventive Action (CAPA) document for a field complaint, audit finding, or non-conformance."
  REVIEW_510K_SECTION:      "Review a specific section of an FDA 510(k) or De Novo submission for completeness, accuracy, and FDA acceptance risk."
  GENERATE_SBOM:            "Generate a Software Bill of Materials listing all software components, versions, licenses, and known CVEs."
  CYBERSECURITY_ASSESSMENT: "Perform a threat model and vulnerability assessment per FDA 2023 Cybersecurity Guidance and IEC 62443-3-3."
  GENERATE_TEST_PROTOCOL:   "Create a formal test protocol with acceptance criteria traceable to software requirements (IEC 62304 §5.5-5.7)."
  REVIEW_TEST_RESULTS:      "Review HIL or bench test results against acceptance criteria; determine pass/fail and DHF suitability."
  UPDATE_DHF:               "Compile and update the Design History File / Technical File with the latest regulatory evidence artifacts."
  ANALYZE_LOG:              "Analyze a general log entry, error message, or system event."
  REVIEW_MR:                "AI code review of a GitLab merge request."
  CREATE_MR:                "Create a GitLab MR from an issue description."
  MONITOR_CHECK:            "Run one monitoring cycle across all configured integrations."
  PLAN_TASK:                "Decompose a complex request into atomic subtasks."
  SWE_TASK:                 "Autonomous SWE agent — explore, plan, implement, verify, open PR."


task_payloads:
  HIL_TEST_FIRMWARE:
    firmware_path:     "string — absolute path to .bin or .hex firmware file"
    transport:         "string — jlink | serial | mock (default: jlink)"
    transport_config:  "dict — hardware-specific config (port, device, speed, etc.) — optional, falls back to config.yaml"
    standard:          "string — regulatory standard: IEC62304 | DO178C | EN50128 | ISO26262 (default: IEC62304)"
    test_suite:        "list of dicts — HILTestCase objects [{id, name, requirement_id, description, procedure, expected_result}]"

  ANALYZE_DEVICE_LOG:
    log_entry:         "string — raw device log line(s), complaint description, or field event"
    device_serial:     "string — device serial number (optional, for post-market tracking)"
    firmware_version:  "string — firmware version string (optional)"

  REVIEW_FIRMWARE_CHANGE:
    diff:              "string — git diff or code snippet to review"
    changed_files:     "list of strings — files affected by this change (optional)"
    requirement_ids:   "list of strings — requirement IDs this change addresses (optional)"
    risk_control_ids:  "list of strings — ISO 14971 risk control IDs that may be affected (optional)"

  GENERATE_HAZARD_ANALYSIS:
    feature_description: "string — description of the new or changed device function"
    intended_use:        "string — intended use population and clinical context"
    use_environment:     "string — where the device will be used (hospital, home, etc.)"
    existing_hazards:    "list of strings — known hazard IDs for context (optional)"

  UPDATE_RISK_REGISTER:
    change_description:  "string — description of the design or software change"
    affected_hazard_ids: "list of strings — hazard IDs from the risk register"
    new_probability:     "string — updated probability estimate (optional)"
    new_severity:        "string — updated severity classification (optional)"
    new_risk_controls:   "list of dicts — {control_id, description, verification_method} (optional)"

  GENERATE_CAPA:
    event_description:   "string — description of the non-conformance, complaint, or audit finding"
    event_type:          "string — field_complaint | audit_finding | internal_nc | adverse_event"
    root_cause:          "string — identified or suspected root cause (optional)"
    affected_devices:    "string — device model and lot/serial numbers affected (optional)"

  REVIEW_510K_SECTION:
    section_name:        "string — section title (e.g. 'Substantial Equivalence', 'Performance Testing')"
    content:             "string — the section text to review"
    predicate_device:    "string — predicate device name/510(k) number (optional)"

  GENERATE_SBOM:
    source_root:         "string — path to firmware/software source root"
    include_transitive:  "bool — include transitive dependencies (default: true)"
    sbom_format:         "string — SPDX | CycloneDX | CSV (default: SPDX)"

  CYBERSECURITY_ASSESSMENT:
    component:           "string — component or feature to assess (e.g. 'BLE stack', 'cloud API', 'OTA update')"
    threat_model_scope:  "string — brief description of the trust boundary and data flows"
    existing_controls:   "list of strings — currently implemented security controls (optional)"

  GENERATE_TEST_PROTOCOL:
    requirement_ids:     "list of strings — requirement IDs to generate tests for"
    test_level:          "string — unit | integration | system (maps to IEC 62304 §5.5, §5.6, §5.7)"
    transport:           "string — expected HIL transport for execution: jlink | serial | mock"

  REVIEW_TEST_RESULTS:
    session_id:          "string — HIL session ID or test run identifier"
    standard:            "string — IEC62304 | DO178C | EN50128 | ISO26262 (default: IEC62304)"
    test_results:        "list of dicts — test result records from HILRunner.run_suite()"

  UPDATE_DHF:
    change_type:         "string — firmware_release | design_change | test_completion | risk_update | capa_closure"
    version:             "string — software/device version this update applies to"
    new_artifacts:       "list of strings — artifact names/paths being added to DHF"
    approved_by:         "string — name of the approver (regulatory affairs lead)"

  ANALYZE_LOG:
    log_entry:           "string — raw log line(s) or event description"

  REVIEW_MR:
    project_id:          "string — GitLab project ID"
    mr_iid:              "integer — merge request internal ID"

  CREATE_MR:
    issue_description:   "string — natural language description of what to fix"
    project_id:          "string — GitLab project ID (optional)"

  MONITOR_CHECK:
    source:              "string — integration name or 'all' (default: all)"

  PLAN_TASK:
    description:         "string — natural language task description"
    priority:            "integer 1-10 (default: 5)"

  SWE_TASK:
    task:                "string — natural language software task description"
    repo_path:           "string — absolute path to local repo (optional)"
    repo_url:            "string — git URL to clone (optional)"
