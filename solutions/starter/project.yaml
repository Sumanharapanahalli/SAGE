# ==============================================================================
# SAGE Framework — Starter Solution Template
# ==============================================================================
# Copy this folder to solutions/<your-domain>/ and customise.
# No Python changes required — agents, roles, and tasks are fully YAML-driven.
# ==============================================================================

name: "My Project"
version: "1.0.0"
domain: "starter"
description: >
  Generic SAGE solution template. Rename this file, update the fields below,
  and add domain-specific prompts in prompts.yaml. That's all you need to
  run a fully functional AI agent system for any domain.

# Modules visible in the web UI (comment out any you don't need)
active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - llm
  - settings
  - agents
  - yaml-editor
  - live-console
  - onboarding
  - integrations
  - cds-compliance

# Compliance or quality standards this project must satisfy (optional — leave empty if none)
compliance_standards: []
# Examples:
#   - "ISO 9001:2015"
#   - "SOC 2 Type II"
#   - "GDPR"
#   - "HIPAA"
#   - "ISO 27001"

# Integrations your solution uses (drives tool loading)
integrations:
  - gitlab
# Add any of: teams | metabase | spira | slack | jira | confluence | database

# Optional: per-agent monthly call ceilings (0 = unlimited)
# agent_budgets:
#   analyst:
#     monthly_calls: 500
#   developer:
#     monthly_calls: 200

# Project-specific settings (override base config keys here)
settings:
  memory:
    # collection_name defaults to "<domain>_knowledge" — set here to override
    collection_name: ""
  system:
    max_concurrent_tasks: 1

ui_labels:
  analyst_page_title:   "Signal Analyzer"
  analyst_input_label:  "Paste a log entry, error message, or event description"
  developer_page_title: "Code Reviewer"
  monitor_page_title:   "Operations Monitor"
  dashboard_subtitle:   "Project Health Overview"
  # agent_quick_templates: per-role quick-fill buttons on the Agents page.
  # Keys are role IDs from prompts.yaml. Each entry is a list of templates.
  # Remove this section if your roles don't need quick templates.
  agent_quick_templates:
    analyst:
      - label: "Review latest error"
        task:  "Analyze the most recent error log and identify the root cause"
        context: ""
      - label: "Performance check"
        task:  "Review system performance metrics and suggest optimisations"
    developer:
      - label: "Code review"
        task:  "Review the latest code changes and flag potential issues"
      - label: "Refactor advice"
        task:  "Suggest improvements to the current codebase structure"

# ---------------------------------------------------------------------------
# Theme — controls sidebar, accent, and badge colours across the entire UI.
# All values are CSS colour strings (hex, hsl, rgb, or named colours).
# Leave this section out to use the default SAGE dark-sidebar theme.
# ---------------------------------------------------------------------------
theme:
  sidebar_bg:          "#ffffff"   # clean white sidebar
  sidebar_text:        "#4b5563"   # gray-600 — readable on white
  sidebar_active_bg:   "#ecfdf5"   # emerald-50 highlight
  sidebar_active_text: "#047857"   # emerald-700 — strong active state
  sidebar_hover_bg:    "#f0fdf4"   # green-50 subtle hover
  sidebar_accent:      "#10b981"   # emerald-500 — primary green
  accent:              "#10b981"   # emerald-500 — buttons, links
  accent_hover:        "#059669"   # emerald-600 — hover state
  badge_bg:            "#ecfdf5"   # emerald-50 — light green badge
  badge_text:          "#047857"   # emerald-700 — badge text

dashboard:
  badge_color: "bg-gray-100 text-gray-700"
  context_color: "border-gray-200 bg-gray-50"
  context_items:
    - label: "Domain"
      description: "Replace with your project domain description"
    - label: "Agents"
      description: "Analyst, Developer, Monitor, Planner, and custom roles"
    - label: "Key Focus"
      description: "Signal triage, code review, event monitoring"
  quick_actions:
    - { label: "Analyze Signal", route: "/analyst",   description: "Triage an event or log" }
    - { label: "Review Code",    route: "/developer", description: "AI code review" }
    - { label: "Run Agents",     route: "/agents",    description: "Custom agent roles" }
    - { label: "Audit Trail",    route: "/audit",     description: "Decision history" }

# Role assignments for dev-mode identity switching.
# Maps role names to lists of user IDs from config/dev_users.yaml.
# "*" means all users have that role.
roles:
  admin:
    - suman
  approver:
    - suman
    - dr_chen
  viewer:
    - "*"
