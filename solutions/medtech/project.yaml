# ==============================================================================
# SAGE Framework — Project: medtech  (Solution 1)
# ==============================================================================
# Medical Device Manufacturing — ISO 13485 compliant autonomous agent
# ==============================================================================

name: "Medical Device Manufacturing"
version: "2.0.0"
domain: "medtech"
description: >
  Autonomous AI agent for ISO 13485-compliant medical device manufacturing.
  Handles firmware error triage, GitLab MR review, pipeline monitoring,
  Metabase/Spira/Teams integration, and regulatory documentation.

# Modules visible in the web UI (must match MODULE_REGISTRY keys in modules.ts)
active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - llm
  - settings
  - agents
  - yaml-editor

# Regulatory / compliance standards this project must satisfy
compliance_standards:
  - "ISO 13485:2016"
  - "ISO 14971:2019"
  - "IEC 62304:2006+AMD1"
  - "FDA 21 CFR Part 11"
  - "FDA Cybersecurity Guidance 2023"

# Active integrations (used for docs and UI hints)
integrations:
  - gitlab
  - teams
  - metabase
  - spira
  - serial
  - jlink

# Project-specific settings (override base config keys here)
settings:
  memory:
    collection_name: "manufacturing_knowledge"
  system:
    max_concurrent_tasks: 1    # single-lane for GPU safety and audit trail

ui_labels:
  analyst_page_title:    "Firmware Error Analyzer"
  analyst_input_label:   "Firmware crash log, manufacturing error, or hardware fault report"
  developer_page_title:  "IEC 62304 Code Reviewer"
  monitor_page_title:    "Production Monitor"
  dashboard_subtitle:    "Medical Device Manufacturing Health"
