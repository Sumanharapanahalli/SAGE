# ==============================================================================
# SAGE Framework — Task Types: medtech
# ==============================================================================
# Defines the valid task types for the medical device manufacturing domain.
# These are used by the TaskQueue dispatcher and PlannerAgent validation.
# ==============================================================================

task_types:
  - ANALYZE_LOG        # Firmware / manufacturing log triage
  - REVIEW_MR          # GitLab merge request AI review (ReAct loop)
  - CREATE_MR          # Create GitLab MR from issue
  - FLASH_FIRMWARE     # Flash device via J-Link MCP server
  - MONITOR_CHECK      # Manual trigger of MonitorAgent cycle
  - PLAN_TASK          # PlannerAgent orchestration step

task_descriptions:
  ANALYZE_LOG:     "Analyze a firmware error log or manufacturing event using RAG + LLM"
  REVIEW_MR:       "AI code review of a GitLab merge request using the ReAct loop"
  CREATE_MR:       "Create a new GitLab merge request from a Spira/GitLab issue"
  FLASH_FIRMWARE:  "Flash compiled firmware binary to a device via J-Link debugger"
  MONITOR_CHECK:   "Run one monitoring cycle across Teams, Metabase, and GitLab"
  PLAN_TASK:       "Use PlannerAgent to decompose a complex request into subtasks"

# Payload schemas per task type (used for validation and UI hints)
task_payloads:
  ANALYZE_LOG:
    log_entry: "string — the raw log line(s) to analyze"

  REVIEW_MR:
    project_id: "string — GitLab project ID"
    mr_iid:     "integer — merge request internal ID"

  CREATE_MR:
    issue_description: "string — natural language description of what to fix"
    project_id:        "string — GitLab project ID (optional, uses default)"

  FLASH_FIRMWARE:
    firmware_path: "string — absolute or relative path to .hex/.bin/.elf file"
    device:        "string — J-Link device name (e.g. STM32F4)"

  MONITOR_CHECK:
    source: "string — 'teams' | 'metabase' | 'gitlab' | 'all' (default: all)"

  PLAN_TASK:
    description: "string — natural language task description for the planner"
    priority:    "integer 1-10 (default: 5)"
