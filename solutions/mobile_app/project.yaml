# ==============================================================================
# SAGE Solution — Mobile App Development Team (iOS/Android/Flutter)
# ==============================================================================
# Ready-to-use template for mobile app development teams building iOS, Android,
# and cross-platform Flutter applications.
# Standards: Apple App Store Guidelines, Google Play Developer Policy, GDPR, COPPA
# ==============================================================================

name: "Mobile App Development Team"
version: "1.0.0"
domain: "mobile_app"
description: >
  AI agent system for mobile app development teams building iOS, Android, and
  Flutter applications. Agents triage crash reports and ANRs, review pull requests,
  analyze performance traces, plan releases, and support App Store and Google Play
  compliance — from daily development to production releases.

active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - llm
  - settings
  - agents
  - yaml-editor
  - onboarding

compliance_standards:
  - "Apple App Store Review Guidelines (latest)"
  - "Google Play Developer Policy Center (latest)"
  - "GDPR (EU) 2016/679 — General Data Protection Regulation"
  - "COPPA — Children's Online Privacy Protection Act"
  - "CCPA — California Consumer Privacy Act"

integrations: []

settings:
  memory:
    collection_name: "mobile_app_knowledge"
  system:
    max_concurrent_tasks: 1

ui_labels:
  analyst_page_title:   "Crash & Performance Analyzer"
  analyst_input_label:  "Paste crash report, ANR trace, Logcat output, or App Store review"
  developer_page_title: "Mobile Code Reviewer"
  monitor_page_title:   "App Health Monitor"
  dashboard_subtitle:   "Mobile App Team — Quality & Release Health"
  agent_quick_templates:
    ios_engineer:
      - label: "Symbolicate crash"
        task:  "Symbolicate and analyze this iOS crash report to identify the root cause"
        context: ""
      - label: "App Store rejection review"
        task:  "Review this App Store rejection reason and propose a resolution strategy"
    android_engineer:
      - label: "ANR analysis"
        task:  "Analyze this ANR trace to identify the blocking operation and thread state"
      - label: "Kotlin code review"
        task:  "Review this Kotlin code change for coroutine safety, memory leaks, and Jetpack best practices"

dashboard:
  badge_color: "bg-green-100 text-green-800"
  context_color: "border-green-200 bg-green-50"
  context_items:
    - label: "Platforms"
      description: "iOS (Swift/SwiftUI), Android (Kotlin/Jetpack Compose), Flutter (Dart)"
    - label: "Standards"
      description: "App Store Guidelines, Google Play Policy, GDPR, COPPA"
    - label: "Key Focus"
      description: "Crash-free rate, ANR rate, release cadence, store compliance"
  quick_actions:
    - { label: "Analyze Crash",       route: "/analyst",   description: "Triage crash report or ANR" }
    - { label: "Review PR",           route: "/developer", description: "Mobile code review" }
    - { label: "App Monitor",         route: "/monitor",   description: "Store and CI/CD health" }
    - { label: "Specialist Agents",   route: "/agents",    description: "iOS, Android, Flutter, ASO roles" }
