# ==============================================================================
# SAGE Framework — Task Types: avionics
# ==============================================================================
# Defines valid task types for the avionics and aerospace engineering domain.
# Used by the TaskQueue dispatcher and PlannerAgent validation.
# ==============================================================================

task_types:
  - ANALYZE_FLIGHT_DATA         # Flight data recorder or QAR data analysis
  - REVIEW_SOFTWARE_CHANGE      # DO-178C software change review
  - ANALYZE_AVIONICS_FAULT      # Avionics LRU fault or BITE report analysis
  - REVIEW_CERTIFICATION_DOC    # Certification document or compliance matrix review
  - ANALYZE_TEST_RESULT         # Flight test or ground test result analysis
  - REVIEW_ICD_CHANGE           # Interface Control Document change review
  - REVIEW_MR                   # Software change merge request review
  - MONITOR_CHECK               # Manual monitoring cycle trigger
  - PLAN_TASK                   # PlannerAgent orchestration step

task_descriptions:
  ANALYZE_FLIGHT_DATA:        "Analyze flight data recorder parameters, QAR data, or ACARS report for anomalies"
  REVIEW_SOFTWARE_CHANGE:     "Review a DO-178C software change for DAL compliance, traceability, and structural coverage"
  ANALYZE_AVIONICS_FAULT:     "Triage an avionics LRU fault, BITE code, or CMC report to identify root cause"
  REVIEW_CERTIFICATION_DOC:   "Review a certification plan, compliance matrix, or means of compliance document"
  ANALYZE_TEST_RESULT:        "Analyze flight test or ground test data for performance compliance and anomalies"
  REVIEW_ICD_CHANGE:          "Review an Interface Control Document change for ARINC 429/664 protocol correctness"
  REVIEW_MR:                  "AI code review of a software change against DO-178C objectives and coding standards"
  MONITOR_CHECK:              "Run one monitoring cycle across test campaign status and certification milestones"
  PLAN_TASK:                  "Use PlannerAgent to decompose a complex certification or engineering task"

task_payloads:
  ANALYZE_FLIGHT_DATA:
    required:
      - data_excerpt: "string — flight data parameters, QAR export, or PIREP text"
    optional:
      - flight_phase: "string — phase of flight (e.g. 'approach', 'takeoff', 'cruise')"
      - aircraft_type: "string — aircraft type or model (e.g. 'A320', 'B737-MAX')"
      - system_context: "string — avionics system of interest (e.g. 'FMS', 'ILS', 'FADEC')"

  REVIEW_SOFTWARE_CHANGE:
    required:
      - change_description: "string — software change description, diff, or Problem Report"
    optional:
      - dal_level: "string — Design Assurance Level (A/B/C/D)"
      - affected_csci: "string — Computer Software Configuration Item name"
      - do178c_phase: "string — life cycle phase (e.g. 'SRS', 'SDD', 'source code', 'test')"

  ANALYZE_AVIONICS_FAULT:
    required:
      - fault_data: "string — fault code, BITE output, CMC report, or maintenance message"
    optional:
      - lru_id: "string — LRU part number or name (e.g. 'FCU', 'ADIRU', 'FMC')"
      - aircraft_id: "string — aircraft registration or tail number"
      - ata_chapter: "string — ATA chapter reference (e.g. ATA 22, ATA 34)"

  REVIEW_CERTIFICATION_DOC:
    required:
      - document_excerpt: "string — certification plan section, compliance matrix row, or means of compliance"
    optional:
      - regulation_ref: "string — applicable regulation (e.g. 'FAA Part 25.1309', 'EASA CS-25.1302')"
      - doc_type: "string — 'certification_plan' | 'compliance_matrix' | 'issue_paper' | 'moc'"
      - dal_level: "string — DAL level if software-related"

  ANALYZE_TEST_RESULT:
    required:
      - test_data: "string — test result summary, test report excerpt, or anomaly report"
    optional:
      - test_type: "string — 'flight_test' | 'ground_test' | 'hil' | 'iron_bird' | 'rig'"
      - test_phase: "string — 'development' | 'certification' | 'regression'"
      - requirement_ref: "string — requirement or test point reference"

  REVIEW_ICD_CHANGE:
    required:
      - icd_change: "string — ICD change description, message parameter delta, or protocol change"
    optional:
      - bus_type: "string — 'ARINC 429' | 'ARINC 664/AFDX' | 'MIL-STD-1553' | 'CAN'"
      - affected_lrus: "string — LRUs affected by the interface change"
      - change_impact: "string — description of operational impact"

  REVIEW_MR:
    required:
      - project_id: "string — project identifier"
      - mr_iid: "integer — merge request or change identifier"
    optional:
      - dal_level: "string — Design Assurance Level (A/B/C/D)"
      - language: "string — 'Ada' | 'C' | 'C++' | 'VHDL' | 'Verilog'"

  MONITOR_CHECK:
    optional:
      - source: "string — 'test_campaign' | 'certification' | 'ci' | 'all' (default: all)"

  PLAN_TASK:
    required:
      - description: "string — natural language task description for the planner"
    optional:
      - priority: "integer 1-10 (default: 5)"
