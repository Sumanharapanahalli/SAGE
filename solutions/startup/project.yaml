# ==============================================================================
# SAGE Framework — Project: startup
# ==============================================================================
# Single-point AI platform for early-stage startups.
# Covers every business function: product, engineering, marketing, sales,
# legal, finance, HR, and operations — all with a human-approval loop and
# full audit trail.
# ==============================================================================

name: "Startup Workspace"
version: "1.0.0"
domain: "startup"
description: >
  SAGE[ai] as a full-stack AI co-founder for startups.
  Every department — from engineering to marketing to legal — powered by
  purpose-built AI agents with human oversight and a complete audit trail.

active_modules:
  - dashboard
  - agents
  - analyst
  - developer
  - audit
  - improvements
  - llm
  - settings
  - yaml-editor

integrations:
  - gitlab
  - github
  - slack
  - notion
  - google_workspace

settings:
  memory:
    collection_name: "startup_knowledge"
  system:
    max_concurrent_tasks: 3

ui_labels:
  analyst_page_title:  "Engineering Analyst"
  analyst_input_label: "Paste a log, error, or code snippet to analyze"

# Dashboard context card — drives the UI without hardcoding in the frontend
dashboard:
  badge_color: "bg-indigo-100 text-indigo-700"
  context_color: "border-indigo-200 bg-indigo-50"
  context_items:
    - label: "Functions"
      description: "Product, Marketing, Sales, Legal, Finance, HR, Growth, CS"
    - label: "Agents"
      description: "9 AI roles covering all startup business functions"
    - label: "Key Focus"
      description: "GTM strategy, unit economics, hiring, compliance"
  quick_actions:
    - { label: "Product Brief",    route: "/agents", description: "Write a PRD" }
    - { label: "GTM Strategy",     route: "/agents", description: "Go-to-market planning" }
    - { label: "Legal Review",     route: "/agents", description: "Contract analysis" }
    - { label: "Financial Model",  route: "/agents", description: "Unit economics" }
