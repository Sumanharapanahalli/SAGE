# ==============================================================================
# SAGE Framework — Project: reflect
# ==============================================================================
# Reflect — Human Movement Analysis Platform (formerly YogaVisionAI)
# General-purpose movement analysis: yoga, gym, PT, pilates, martial arts, sports
# ==============================================================================

name: "Reflect — Movement Analysis Platform"
version: "1.0.0"
domain: "movement-analysis"
description: >
  Reflect is a general-purpose human movement analysis platform with a white-label
  tenant model. The Extract → Teach pipeline turns expert demonstrations into
  portable skill packs that guide users via real-time camera feedback on-device.
  SAGE is the development assistant — proposing what to build, reviewing code,
  running tests, and tracking specification state.

# Source repository (read-only reference — never modify via SAGE)
source_repo: "/home/shetty/sandbox/Reflect"

# Modules visible in the web UI
active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - llm
  - settings
  - agents
  - yaml-editor

# Activity modules currently implemented in Reflect
activity_modules:
  - yoga          # 20 movements defined
  - gym           # 2 movements defined
  - physical_therapy  # 2 movements defined
  - pilates       # 5 movements defined
  - tai_chi       # 5 movements defined
  - qigong        # 5 movements defined
  - barre         # 5 movements defined

# Tenants in the system
tenants:
  - zen_yoga
  - ironform_gym
  - namaste_studio
  - harmony_wellness
  - movewell_clinic

# Active integrations
integrations:
  - github
  - mediapipe
  - flutter
  - cmake

# Project-specific settings
settings:
  memory:
    collection_name: "reflect_knowledge"
  system:
    max_concurrent_tasks: 3

ui_labels:
  analyst_page_title:    "Build Advisor"
  analyst_input_label:   "Describe what you want to build, or paste an error / log"
  developer_page_title:  "Code Reviewer"
  monitor_page_title:    "Platform Monitor"
  dashboard_subtitle:    "Reflect Platform Health"
