# ==============================================================================
# SAGE Solution — Automotive Infotainment & Telematics Team
# ==============================================================================
# Ready-to-use template for automotive software teams building IVI, ADAS,
# telematics, and connected vehicle systems.
# Standards: ISO 26262, AUTOSAR, UN ECE WP.29, ISO/SAE 21434
# ==============================================================================

name: "Automotive Infotainment & Telematics Team"
version: "1.0.0"
domain: "automotive"
description: >
  AI agent system for automotive software teams building in-vehicle infotainment,
  ADAS, telematics, and connected vehicle platforms. Agents triage crash logs and
  CAN traces, review safety-critical code against ISO 26262, analyze ADAS scenarios,
  and support functional safety and cybersecurity engineering across all vehicle domains.

active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - llm
  - settings
  - agents
  - yaml-editor
  - onboarding

compliance_standards:
  - "ISO 26262:2018 (Functional Safety — Road Vehicles)"
  - "AUTOSAR Classic & Adaptive Platform"
  - "UN ECE WP.29 R155 (Cybersecurity Management System)"
  - "UN ECE WP.29 R156 (Software Update Management System)"
  - "ISO/SAE 21434:2021 (Automotive Cybersecurity Engineering)"

integrations: []

settings:
  memory:
    collection_name: "automotive_knowledge"
  system:
    max_concurrent_tasks: 1

ui_labels:
  analyst_page_title:   "Vehicle Log & Trace Analyzer"
  analyst_input_label:  "Paste crash log, CAN trace, DTC code, or telematics event"
  developer_page_title: "Automotive Code Reviewer"
  monitor_page_title:   "Vehicle System Monitor"
  dashboard_subtitle:   "Automotive Software Team — Safety & Connectivity Health"
  agent_quick_templates:
    functional_safety_engineer:
      - label: "ASIL decomposition review"
        task:  "Review the ASIL decomposition for the adaptive cruise control feature and identify gaps"
        context: ""
      - label: "FMEA entry analysis"
        task:  "Analyze this FMEA entry for completeness and correct severity/occurrence/detection ratings"
    adas_engineer:
      - label: "Sensor fusion scenario"
        task:  "Review this ADAS sensor fusion scenario for edge cases and failure modes"
      - label: "ISO 26262 ASIL check"
        task:  "Assess whether this ADAS feature requirement meets ASIL-B requirements"

dashboard:
  badge_color: "bg-amber-100 text-amber-800"
  context_color: "border-amber-200 bg-amber-50"
  context_items:
    - label: "Vehicle Domains"
      description: "IVI, ADAS, telematics, body electronics, powertrain, connectivity"
    - label: "Standards"
      description: "ISO 26262, AUTOSAR, UN ECE WP.29, ISO/SAE 21434"
    - label: "Critical Rule"
      description: "Safety-critical ASIL-C/D proposals require human sign-off — no autonomous action"
  quick_actions:
    - { label: "Analyze Log",         route: "/analyst",   description: "Triage crash log or CAN trace" }
    - { label: "Review Code",         route: "/developer", description: "Safety-critical code review" }
    - { label: "Vehicle Monitor",     route: "/monitor",   description: "Fleet and system health" }
    - { label: "Specialist Agents",   route: "/agents",    description: "Safety, ADAS, and cybersecurity roles" }
