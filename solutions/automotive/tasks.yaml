# ==============================================================================
# SAGE Framework — Task Types: automotive
# ==============================================================================
# Defines valid task types for the automotive infotainment and telematics domain.
# Used by the TaskQueue dispatcher and PlannerAgent validation.
# ==============================================================================

task_types:
  - ANALYZE_CRASH_LOG         # ECU crash log or core dump triage
  - REVIEW_CAN_TRACE          # CAN bus trace decoding and analysis
  - ANALYZE_TELEMATICS_EVENT  # Vehicle telematics event analysis
  - REVIEW_ADAS_SCENARIO      # ADAS scenario safety gap review
  - GENERATE_FMEA_ENTRY       # ISO 26262 FMEA entry generation
  - REVIEW_OTA_PACKAGE        # OTA software update package review
  - ANALYZE_CONNECTIVITY_LOG  # Modem or V2X connectivity log analysis
  - REVIEW_MR                 # Merge request code review
  - MONITOR_CHECK             # Manual monitoring cycle trigger
  - PLAN_TASK                 # PlannerAgent orchestration step

task_descriptions:
  ANALYZE_CRASH_LOG:         "Triage an ECU crash log or core dump to identify root cause and severity"
  REVIEW_CAN_TRACE:          "Decode and analyze a CAN bus trace for protocol violations or anomalies"
  ANALYZE_TELEMATICS_EVENT:  "Analyze a vehicle telematics event for connectivity or data integrity issues"
  REVIEW_ADAS_SCENARIO:      "Review an ADAS driving scenario for safety gaps and ASIL compliance"
  GENERATE_FMEA_ENTRY:       "Generate an ISO 26262 FMEA entry for a given failure mode"
  REVIEW_OTA_PACKAGE:        "Review an OTA software update package for security and compliance (WP.29 R156)"
  ANALYZE_CONNECTIVITY_LOG:  "Analyze a modem, V2X, or vehicle-to-cloud connectivity log"
  REVIEW_MR:                 "AI code review of a merge request against MISRA and ASIL constraints"
  MONITOR_CHECK:             "Run one monitoring cycle across vehicle fleet and CI/CD integrations"
  PLAN_TASK:                 "Use PlannerAgent to decompose a complex request into atomic subtasks"

task_payloads:
  ANALYZE_CRASH_LOG:
    required:
      - log_entry: "string — raw ECU crash log lines, DTC codes, or core dump excerpt"
    optional:
      - ecu_id: "string — ECU identifier (e.g. BCM, ADAS_ECU)"
      - vehicle_vin: "string — vehicle VIN for fleet context lookup"

  REVIEW_CAN_TRACE:
    required:
      - trace_data: "string — raw CAN trace (candump or Vector CANalyzer format)"
    optional:
      - dbc_context: "string — DBC signal context or specific message IDs of interest"
      - bus_id: "string — CAN bus identifier (CAN0, CAN1, etc.)"

  ANALYZE_TELEMATICS_EVENT:
    required:
      - event_payload: "string — JSON or raw telematics event payload"
    optional:
      - vehicle_id: "string — vehicle or device identifier"
      - event_type: "string — event type hint (e.g. DTC, geofence, OBD)"

  REVIEW_ADAS_SCENARIO:
    required:
      - scenario_description: "string — description of the ADAS scenario or test case"
    optional:
      - asil_target: "string — target ASIL level (A/B/C/D)"
      - sensor_config: "string — sensor configuration context"

  GENERATE_FMEA_ENTRY:
    required:
      - failure_mode: "string — description of the failure mode to analyze"
      - component: "string — affected system or component name"
    optional:
      - asil_level: "string — ASIL level of the function"
      - existing_controls: "string — existing design or process controls"

  REVIEW_OTA_PACKAGE:
    required:
      - package_manifest: "string — OTA package manifest or update description"
    optional:
      - target_ecu: "string — target ECU or component"
      - signature_info: "string — code signing certificate details"

  ANALYZE_CONNECTIVITY_LOG:
    required:
      - log_entry: "string — modem AT command log, V2X event, or network diagnostic output"
    optional:
      - modem_type: "string — modem model or cellular generation (4G/5G)"
      - protocol: "string — protocol hint (PPP, LwM2M, MQTT, V2X)"

  REVIEW_MR:
    required:
      - project_id: "string — GitLab/GitHub project identifier"
      - mr_iid: "integer — merge request internal ID"
    optional:
      - asil_level: "string — ASIL level of the affected component"

  MONITOR_CHECK:
    optional:
      - source: "string — 'fleet' | 'gitlab' | 'all' (default: all)"

  PLAN_TASK:
    required:
      - description: "string — natural language task description for the planner"
    optional:
      - priority: "integer 1-10 (default: 5)"
