dashboard:
  badge_color: "bg-blue-100 text-blue-800"
  context_color: "border-blue-200 bg-blue-50"
  context_items:
    - label: "Products"
      description: "OneStep Foot Scanner (thermovisual HW, 1,847 active patients) + EveryStep Monitoring Platform (cloud RPM)"
    - label: "Mission"
      description: "Help end unnecessary diabetic amputations — detect DFUs at Stage 1 before they become limb-threatening"
    - label: "Standards"
      description: "HIPAA · ISO 13485 · IEC 62304 · ISO 14971 · FDA 21 CFR Part 820 · CMS RPM (CPT 99454)"
    - label: "Approval Gate"
      description: "Every agent proposal — firmware patch, platform change, or clinical rule update — requires human sign-off"
  quick_actions:
