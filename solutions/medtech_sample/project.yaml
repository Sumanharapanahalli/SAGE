# ==============================================================================
# SAGE Solution — Acme MedTech
# ==============================================================================
# Acme MedTech (Houston TX + Galway IE) designs the OneStep Foot Scanner
# and EveryStep Monitoring Service to prevent diabetic foot ulcers (DFUs).
# The OneStep is a smart scale capturing daily thermal + HD images of both
# feet; EveryStep is a cloud RPM platform staffed by Acme MedTech clinicians.
# $15M+ raised (Atlantic Bridge, Furthr VC, Elkstone). Founded 2015.
# ==============================================================================

name: "Acme MedTech"
version: "3.1.0"
domain: "digital_health"
description: >
  AI agent system for Acme MedTech's engineering, clinical, and regulatory
  team. Acme MedTech's flagship products are the OneStep Foot Scanner (embedded
  thermovisual hardware) and the EveryStep Monitoring Platform (cloud RPM).
  The OneStep captures 100+ thermal points and HD images per foot in under
  30 seconds; EveryStep clinical staff monitor trends and escalate to
  prescribers. Agents triage device firmware faults, platform errors, and
  clinical signal anomalies — all pending human approval before any action.

active_modules:
  - dashboard
  - analyst
  - developer
  - monitor
  - audit
  - improvements
  - agents
  - knowledge
  - activity
  - costs
  - llm
  - settings
  - yaml-editor
  - live-console
  - integrations
  - workflows

compliance_standards:
  - "HIPAA Security Rule 45 CFR §164 — Protected Health Information"
  - "FDA 21 CFR Part 820 — Quality System Regulation (QSR)"
  - "FDA 21 CFR Part 11 — Electronic Records and Electronic Signatures"
  - "IEC 62304:2006/AMD1:2015 — Medical Device Software Lifecycle"
  - "IEC 62366-1:2015 — Usability Engineering for Medical Devices"
  - "ISO 13485:2016 — Quality Management System for Medical Devices"
  - "ISO 14971:2019 — Risk Management for Medical Devices"
  - "FCC Part 15B — Unintentional Radiators (WiFi/4G gateway)"
  - "CMS RPM Guidelines — Remote Patient Monitoring reimbursement (CPT 99454)"

product:
  onestep_scanner:
    name: "OneStep Foot Scanner"
    description: "Smart scale — daily thermovisual foot scan in under 30 seconds"
    firmware_version: "FW-3.1.0"
    hardware:
      mcu: "i.MX RT1060 (ARM Cortex-M7 @ 600 MHz)"
      thermal_sensor: "FLIR Lepton 3.5 (160×120, 8.7 μm LWIR)"
      camera: "12 MP OV12890 with macro lens array"
      connectivity: "WiFi 802.11b/g/n + 4G LTE modem (backup)"
      power: "AC-powered with 2000 mAh Li-Po backup"
    key_metrics:
      thermal_points_per_foot: 100
      scan_duration_seconds: 30
      avg_scans_per_week: 3.9
      active_patients: 1847

  everystep_platform:
    name: "EveryStep Monitoring Platform"
    description: "Cloud RPM platform — thermovisual data analysis + clinical escalation"
    version: "3.1.0"
    tech_stack:
      backend: "Python FastAPI + PostgreSQL (RDS Aurora) on AWS ECS"
      frontend: "React 18 + TypeScript on CloudFront + S3"
      ml_pipeline: "AWS SageMaker — thermal hotspot detection model"
      storage: "S3 (encrypted) + DynamoDB (device events)"
      messaging: "AWS IoT Core (MQTT) for device telemetry"
      ehr_integration: "HL7 FHIR R4 (read patient demographics from Epic/Cerner)"
    alert_protocol:
      single_hotspot: "Trigger internal visual review by clinical staff"
      consecutive_hotspots: "3+ scans escalate to prescriber notification"
      temperature_delta_threshold_celsius: 2.2

