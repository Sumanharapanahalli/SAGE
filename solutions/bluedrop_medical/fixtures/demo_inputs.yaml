# ------------------------------------------------------------------------------
# KNOWLEDGE BASE — Seed Documents for Vector Store
# ------------------------------------------------------------------------------

knowledge_documents:

  - id: KB-001
    title: "BlueDrop Hotspot Alert Protocol — Clinical Standard Operating Procedure"
    type: "SOP"
    version: "SOP-CLIN-007 v2.1"
    content: |
      Single hotspot detection (consecutive_scans=1): Internal clinical review only.
        Action: EveryStep clinical staff reviews thermal + HD images within 4 hours.
        Documentation: AltertEvent logged with reviewer initials and timestamp.

      Progressive hotspot (consecutive_scans >= 3): Prescriber notification required.
        Action: EveryStep staff contacts prescriber via portal message + phone.
        Documentation: ProviderNotification created, prescriber acknowledgement recorded.
        Timeline: Notification must be sent within 2 hours of 3rd consecutive hotspot.

      Temperature delta threshold: 2.2°C vs. contralateral foot (IWGDF 2023 guideline).
      Visual deterioration: Any wound visible on HD image at Grade 1+ triggers RED alert.

      Emergency escalation (patient-reported symptoms + hotspot):
        - Advise patient to seek immediate wound care
        - Contact prescriber within 30 minutes
        - Log FDA MedWatch consideration if device failure contributed

  - id: KB-002
    title: "OneStep Scanner Connectivity Troubleshooting Guide"
    type: "Technical Guide"
    version: "TG-FW-003 v1.4"
    content: |
      WiFi upload failures:
        1. Check eMMC queue: should be < 10 slots occupied for healthy device
        2. If RSSI < -75 dBm: move device closer to WiFi access point
        3. LTE failover activates automatically — verify SIM is active and APN correct
        4. If both WiFi and LTE fail: device queues up to 30 scans locally (30-day buffer)

      FLIR Lepton recovery:
        1. Soft reset via CCI command (0x0002 = SYS_RUN) — typical recovery time < 3s
        2. If soft reset fails: toggle LEPTON_RESET_PIN (GPIO PE5, active low, 100ms)
        3. If hardware reset fails after 3 attempts: put device in degraded mode
           (camera-only scan, no thermal data) and flag scan for manual clinical review
        4. Log incident to EveryStep platform via error telemetry endpoint

      NFC reader issues (PN7150):
        1. Firmware v6.04+ required to resolve errata E14 (anticollision race condition)
        2. Fallback: manual patient selection on local 2.4" display
        3. All manual selections are audited in the EveryStep platform

  - id: KB-003
    title: "DFU University of Texas Classification — Quick Reference"
    type: "Clinical Reference"
    content: |
      University of Texas Diabetic Foot Ulcer Classification System:

      Grade 0: Pre- or post-ulcerative lesion, completely epithelialized
        Stage A: No infection, no ischemia
        Stage B: Infection only
        Stage C: Ischemia only
        Stage D: Infection + ischemia

      Grade 1: Superficial wound, not involving tendon/capsule/bone
      Grade 2: Wound penetrating to tendon or capsule
      Grade 3: Wound penetrating to bone or joint

      BlueDrop target: Detect all DFUs at Grade 0-1 (pre-ulcerative or superficial)

      Cost comparison (internal BlueDrop data):
        Stage 1 treatment: $8,200 average
        Stage 2: $19,700 (57% more)
        Stage 3: $54,800 (85% more)
        Stage 4-5: $118,900 (93% more)
