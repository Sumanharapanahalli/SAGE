# ------------------------------------------------------------------------------
# DEVELOPER — Code Review Diffs
# ------------------------------------------------------------------------------

code_diffs:

  - id: CR-001
    label: "Firmware — Dose Calculation Guard Clause Change"
    severity_expected: AMBER
    task_type: REVIEW_FIRMWARE_CODE
    subsystem: thermal
    input: |
      diff --git a/fw/src/thermal/lepton_driver.c b/fw/src/thermal/lepton_driver.c
      --- a/fw/src/thermal/lepton_driver.c
      +++ b/fw/src/thermal/lepton_driver.c
      @@ -142,10 +142,8 @@ lepton_status_t lepton_capture_frame(thermal_frame_t *frame) {
           configASSERT(frame != NULL);

           /* Wait for VSYNC with timeout */
      -    if (xSemaphoreTake(g_vsync_sem, pdMS_TO_TICKS(LEPTON_VSYNC_TIMEOUT_MS)) != pdTRUE) {
      -        LOG_ERROR("LEPTON: VSYNC timeout after %u ms", LEPTON_VSYNC_TIMEOUT_MS);
      -        return LEPTON_ERR_TIMEOUT;
      -    }
      +    xSemaphoreTake(g_vsync_sem, pdMS_TO_TICKS(LEPTON_VSYNC_TIMEOUT_MS));

           /* Transfer frame via SPI DMA */
           HAL_SPI_Receive_DMA(&hspi1, (uint8_t *)frame->pixels,
                               LEPTON_FRAME_BYTES);

  - id: CR-002
    label: "Platform — Alert Escalation Fix (missing prescriber fallback)"
    severity_expected: GREEN
    task_type: REVIEW_PLATFORM_CODE
    touches_alerts: true
    input: |
      diff --git a/platform/app/services/alert_service.py b/platform/app/services/alert_service.py
      --- a/platform/app/services/alert_service.py
      +++ b/platform/app/services/alert_service.py
      @@ -87,7 +87,14 @@ async def escalate_to_prescriber(alert_id: str, db: AsyncSession) -> None:
           patient = await db.get(Patient, alert.patient_id)
      -    prescriber_id = patient.prescriber_fhir_id
      +    prescriber_id = patient.prescriber_fhir_id
      +    if not prescriber_id:
      +        # Fallback: route to clinic's default prescriber if patient record lacks one
      +        site = await db.get(Site, patient.site_id)
      +        prescriber_id = site.default_prescriber_fhir_id
      +        logger.warning(
      +            "Patient %s has no prescriber_fhir_id; falling back to site default %s",
      +            patient.id, prescriber_id
      +        )
      +    if not prescriber_id:
      +        raise AlertRoutingError(f"No prescriber found for patient {patient.id} or site {patient.site_id}")
           notification = ProviderNotification(
               alert_id=alert_id,

  - id: CR-003
    label: "ML — Hotspot Score Threshold Lowered from 0.60 to 0.50"
    severity_expected: AMBER
    task_type: REVIEW_ML_CODE
    threshold_changed: true
    model_version: hotspot-cnn-v2.3.2-candidate
    input: |
      diff --git a/ml/config/thresholds.yaml b/ml/config/thresholds.yaml
      --- a/ml/config/thresholds.yaml
      +++ b/ml/config/thresholds.yaml
      @@ -3,7 +3,7 @@
       hotspot_detection:
      -  score_threshold: 0.60        # Validated: sensitivity 94%, specificity 88%
      +  score_threshold: 0.50        # CANDIDATE: increases sensitivity, reduces missed DFUs
         consecutive_scans_required: 3
         temperature_delta_celsius: 2.2

      diff --git a/ml/src/inference.py b/ml/src/inference.py
      --- a/ml/src/inference.py
      +++ b/ml/src/inference.py
      @@ -31,6 +31,7 @@ def classify_scan(thermal_array, rgb_image) -> HotspotResult:
           score = model(inputs)['hotspot_score']
      +    logger.info("Hotspot score=%.3f threshold=%.2f", score, THRESHOLD)
           if score >= THRESHOLD:
               return HotspotResult(detected=True, score=score, ...)

