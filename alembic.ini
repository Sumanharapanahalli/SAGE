# alembic.ini — Alembic migration configuration for SAGE Framework
# ─────────────────────────────────────────────────────────────────
# Run migrations:  alembic upgrade head
# Create revision: alembic revision --autogenerate -m "description"
# Check current:   alembic current
# Show history:    alembic history --verbose
#
# DATABASE_URL env var is read by alembic/env.py.
# ─────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new revision filenames: YYYY_revid_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for `%(year)d` etc. in file_template
timezone = UTC

# Max length of the slug segment
truncate_slug_length = 40

# Output encoding for migration scripts
output_encoding = utf-8

# Where to find the target metadata (used by --autogenerate).
# Overridden in env.py when models are discovered.

# ─────────────────────────────────────────────────────────────────
# Logging configuration
# ─────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
