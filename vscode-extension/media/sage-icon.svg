<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1F2A37"/>

  <!-- Brain outline - left hemisphere -->
  <path d="M64 28 C50 28, 38 34, 34 44 C30 54, 32 62, 36 68 C32 72, 30 78, 34 84 C38 92, 48 96, 58 96 L64 96"
        fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Brain outline - right hemisphere -->
  <path d="M64 28 C78 28, 90 34, 94 44 C98 54, 96 62, 92 68 C96 72, 98 78, 94 84 C90 92, 80 96, 70 96 L64 96"
        fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center line -->
  <line x1="64" y1="28" x2="64" y2="96" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Brain folds - left -->
  <path d="M36 50 C42 48, 50 52, 56 48" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M34 62 C42 58, 50 64, 58 60" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 74 C44 70, 50 76, 58 72" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brain folds - right -->
  <path d="M72 48 C78 52, 86 48, 92 50" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M70 60 C78 64, 86 58, 94 62" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M70 72 C78 76, 84 70, 92 74" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Neural network nodes - left hemisphere -->
  <circle cx="42" cy="44" r="3" fill="#10B981"/>
  <circle cx="38" cy="58" r="3" fill="#10B981"/>
  <circle cx="44" cy="72" r="3" fill="#10B981"/>
  <circle cx="52" cy="52" r="2.5" fill="#6EE7B7"/>
  <circle cx="50" cy="66" r="2.5" fill="#6EE7B7"/>
  <circle cx="54" cy="80" r="2.5" fill="#6EE7B7"/>

  <!-- Neural network nodes - right hemisphere -->
  <circle cx="86" cy="44" r="3" fill="#10B981"/>
  <circle cx="90" cy="58" r="3" fill="#10B981"/>
  <circle cx="84" cy="72" r="3" fill="#10B981"/>
  <circle cx="76" cy="52" r="2.5" fill="#6EE7B7"/>
  <circle cx="78" cy="66" r="2.5" fill="#6EE7B7"/>
  <circle cx="74" cy="80" r="2.5" fill="#6EE7B7"/>

  <!-- Neural connections - left -->
  <line x1="42" y1="44" x2="52" y2="52" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="38" y1="58" x2="50" y2="66" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="44" y1="72" x2="54" y2="80" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="42" y1="44" x2="38" y2="58" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>
  <line x1="38" y1="58" x2="44" y2="72" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>
  <line x1="52" y1="52" x2="50" y2="66" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>

  <!-- Neural connections - right -->
  <line x1="86" y1="44" x2="76" y2="52" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="90" y1="58" x2="78" y2="66" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="84" y1="72" x2="74" y2="80" stroke="#6EE7B7" stroke-width="1.2" opacity="0.6"/>
  <line x1="86" y1="44" x2="90" y2="58" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="58" x2="84" y2="72" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>
  <line x1="76" y1="52" x2="78" y2="66" stroke="#6EE7B7" stroke-width="1" opacity="0.4"/>

  <!-- Cross-hemisphere connections through center -->
  <line x1="52" y1="52" x2="76" y2="52" stroke="#047857" stroke-width="1.2" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="50" y1="66" x2="78" y2="66" stroke="#047857" stroke-width="1.2" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="54" y1="80" x2="74" y2="80" stroke="#047857" stroke-width="1.2" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Central pulse/spark -->
  <circle cx="64" cy="52" r="4" fill="#10B981" opacity="0.9"/>
  <circle cx="64" cy="52" r="7" fill="none" stroke="#10B981" stroke-width="1" opacity="0.3"/>
  <circle cx="64" cy="66" r="3.5" fill="#10B981" opacity="0.8"/>
  <circle cx="64" cy="80" r="3" fill="#10B981" opacity="0.7"/>
</svg>
