name: Desktop Build (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Web — Lint, Type Check, Test
  # ─────────────────────────────────────────────
  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vite build
        run: npx vite build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: web/test-results/

  # ─────────────────────────────────────────────
  # JOB 2: Build Tauri — Linux, macOS, Windows
  # ─────────────────────────────────────────────
  build-tauri:
    name: Build ${{ matrix.label }}
    needs: web-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sage-linux
          - label: macOS (x64)
            os: macos-13
            target: x86_64-apple-darwin
            artifact: sage-macos-x64
          - label: macOS (ARM)
            os: macos-14
            target: aarch64-apple-darwin
            artifact: sage-macos-arm
          - label: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sage-windows

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target
          key: ${{ matrix.target }}

      # Linux system deps
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}

      # Upload platform-specific artifacts
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            web/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            web/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
