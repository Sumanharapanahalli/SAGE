name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          # Test deps are DECLARED (requirements-dev.txt), not hand-typed here. When they
          # were listed inline, a test importing anything else — hypothesis — died at
          # collection, and pytest exits 2 on a collection error, so the entire run failed.
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ --ignore=tests/test_build_orchestrator_e2e.py --ignore=tests/system/ -q --tb=short

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run vitest
        working-directory: web
        run: npx vitest run

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test

      - name: Production build
        working-directory: web
        run: npm run build
