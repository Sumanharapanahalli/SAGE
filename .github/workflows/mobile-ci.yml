name: Mobile CI

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

env:
  FLUTTER_VERSION: '3.22.0'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.3'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Dart analyze (fatal infos)
        run: flutter analyze --fatal-infos

      - name: Dart format check
        run: dart format --set-exit-if-changed .

      - name: Install Node.js dependencies
        run: npm ci --if-present

      - name: ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0
        continue-on-error: false

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Widget Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-22.04
    needs: lint
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter unit & widget tests
        run: |
          flutter test \
            --coverage \
            --reporter=json \
            --file-reporter="json:test_results_flutter.json" \
            test/unit/ test/widget/

      - name: Check Flutter coverage threshold
        run: |
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info \
            --output-directory coverage_html \
            --title "Mobile Coverage"

          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 \
            | grep 'lines' | grep -oP '[0-9]+\.[0-9]+(?=%)' || echo 0)
          echo "Flutter coverage: ${COVERAGE}%"

          if (( $(echo "${COVERAGE} < 80" | bc -l) )); then
            echo "FAIL: Flutter coverage ${COVERAGE}% < 80% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}%"

      - name: Install Node.js dependencies
        run: npm ci --if-present

      - name: Run Jest tests
        run: |
          npx jest \
            --coverage \
            --coverageReporters=lcov,json,text \
            --testResultsProcessor=jest-junit \
            --passWithNoTests
        env:
          JEST_JUNIT_OUTPUT_FILE: test_results_jest.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: |
            mobile/test_results_flutter.json
            mobile/test_results_jest.xml
            mobile/coverage_html/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 3: E2E Tests (Detox / Android)
  # ─────────────────────────────────────────────
  e2e-android:
    name: E2E Tests (Detox/Android)
    runs-on: ubuntu-22.04
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Detox test app
        run: npx detox build --configuration android.emu.debug

      - name: Create Android emulator
        run: |
          echo no | avdmanager create avd \
            --name "detox_test" \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_4" \
            --force

      - name: Start Android emulator (background)
        run: |
          emulator -avd detox_test \
            -no-snapshot-save -no-window \
            -gpu swiftshader_indirect \
            -noaudio -no-boot-anim \
            -camera-back none &
          adb wait-for-device shell \
            'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 3; done'
          echo "Emulator ready"

      - name: Run Detox E2E tests
        run: |
          npx detox test \
            --configuration android.emu.debug \
            --record-logs all \
            --take-screenshots failing \
            --record-videos failing \
            --cleanup \
            2>&1 | tee detox_output.txt

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detox-artifacts-android
          path: |
            mobile/artifacts/
            mobile/detox_output.txt
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4a: Build iOS IPA + TestFlight
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA → TestFlight
    runs-on: macos-14
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: mobile
    env:
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby (Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: mobile

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Set up code signing (Fastlane Match)
        run: bundle exec fastlane match appstore --readonly

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Verify IPA produced
        run: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          if [ -z "${IPA_PATH}" ]; then
            echo "FAIL: No IPA file found in build/ios/ipa/"
            exit 1
          fi
          echo "IPA_PATH=${IPA_PATH}" >> $GITHUB_ENV
          echo "IPA built successfully: ${IPA_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Distribute to TestFlight
        run: |
          bundle exec fastlane pilot upload \
            --ipa "${{ env.IPA_PATH }}" \
            --changelog "Build from commit ${{ github.sha }}" \
            --skip_waiting_for_build_processing true

  # ─────────────────────────────────────────────
  # JOB 4b: Build Android APK/AAB + Firebase
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK/AAB → Firebase
    runs-on: ubuntu-22.04
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: mobile
    env:
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android AAB (release)
        run: |
          flutter build appbundle \
            --release \
            --dart-define=ENVIRONMENT=staging

      - name: Build Android APK split per ABI (release)
        run: |
          flutter build apk \
            --release \
            --split-per-abi

      - name: Verify APK and AAB produced
        run: |
          APK_PATH=$(find build/app/outputs/apk -name '*.apk' | head -1)
          AAB_PATH=$(find build/app/outputs/bundle -name '*.aab' | head -1)
          if [ -z "${APK_PATH}" ]; then
            echo "FAIL: No APK file found"
            exit 1
          fi
          echo "APK: ${APK_PATH}"
          echo "AAB: ${AAB_PATH}"
          echo "APK_PATH=${APK_PATH}" >> $GITHUB_ENV

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-aab
          path: |
            mobile/build/app/outputs/apk/release/*.apk
            mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Distribute to Firebase App Distribution
        run: |
          npm install -g firebase-tools

          firebase appdistribution:distribute "${{ env.APK_PATH }}" \
            --app "${{ env.FIREBASE_APP_ID }}" \
            --groups "internal-testers,staging-qa" \
            --release-notes "Build from commit ${{ github.sha }}"
