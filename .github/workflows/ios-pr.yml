name: iOS PR Build

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - 'fastlane/**'
      - '.github/workflows/ios-pr.yml'

jobs:
  build-and-test:
    name: Build & Test iOS
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('ios/**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Install Ruby dependencies
        run: |
          cd ios
          bundle install

      - name: Set up match keychain
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

      - name: Fetch code signing certificates
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          cd ios
          bundle exec fastlane match appstore --readonly true

      - name: Build iOS target
        run: |
          xcodebuild \
            -workspace ios/MeditationApp.xcworkspace \
            -scheme MeditationApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -configuration Debug \
            build \
            | xcpretty

      - name: Run unit tests
        run: |
          xcodebuild \
            -workspace ios/MeditationApp.xcworkspace \
            -scheme MeditationApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -configuration Debug \
            -resultBundlePath TestResults \
            test \
            | xcpretty --report junit --output test-results/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: |
            TestResults.xcresult
            test-results/junit.xml
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain
