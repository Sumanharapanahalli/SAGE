name: SAGE Desktop Release

on:
  push:
    tags:
      - 'sage-desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: .exe
            bundle_targets: msi,nsis
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sage-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sage-desktop/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.19.0

      - name: Build PyInstaller sidecar
        shell: bash
        run: |
          cd sage-desktop/sidecar
          pyinstaller --clean --noconfirm sage-sidecar.spec

      - name: Stage sidecar under target-triple name
        shell: bash
        run: |
          mkdir -p sage-desktop/src-tauri/bin
          cp "sage-desktop/sidecar/dist/sage-sidecar${{ matrix.sidecar_ext }}" \
             "sage-desktop/src-tauri/bin/sage-sidecar-${{ matrix.target }}${{ matrix.sidecar_ext }}"

      - name: Install npm deps
        run: npm ci
        working-directory: sage-desktop

      - name: Tauri build (signed)
        working-directory: sage-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles ${{ matrix.bundle_targets }}

      - name: Collect installers + signatures
        shell: bash
        run: |
          mkdir -p release-artifacts
          find sage-desktop/src-tauri/target/release/bundle \
            \( -name '*.msi' -o -name '*.msi.sig' \
               -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \
               -o -name '*.dmg' -o -name '*.dmg.sig' \
               -o -name '*.AppImage' -o -name '*.AppImage.sig' \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: sage-desktop-${{ matrix.target }}
          path: release-artifacts/
          if-no-files-found: error

  publish:
    name: Publish release + latest.json
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 sage-desktop/scripts/generate-latest-json.py \
              --version "${TAG#sage-desktop-v}" \
              --repo "${REPO}" \
              --dist dist \
              --out dist/latest.json
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.msi.sig
            dist/*-setup.exe
            dist/*-setup.exe.sig
            dist/latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
