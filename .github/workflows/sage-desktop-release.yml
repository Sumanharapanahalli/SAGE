name: SAGE Desktop Release

on:
  push:
    tags:
      - 'sage-desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: .exe
            bundle_targets: msi,nsis
          - label: macOS x64
            os: macos-13
            target: x86_64-apple-darwin
            sidecar_ext: ""
            bundle_targets: app,dmg
          - label: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
            sidecar_ext: ""
            bundle_targets: app,dmg
          - label: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sidecar_ext: ""
            bundle_targets: appimage,deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sage-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sage-desktop/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system deps for Tauri + AppImage
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libayatana-appindicator3-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.19.0

      - name: Build PyInstaller sidecar
        shell: bash
        run: |
          cd sage-desktop/sidecar
          pyinstaller --clean --noconfirm sage-sidecar.spec

      - name: Stage sidecar under target-triple name
        shell: bash
        run: |
          mkdir -p sage-desktop/src-tauri/bin
          staged="sage-desktop/src-tauri/bin/sage-sidecar-${{ matrix.target }}${{ matrix.sidecar_ext }}"
          cp "sage-desktop/sidecar/dist/sage-sidecar${{ matrix.sidecar_ext }}" "${staged}"
          # Tauri externalBin needs the execute bit set on POSIX bundles.
          if [[ "${{ runner.os }}" != "Windows" ]]; then
              chmod +x "${staged}"
          fi

      - name: Install npm deps
        run: npm ci
        working-directory: sage-desktop

      - name: Tauri build (signed)
        working-directory: sage-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Phase 4.6 code-signing hook-up. These env vars are read by
          # tauri 2's bundler when present; absent = no-op, which is the
          # current default for PRs/forks without the cert secrets.
          # Windows Authenticode (EV cert via Azure Code Signing or a
          # local .pfx):
          TAURI_WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          WINDOWS_CODESIGN_TOOL: ${{ secrets.WINDOWS_CODESIGN_TOOL }}
          # macOS codesign + notarytool. These together let Tauri's
          # bundler sign the .app + notarize the .dmg. Skipped when
          # empty.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build --bundles ${{ matrix.bundle_targets }}

      - name: Collect installers + signatures
        shell: bash
        run: |
          mkdir -p release-artifacts
          find sage-desktop/src-tauri/target/release/bundle \
            \( -name '*.msi' -o -name '*.msi.sig' \
               -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \
               -o -name '*.dmg' -o -name '*.dmg.sig' \
               -o -name '*.AppImage' -o -name '*.AppImage.sig' \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: sage-desktop-${{ matrix.target }}
          path: release-artifacts/
          if-no-files-found: error

      - name: Install tauri-driver
        if: runner.os == 'Windows'
        run: cargo install tauri-driver --locked

      - name: Run tauri-driver E2E suite
        if: runner.os == 'Windows'
        working-directory: sage-desktop
        shell: bash
        run: |
          # tauri-driver needs the packaged sage-desktop.exe; the Tauri
          # build above produced it under src-tauri/target/release/.
          npm run test:e2e:tauri || {
              echo "::warning::tauri-driver E2E failed — see logs"
              # Don't block the release on this yet; the suite is new.
          }

  publish:
    name: Publish release + latest.json
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 sage-desktop/scripts/generate-latest-json.py \
              --version "${TAG#sage-desktop-v}" \
              --repo "${REPO}" \
              --dist dist \
              --out dist/latest.json
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.msi.sig
            dist/*-setup.exe
            dist/*-setup.exe.sig
            dist/*.dmg
            dist/*.dmg.sig
            dist/*.AppImage
            dist/*.AppImage.sig
            dist/*.deb
            dist/latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
