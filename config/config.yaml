# ==============================================================
# SAGE[ai] - Configuration
# ==============================================================

llm:
  # Provider — choose the one that fits your setup (all are no-API-key options):
  #   "gemini"      — Gemini CLI (npm install -g @google/gemini-cli, then login once)
  #   "claude-code" — Claude Code CLI (npm install -g @anthropic-ai/claude-code, login once)
  #   "ollama"      — Ollama local (https://ollama.com, no login, no key, fully offline)
  #   "local"       — llama-cpp GGUF model (GPU direct, fully offline)
  #   "generic-cli" — Any CLI tool that accepts a prompt flag (aider, lm-studio, etc.)
  #   "claude"      — Anthropic API (requires ANTHROPIC_API_KEY — only API-key option)
  provider: "claude-code"

  # --- Gemini CLI Settings (provider = "gemini") ---
  gemini_model: "gemini-2.5-flash"      # Model hint (CLI may override)
  timeout: 500                           # Max seconds to wait for CLI response

  # --- Claude Code CLI Settings (provider = "claude-code") ---
  claude_model: "claude-sonnet-4-6"
  # claude_path: ""                     # Auto-detected; set if not on PATH

  # --- Ollama Settings (provider = "ollama") ---
  # Run: ollama serve   then   ollama pull llama3.2
  ollama_model: "qwen3.5:0.8b"         # Any model you've pulled via `ollama pull`
  ollama_host: "http://localhost:11434" # Ollama server address

  # --- Generic CLI Settings (provider = "generic-cli") ---
  # generic_cli_path: "/usr/local/bin/my-ai"
  # generic_cli_args: ["-p", "{prompt}"]   # {prompt} is replaced at runtime
  # generic_cli_model: "my-model"          # Label only — used in status display

  # --- Local Llama Settings (provider = "local") ---
  model_path: "./data/models/Phi-3-mini-4k-instruct-q4.gguf"
  temperature: 0.1                       # Low temp for deterministic outputs
  max_tokens: 3072                       # Context window

  # --- Budget Controls (T1-004) ---
  budgets:
    enabled: false
    default_monthly_usd: 50.0
    hard_cutoff: false        # if true, block calls when budget exceeded
    per_solution: {}          # solution_name: monthly_usd_limit

  # --- Task Routing by Task Type (T1-004) ---
  task_routing:
    enabled: false
    routes:
      ANALYZE_LOG:    "ollama/llama3.2"   # cheap model for simple analysis
      REVIEW_CODE:    "claude-sonnet-4-6" # best model for code review
      PLAN_TASK:      "gemini-2.5-flash"  # fast model for planning

# --- PII Detection & Data Residency (T1-002) ---
pii:
  enabled: false            # set true to activate scrubbing
  mode: "redact"            # redact | mask | flag_only
  entities:                 # Presidio entity types to detect
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - LOCATION
    - MEDICAL_LICENSE
    - US_SSN
    - CREDIT_CARD
    - IBAN_CODE
  redaction_char: "[REDACTED]"
  fail_on_detection: false  # if true, reject prompt instead of redacting
data_residency:
  enabled: false
  region: "us"              # us | eu | apac
  eu_providers:             # when region=eu, route to these providers only
    - ollama
    - local

# --- GitHub Integration ---
# Used for routing SAGE framework improvement ideas to GitHub PRs.
github:
  repo_url: "https://github.com/Sumanharapanahalli/SAGE"

# OpenShell sandbox configuration (optional — graceful degradation when not installed)
sandbox:
  enabled: true                    # set false to disable sandboxing even if openshell is installed
  default_timeout_seconds: 300     # max seconds a sandboxed task can run
  auto_sandbox_task_types:         # task types to auto-sandbox when policy is declared
    - SWE_TASK
    - code_diff

# --- Approval Roles (RBAC) ---
# Maps solution-level action_types to the minimum role required to approve.
# Framework control operations (config_switch, llm_switch, config_modules) no longer
# go through the approval queue — they execute immediately. Only solution-level
# agent proposals require human sign-off here.
# Roles are hierarchical: admin > operator > reviewer > anyone
approval_roles:
  yaml_edit:           "admin"
  agent_hire:          "admin"
  composio_connect:    "admin"
  onboarding_generate: "admin"
  knowledge_delete:    "admin"
  knowledge_import:    "operator"
  knowledge_add:       "operator"
  implementation_plan: ~           # anyone can approve solution implementation plans
  code_diff:           "admin"
  analysis:            ~           # anyone can approve analysis proposals

# Who belongs to each role. Add names/identifiers that match what users
# type in the "Approving as" field in the web UI.
# "any" as a list entry means the role accepts any identifier.
approvers:
  admin:    ["admin", "suman"]
  operator: ["admin", "operator", "suman", "lead"]
  reviewer: ["any"]

auth:
  enabled: false
  oidc:
    provider: "google"       # okta | azure_ad | google
    issuer_url: ""
    client_id: ""
    client_secret: ""
    audience: ""
  session_ttl_seconds: 28800  # 8 hours

memory:
  # backend: "chroma" (default) | "llamaindex"
  backend: "chroma"

  # Runtime data paths auto-resolve to <solution_dir>/.sage/ — one per solution,
  # fully isolated. Override only if you need a non-standard location.
  # vector_db_path: ""    # default: <solution_dir>/.sage/chroma_db
  # audit_db_path:  ""    # default: <solution_dir>/.sage/audit_log.db

  # collection_name defaults to "<solution_name>_knowledge" — override per solution in project.yaml
  collection_name: ""

system:
  log_level: "INFO"
  max_concurrent_tasks: 1                # STRICTLY 1 for single-lane safety
  # Parallel wave execution — ignored when compliance_standards is set on the project
  parallel_enabled: true                 # set false to revert to single-lane for all projects
  parallel_max_workers: 4               # max threads in the wave executor pool

# --- Observability (Langfuse — optional, self-hosted or cloud) ---
observability:
  langfuse_enabled: false
  langfuse_host: "http://localhost:3000"  # self-hosted endpoint
  # langfuse_public_key: "${LANGFUSE_PUBLIC_KEY}"
  # langfuse_secret_key: "${LANGFUSE_SECRET_KEY}"

# --- Orchestration ---
orchestration:
  # engine: "queue" (default built-in SQLite queue) | "langgraph"
  engine: "queue"
  # workflows_dir resolved to solutions/{project}/workflows/ automatically

# --- Monitor ---
monitor:
  # mode: "polling" (default) | "n8n" | "both"
  mode: "polling"
  n8n_webhook_secret: "${N8N_WEBHOOK_SECRET}"

# --- GitLab Integration ---
gitlab:
  url: "${GITLAB_URL}"
  token: "${GITLAB_TOKEN}"
  default_project_id: "${GITLAB_PROJECT_ID}"

# --- Teams Integration ---
teams:
  tenant_id: "${TEAMS_TENANT_ID}"
  client_id: "${TEAMS_CLIENT_ID}"
  client_secret: "${TEAMS_CLIENT_SECRET}"
  team_id: "${TEAMS_TEAM_ID}"
  channel_id: "${TEAMS_CHANNEL_ID}"
  webhook_url: "${TEAMS_INCOMING_WEBHOOK_URL}"
  poll_interval_seconds: 30

# --- Metabase Integration ---
metabase:
  url: "${METABASE_URL}"
  username: "${METABASE_USERNAME}"
  password: "${METABASE_PASSWORD}"
  error_question_id: "${METABASE_ERROR_QUESTION_ID}"
  poll_interval_seconds: 60

# --- Spira Integration ---
spira:
  url: "${SPIRA_URL}"
  username: "${SPIRA_USERNAME}"
  api_key: "${SPIRA_API_KEY}"
  project_id: "${SPIRA_PROJECT_ID}"

# --- Serial Port ---
serial:
  port: "${SERIAL_PORT}"
  baud_rate: 115200
  timeout: 5

# --- J-Link Debugger ---
jlink:
  device: "${JLINK_DEVICE}"
  interface: "SWD"
  speed: 4000
  serial_number: "${JLINK_SERIAL}"
