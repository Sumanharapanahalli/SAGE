[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (require live services)
    e2e: End-to-end tests (require full system)
    hardware: Hardware tests (require physical J-Link/serial device)
    compliance: ISO 13485 validation tests (IQ/OQ/PQ)
    slow: Tests that take >5 seconds
    system: System end-to-end tests (full API lifecycle)
    network: Tests requiring live network access (may be flaky in CI)
