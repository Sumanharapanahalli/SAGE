; ==============================================================================
; PlatformIO Project Configuration — GuardianSense Fall Detection Firmware
; Target: STM32L476RGT6 (Nucleo-L476RG dev board)
; Toolchain: arm-none-eabi-gcc 12.x via PlatformIO
; ==============================================================================

[platformio]
default_envs = stm32l4_release
; extra_configs = firmware.extra.ini  ; optional per-developer overrides (gitignored)

; ==============================================================================
; Shared settings inherited by all environments
; ==============================================================================
[env]
platform  = ststm32
framework = stm32cube
board     = nucleo_l476rg

build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32L476xx
    -DFW_VERSION_MAJOR=1
    -DFW_VERSION_MINOR=0
    -DFW_VERSION_PATCH=0
    -Wall
    -Wextra
    -Wshadow
    -Wdouble-promotion
    -ffunction-sections
    -fdata-sections
    -std=c11

; HAL + middleware dependencies
lib_deps =
    stm32duino/STM32duino FreeRTOS @ ^10.4.6

; Only include project sources (HAL injected by framework)
build_src_filter =
    +<*>
    -<.git/>
    -<test/>

; Upload via OpenOCD + ST-Link V2
upload_protocol = stlink
upload_flags    = --connect-under-reset

; Debug via OpenOCD
debug_tool      = stlink
debug_load_mode = modified

; Serial monitor (ST-Link VCP)
monitor_speed   = 115200
monitor_filters = time, default

; ==============================================================================
; Release build — size-optimised, LTO enabled
; Produces: .pio/build/stm32l4_release/firmware.elf + firmware.bin
; ==============================================================================
[env:stm32l4_release]
extends    = env
build_type = release

build_flags =
    ${env.build_flags}
    -Os
    -flto
    -DNDEBUG
    -DRELEASE_BUILD

extra_scripts = post:scripts/post_build.py

; ==============================================================================
; Debug build — full debug info, no optimisation
; ==============================================================================
[env:stm32l4_debug]
extends    = env
build_type = debug

build_flags =
    ${env.build_flags}
    -Og
    -g3
    -DDEBUG
    -DDEBUG_BUILD

; ==============================================================================
; Host-native unit test environment (runs on CI without hardware)
; Compiles firmware sources for the host with Unity test framework.
; Run: pio test -e native_test
; ==============================================================================
[env:native_test]
platform       = native
test_framework = unity

build_flags =
    -DUNIT_TESTING
    -DHOST_BUILD
    -g
    -O0
    --coverage
    -fprofile-arcs
    -ftest-coverage

build_src_filter =
    +<src/fall_detection.c>
    +<src/ota_update.c>
    +<src/watchdog.c>
    +<test/bsp_stub.c>

lib_deps =
    throwtheswitch/Unity @ ^2.6.0

test_build_src = yes
