# overlay-hil.conf — Kconfig overlay for HIL test builds
# Apply with: -DOVERLAY_CONFIG=overlay-hil.conf
#
# DO NOT use these settings in production. The HIL interface is
# explicitly excluded from production images via CONFIG_HIL_TEST_INTERFACE.

CONFIG_HIL_TEST_INTERFACE=y
CONFIG_UART_1_NRF_HW_ASYNC=n   # Use interrupt-driven RX for HIL UART
CONFIG_UART_INTERRUPT_DRIVEN=y

# Slightly larger main stack to accommodate test replay buffer
CONFIG_MAIN_STACK_SIZE=4096

# Debug logging — turned off in production overlay
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3      # INFO

# Disable real LTE attach (use stub) during HIL power tests
CONFIG_LTE_HIL_STUB=y

# GPS stub for timing tests
CONFIG_GPS_HIL_STUB=y

# Watchdog test support
CONFIG_WATCHDOG_TEST_SUPPORT=y

# Retain production safety settings
CONFIG_STACK_SENTINEL=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_FAULT_DUMP=2
