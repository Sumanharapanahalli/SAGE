  # ── Webhooks — NG911 PSAP Callback ───────────────────────────────────────

  /webhooks/ng911/status:
    post:
      tags: [webhooks]
      summary: "Receive NG911 PSAP status callback"
      description: |
        PSAP sends status updates back to EFDS. Secured by HMAC-SHA256
        signature in X-NG911-Signature header (not JWT).
        Replay protection: reject if X-NG911-Timestamp > 5 minutes old.
      operationId: ng911StatusCallback
      security: []
      parameters:
        - name: X-NG911-Signature
          in: header
          required: true
          schema:
            type: string
          description: "HMAC-SHA256 of request body (hex)"
        - name: X-NG911-Timestamp
          in: header
          required: true
          schema:
            type: string
          description: "Unix epoch timestamp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NG911StatusCallback"
      responses:
        "200":
          description: "Status acknowledged"
          content:
            application/json:
              schema:
                type: object
                required: [acknowledged]
                properties:
                  acknowledged:
                    type: boolean
                    example: true
        "400":
          description: "Malformed payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: "Invalid HMAC signature or replay detected"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
