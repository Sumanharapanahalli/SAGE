# Alembic configuration for elder_fall_detection
# Run migrations: alembic -c backend/alembic.ini upgrade head

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .

# Connection URL — override with DATABASE_URL env var in CI / production
sqlalchemy.url = postgresql+asyncpg://app_user:changeme@localhost:5432/elder_fall_detection

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
